body:
  text: 嗣法門人行浚等編蘇州府吳江報恩禪寺語錄元旦上堂昨日舊年今朝新歲凍筍抽尖寒香遠遞秖因不變舊時顏正合人間添一歲處處兒騎竹馬家家門換桃符鄉村野老放酣歌林下道人靜無語所以天不言四時行地不言萬物生聖人不言垂衣拱手萬國來王衲子不言坐斷溪山包羅風月且正恁麼時如何是裕國祐民一句驀拈拄杖云杖頭撥轉無為化闔國謳歌樂太平上堂有句無句朝為田舍郎如藤倚樹暮登天子堂樹倒藤枯將相本無種句歸何處男兒獨自強向此四句中見得徹去便知向上宗乘具超方眼目千聖羅籠無處萬法繫綴無由直下坐斷塵情意想不落見聞覺知自然機用雙行十虛通透其或未然不免向他語言上卜度機境上摶量業識茫茫無本可據何則不見道言無展事語不投機承言者喪滯句者迷且道二俱不涉又作麼生了取平常心是道四威儀內坦堂堂結夏上堂僧問承師有言無禪可參無法可聽未審今日結制又作麼生師云事不重科進云恁麼則掀倒禪床去也師云還有轉身處麼僧喝師云也是泥中洗塊問天地未判朕兆未分未審向什麼處結制師打云正合其宜進云何得錦上添花師又打云為要闍黎著眼進云黃金自有黃金價誰肯和沙賣與人師云也須驗過問古人云盡大地都是覓作佛的要尋個無心道人了不可得未審如何是無心道人師云問從何來進云莫謂無心云是道無心猶隔一重關師云過得也未乃云三春已過九夏方臨了則便了何用勞神只要九十日內莫動一步十二時中莫生一念一念不生安居平等性智一步不動遊戲圓覺伽藍如斯履踐自然箇箇常光現前各各壁立萬仞不與諸塵作對不與千聖同途是以廣額屠兒日宰千羊放下屠刀便云我是千佛一數雲門大師見釋迦老子便要一棒打殺與狗子喫貴圖天下太平二俱不受則且置如何是衲僧正眼良久云纔逢立夏後是處綠陰多復舉僧問睦州高揖釋迦不拜彌勒事如何州云昨日有人問趕出了也僧云恐某甲不實那州云拄杖不在笤帚柄聊與三十師云不是師子定然逐塊若是報恩待他道昨日有人問趕出了也便合掌進前云高揖彌勒不拜釋迦又如何待擬開口拂袖便出非但笤帚柄短縱使拄杖子長也打不著還有為睦州出氣者麼縱然出得也是同坑無異土上堂時逢五月芒種時節東家插秧西家刈麥賓頭盧尊者剔起眉毛達磨大師剛言不識佛法世法打成一片檀那遠供亦可消得眾中還有恁麼人麼有則出來道看若無山僧自道去也漠漠水田飛白鷺陰陰夏木囀黃鸝西堂白嶠請上堂六月熱五穀結大有之年驗在今日將謂世俗之談未具衲僧眼目所以道言無展事語不投機承言者喪滯句者迷報恩到者裡不敢望空啟告節外生枝是故世尊說法四十九年談經三百餘會末後乃云始從鹿野苑終至跋提河于此二中間未嘗說一字達磨大師見梁武帝帝問朕自即位以來造塔度僧有何功德磨云著相外求非真功德如何是真功德磨云淨智妙圓體自空寂如是功德不以世求又問如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識有般漢聞恁麼舉強作主宰總不恁麼大棒打不回頭千般羅籠不住大似十字街頭石敢當秪成得箇頑漢若真丈夫眼裏有觔皮下有血一年十二月一月三十日一日十二時時時如是日日如是月月如是年年如是單單只守箇閒閒地饑來喫飯困來打眠寒則向火熱則乘涼上無諸聖可慕下無眾生可度人與非人性相平等忽然撞著明眼道流輕輕拶著直得山頭浪起海底塵生且道據箇甚麼道理便乃如是舉拂云會麼自從踏著生前路便向威音那畔行上堂僧問昨日迅雷鳴涼風到處生我師登寶座賓主歷然分如何是賓中賓師云此去西天十萬程如何是賓中主師云龍袖拂開全體現如何是主中賓師云象王行處絕狐蹤如何是主中主師云歸家盡是兒孫事祖父從來不出門進云賓主已蒙師指示向上宗乘事若何師云日午打三更進云恁麼則出群須是英靈漢敵勝還他師子兒師云如何是敵勝處僧便喝師便打僧禮退師云更與一頓乃拈拄杖云一回拈出一回新一度用來一度快你有拄杖子我與你拄杖子你無拄杖子我奪卻你拄杖子芭蕉老漢但能繼富不能周貧致使後代兒孫節目上更生節目報恩則不然有也不與無也不奪驀拈杖云吽一種平懷有誰能及解夏上堂休夏九旬功圓三月以杖敲空云打開方便門俱從者裏出乍見陰疏嫩柳俄聞蟬噪秋條節令推遷陰陽反覆無生曲調不越宮商智體如如離聲絕色從來未嘗覆蓋今日豈有遮攔秪要一念不落情塵頓證自家境界如龍得水似虎靠山有佛處羅籠不住無佛處呼喚不回正當恁麼時作麼生即是打開布袋無餘事秪要勤看水牯牛香山濟長老至上堂昨夜燈花爆今朝喜鵲噪將謂有客來恰是門人到到後事如何慇懃為解丁香結放出枝頭自在香回山上堂春去秋來事若何寒江釣興偏多不將香餌輕相誘要獲竿頭稱意魚既不將香餌稱意魚作麼生獲鶴有九皋方展翼馬無千里謾追風開爐上堂年年小春月望日復開爐近水不近山柴炭兩俱無那容諸衲子僵臥起為甦只要當下了觸處自溫和溫以自利和以利他自利故上無攀仰下絕己躬利他故上合十方諸佛同一道力下合六道眾生同一悲仰自利利他則且置即今作麼生了任從滄海變終不與君通上堂僧問三條椽下則不問七尺單前事若何師云急須領話進云恁麼則掀倒禪床去也師云腳跟痛與一頓乃云三世諸佛說不到處歷代祖師提不起處一大藏教詮註不及處無大得大一段光彩盡在山僧拄杖頭上把住則四聖六凡莫辨放行則狸奴白牯瞻依且道不把住不放行又作麼生山河天眼裏世界法身中接待寺上堂僧問如何是奪人不奪境師云丹青描不出進云如何是奪境不奪人師云千聖覓無蹤進云如何是人境俱奪師云胭脂落漢家胡女無顏色進云如何是人境俱不奪師云龍袖拂開全體現象王行處絕狐蹤進云今古應無墮分明絕覆藏師云切莫詐明頭乃云未到接待早已令人疑著既到接待果然門開八字殿閣精嚴諸上善人咸集於此一箇箇文殊普賢一箇箇釋迦彌勒晝開香積飯似雪山夜滿參堂十方雲水山河大地發歡喜心蠢動含靈咸霑厚德一切無漏勝善俱從這裏流出有佛處敲枷打鎖無佛處痛下針錐且總不恁麼時又作麼生了達天高群象正海闊百川朝費英仲送法衣請上堂千梭織就萬縷合成不假苦工焉成世用有為之法尚爾無為之道亦然故云以思無思之妙反思靈燄之無窮思入無思性相平等所以三世諸佛也恁麼歷代祖師也恁麼天下老和尚莫不恁麼惟有山僧不恁麼且道恁麼不恁麼還有優劣也無提起衣云大庾嶺頭藏不得如今也要大家知禪智寺上堂未有常行而不住昨日在報恩未有常住而不行今朝來禪智報恩禪智雖有殊行住從來沒兩箇既沒兩箇行時即是住時目下不離報恩住時即是行時向已早來禪智行無所行住無所住行住兩忘報禪不二所以云動若行雲止猶谷神既無心於彼此寧有象於去來正當恁麼時一句作麼生道域中日月縱橫掛一亙晴空萬古閒上堂僧問隨處作主遇緣即宗不落棒喝語默請師直截指示師云高著眼進云若然則超今越古師云拈卻今古又作麼生僧喝師便打問止持作犯即不問本元心地事如何師云腦後著眼進云恁麼則鳳羽沖霄漢神龍便解飛師云更須進步始得問坐斷須彌頂掀翻海底天木人擎日月未透衲僧關如何方得透關師云竹溪水秀進云龍得水時添意氣虎逢山勢長威獰師云料掉沒交涉乃云臘月天寒霜花滿目袖手當胸了無思筭無思筭誠思筭衲僧分上渾無事冷坐蒲團著眼看大眾既然無事看個什麼擲下杖云切莫瞌睡上堂靈光不昧萬古徽猷智鑑洞明十虛普應所以遇緣即赴隨處立宗有時向孤峰頂上嘯月披雲有時向十字街頭拋沙撒土卷舒在我縱奪臨機把住則乾坤黯黑放行則日月爭光正當恁麼時把住是放行是良久云是處是慈氏無門無善財上堂最初機末後句亙古亙今覆天載地了即便了會終難會恁麼說話已悟者聞之如水投水似空合空未悟者聞之如熱見重裘寒遇絺綌且道不落迷悟又作麼生以拂打圓相云到頭霜夜月任運落前溪上堂饑者易為食渴者易為飲不饑不渴者飲食自無心大眾且道誰是不饑不渴者拈杖云上大人丘乙己尒小生可知禮也歸院上堂大道只在目前要且目前難睹欲識大道真體不離聲色言語豎拂云大眾看看誌公和尚來也即今在山僧拂子頭上橫說豎說汝等諸人還聞麼若道聞且道他說箇什麼若道不聞汝等諸人豈無耳耶向這裏轉得身吐得氣許汝少分相應其或未能山僧未免聊通一線前月十七去今月十三回當此何時候臘梅滿樹開喝一喝擲拂子下座歲旦上堂元正啟祚萬物咸新年新月新日新時新纖洪長短莫不皆新拈杖云且道者條拄杖子還有新舊也無諸方盡道本無新舊也是布袋裡老鴉山僧即不然閑時倚壁渾如舊拈出當陽宛似新喝一喝下座解制上堂制有結有解法無古無今有無之義雖殊水月空花俱幻天下東西十三省南北有兩京中間一條大官路盡在諸人腳下行踏著踏不著置之不論前程忽有人問從甚處來切莫道報恩來因甚如此不將平實對秪要使他疑佛誕結制上堂瞿曇為眾不尋常纔出娘胎便舉揚千古相傳無別事鄉村四月正農忙眾中如有為眾竭力者不妨出眾互相激揚以啟後昆豈不為妙如或未能且聽山僧新令今日報恩結制開出三條新例第一肚饑須向齋堂裏噇飯第二內逼須向東廁頭屙屎更有一條不說破也要諸仁各自知復舉芙蓉太毓禪師因行食到龐居士前士擬接師乃縮手云生心受供淨名早訶去此一機居士還甘否士云當時善現豈不作家毓云豈干他事士云食到口邊被人奪卻毓便下食士云不消一句師云太毓因行掉臂用力不多居士相孔著楔甚得其便二俱作家置之勿論只如末後道不消一句且道是那一句良久云信心檀越一餐齋薄供應消四兩福普淨庵上堂二十年來離此菴秪因箇事詰諸山而今老大歸何得灑水成冰大伏天大眾見即見覓還難捕風捉影莫追攀無孔鐵錘當面擲金剛寶劍逼人寒猿抱子歸青嶂外鳥銜花落碧巖前分明披露者消息秪為時人不解參正當恁麼時歸家穩坐則且置為物興慈又若何良久云會麼陣雲橫海上拔劍攪龍門上堂僧問二十年來喜復旋眉毛鼻孔尚依然錦衣故里人爭望盡道吾師得正傳一句正傳則不問即今相見事如何師云戶外秦峰秀進云恁麼則猿抱子歸青嶂外鳥銜花落碧巖前師云是什麼意旨進云自是不歸歸便得五湖煙景有誰爭師云大有人未肯在乃云饑者食渴者飲不饑不渴者請進雲水堂上單好安寢不安寢普淨檀林飯似山飽上加餐終作疹不作疹惟有通方過量人非但吸盡東海水猶把秦山一口吞且道東海水作麼生吸秦駐山作麼生吞大眾還會麼鶴飛千丈雪龍起一潭冰上堂施主一粒米大如須彌山若人不了道披毛戴角還卓拄杖云薰風自南來殿角生微涼馬鳴菴上堂本是無形咸曰神靈本是無聲咸曰馬鳴風來則草偃水到則渠成不假半點安排寧許絲毫湊泊伶俐漢領在言前薦於機外便知長安自鬧我國晏然脫或未能山僧未免為現前四眾別開一路豎拂云大眾看看三教聖人盡在山僧拂子頭上牽枝引蔓說妙談玄言有千殊理無二致仲尼云吾道一以貫之老子曰聖人抱一為天下式瞿曇曰惟此一事實餘二則非真三教聖人雖則把手共行同鼻出氣在我衲僧分上又且不然何故二由一有一亦莫守日午打三更面南看北斗喝一喝範維那請上堂僧問不屬陰陽界無形本寂寥今日和尚高陞寶座所為何事師云秪為你者瞎漢進云相識滿天下知心能幾人師云不打自招進云將相本無種男兒當自強師云痴人說夢進云蒼天蒼天師云叫屈作麼乃云客棹泛秋波芙蓉兩岸敷眾公能了達何異老頭陀便知佛佛授手無別授祖祖相傳無別傳無授無傳明底事了無奇特惑人間蒸砂不成飯掘地難覓天鈍鳥逆風飛蝦跳不出斗所以雲門大師云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾斯皆直下發明世尊拈花之的旨豈逞奇特哉既然無授無傳箇事阿誰了得豎拂云會麼報恩堂上曾分付除卻知音更有誰擊拂子下座松陵護法留住報恩寺請上堂居士問棒頭落處點鐵成金喝下知歸轉凡成聖更有出一頭地的人來如何接待師良久進云如斯荅話已沐深恩格外之機更求垂示師云頂門更著錐士禮拜乃云迷則一切迷悟則一切悟迷時迷悟底悟時悟迷底迷悟悟迷水中鹹味色裏膠青所以當時黃山谷一日訪晦堂求示時值月落金莖香飄丹桂晦堂曰聞木樨香乎谷曰聞堂曰吾無隱乎爾黃山谷即便打失鼻孔今日松陵護法得得造山設供請山僧上堂為留久住眾居士若向晦堂提攜處了得不枉耑意而來如或未會山僧更為通箇消息只知開口易不覺舌頭長歸院上堂至道無難唯嫌揀擇但莫憎愛洞然明白吳江城裏諸信士趁水和泥庉村鎮上眾檀那設供羅齋只為報恩堂上石佛一味清清淡淡朴朴實實毀之不嗔譽之不喜八風吹不動端坐若須彌大眾且道作何行業得到這般田地還會麼三條椽下忘寒暑七尺單前著意參孝子行淑為父從心請對靈陞座青靄靄碧叢叢根盤沙界葉覆乾坤中心樹子無多子十界眾生隱現中劃然諦信其中旨汝生之號不虛稱歸家穩坐切勿問程生也在其中死也在其中迷也在其中悟也在其中凡也在其中聖也在其中其中本自恒清淨眚眼看來便不同故永嘉云大千沙界海中漚一切聖賢如電拂正恁麼時還識中心樹子麼若也識得入魔入佛原無二人間天上總清涼其或未然山僧今日為汝點破豎拂云還會麼天上有星皆拱北人間無水不朝東沈孝則居士請上堂禪智回山已八旬雲堂法鼓未經聞今朝打著鼕鼕響不是英靈孰善聞不見香嚴老人云一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤跡聲色外威儀諸方達道者咸言上上機達道即不問如何是上上機喝一喝云須知鼓響鐘鳴後一一旋歸眾妙門上堂十月應小春籬邊菊尚新若將時境會塵夢幾能醒眾中還有不作境會者麼良久云三界無別法唯是一心作豎拂云者箇是法喚甚麼作心擊拂云者箇是心喚甚麼作法如是則住法無心住心無法心法不住是名大覺所以道萬法是心光諸緣唯性曉本無迷悟人只要今日了若能了得自然頭頭顯露物物全彰一道孤光貫通今古咸令一切有情有求皆遂無願不從正當恁麼時作麼生道紅蓼汀邊棲鷺穩白楊堤畔臥雲深開爐上堂報恩堂上復開爐銅銕金銀一火鎔等閒伸出分金手倒用橫拈事莫窮大眾如何是莫窮之旨還會麼指鹿為馬喚鐘作甕上堂箇事明明絕覆藏錯肩行李扣諸方昔年看去多奇特今日觀來甚坦然所以道三十年前山不是山水不是水僧不是僧俗不是俗三十年後山即是山水即是水僧即是僧俗即是俗箇中有箇漢出來問今昔融和作麼生見報恩向他道動容揚古路不墮悄然機又問不涉今昔又作麼生見喝一喝云鶴飛千丈雪龍起一潭冰臘八上堂煉得身形似鶴形柴然枯坐悟明星人誰不似瞿曇老只欠依他樣子行所以道奇哉眾生皆有如來智慧德相良由妄想執著不能證得可見言中有響句裏無私且道除卻妄想執著作麼生證得智慧德相豎拂云會麼太平原是將軍致那許將軍見太平新正解制上堂纔拴意馬不多時頃刻隆冬又過之耳畔只聞鑼鼓鬧聲聲敲入鬢成絲大眾還有不隨聲色轉變者麼喚甚麼作聲色既不喚作聲色畢竟喚作甚麼等閒識得東風面萬紫千紅總是春到恁麼地可謂知歸報恩門下未肯點首在何也欲窮千里目更上一層樓高郵萬居士祈壽請上堂德布人間世仁敷天地間欲明無量壽須透祖師關大眾且道如何是祖師關擊拂云水向石邊流出冷風從花裏過來香上堂舉五祖演和尚云夫為禪客須是出陣大將軍相似你拈得一片雲門餬餅來我者裏與你半座須彌山若拈不出焉敢稱禪客師云五祖恁麼說話雖是激發後昆急於進道大似倚富欺貧壓良為賤何則人人有血樹樹有皮那箇男兒不丈夫定要拈他雲門的餬餅敢問大眾如何是你自家的餬餅良久云信手拈來無不是秪因擬議隔千山臘八結制上堂雪山放參報恩結制兩彩一賽終始不二且道如何是一賽之旨張郎衫袖大李老帽簷高舉世尊在雪山睹明星話畢乃云世尊可謂以己推人理無二致檢點將來不無望空啟告捏目生花驀豎拂云且道者箇是智慧德相耶妄想執著耶現前大眾試定當看師六旬壽誕洪衍上座請上堂春日融和景色新嫩紅嬌綠鳥添聲老僧不用安排力六十年來任變更以拂子擊香几下座脫粘禪人請上堂僧問奮佛祖爪牙三尺龜毛剛似銕剖人天肺腑一條拄杖利如錐者段家風還是師翁處得來還是本分中流出師良久云汝剖析看進云掬水月在手弄花香滿衣師云也是湊泊來進云越嶺抽條吳地秀天童果熟報恩香師云猶帶累老僧乃舉雲門因僧問如何是諸佛出身處門云東山水上行圓悟云薰風自南來殿閣生微涼妙喜聞之豁然大悟南石云雲門圓悟恁麼提持正是鄭州出曹門妙喜恁麼悟去真州望長蘆南石見處也要諸人共知諸佛出身處更不假思惟早晨喫白粥如今肚又饑師云山僧早年亦從此悟入有頌云薰風自南來殿閣生微涼我今看破處也只是尋常且道與南石見處是同是別若道是同三十棒若道是別亦三十棒為甚如此要將未歸意說與欲行人解制上堂百日安居限已圓四威儀外別無禪春風三月河堤上楊柳依依盡帶煙且出門一句如何道良久云但有路可上更高人也行上堂莫訝山僧結制遲懶將三限縛同居但教脫體無依去便是孤光絕待時故經云以湛旋其虛妄滅生伏還元覺得明元覺無生滅性為因地心然後圓成果地修證修證則且置如何是元明覺豎拂云千山勢到嶽邊止萬派聲歸海上消元旦上堂祝聖拈香畢師云茲歲維新輪行甲午四方交泰萬彙昭蘇非厭故以趨新第無往而不復如旋火輪無有休息正恁麼時且道是誰使令不見道萬法是心光諸緣惟性曉本無迷悟人只要今日了了與不了則且置如何是新年頭底佛法千門萬戶曈曈日總把新桃換舊符新正八日上堂東篩鑼西擊鼓節拍成令村歌社舞此是新年頭底佛法如何是舊年尾底佛法還委悉麼霜風剪得樹頭光遠近樓臺俱露脊只將此旨報檀那檀那所願皆如意擊拂子下座上堂冷坐孤村經九冬較前面壁意還濃尋常落草求知己贏得人間斷臂翁昔日陸亙大夫問南泉云肇法師也奇怪解道天地與我同根萬物與我一體南泉指庭前牡丹花云大夫時人見此一株花如夢相似大眾此便是尋常落草邊事還知南泉指處麼若也知得趁此人天眾前吐露消息老僧為汝證明其或未能且看老僧舊有一頌纔見花顏識肇顏花顏怎比肇顏鮮肇顏不在花顏上萬紫千紅盡失顏蔡居士請上堂數載頻徵三日聾橫開地面使人通多時不見相酬者將謂今朝有蔡公所以傾蓋如故白頭似新兩鏡相炤不隔纖塵豎拂云還隔著者箇麼喝一喝云春色滿園關不住一枝紅杏出墻來上堂春風蕩蕩春雨霏霏桃英雖未綻梅玉已飄香頭頭吐露真機為甚時人不薦良久云為視尋常景偏教蹉過多師誕上堂六十餘年一剎那剎那之內事堪呵為僧不作離塵行無奈多生熟習魔故經云一者刳其正性二者除其助因三者違其現業欲愛乾枯根境不偶現前殘質不復續生震威一喝云當時黃面老子下得者一喝則不見有我人眾生喚甚麼作現前殘質果到恁麼田地如來禪許汝少分相應祖師禪猶未夢見在且道如何是祖師禪還會麼動容揚古路不墮悄然機解制上堂擦褲摩裙又一番可曾於此透重關頂門有眼如還合解制虛消信施難何也不見道施主一粒米大如須彌山若人不了道披毛戴角還了則且置將何為道左右顧視云還委悉麼春天不問路雨過便行程佛誕上堂舉世尊初生時一手指天一手指地周行七步目顧四方云天上天下惟我獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平師云世尊創業垂統道化萬方那慮後人之顛覆雲門鳳曆新頒肅清宇宙輒翻上祖之遺規雖則光先裕後有祖有孫簡點將來不無自累畢竟如何得恰好去遂頌曰天然習氣最難忘纔出頭時燄熾張將謂無人能抗拒誰知後代有韶陽上堂水旱連年供米稀法堂鐘鼓面生灰掃盡客塵頻打盹世間出世總無知庭前桃李還仍舊人老精神異昔時有可見兮無可見不遷移內恰遷移天然一種難思法千聖從來獨自知且道如何是獨自知底事會麼鶯囀上林花滿地客遊三月草侵天下座中元上堂喜逢自恣日處處建蘭盆孝哉目犍連遺規使後遵自孝令人孝度親度眾親彼此忘岐見親疏一坦平建會諸仁者功勛豈易論大眾還有不假追修親自生天者麼良久云拽杖寧虛往因過覓此人卓拄杖下座居士送法衣法被至上堂十載良緣住報恩一山清澹可超群僧堂未及容千指佛殿無能乞四鄰荒田數頃勤耕種為供林間抱道僧錦上鋪花早已見雪中送炭晚纔逢我今年耄知休去遺與當來接上根大眾且道上根作麼生接喝一喝下座
