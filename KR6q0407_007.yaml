body:
  text: 嗣法門人行浚等編入室師問孤卓汝字孤卓是誰證明若有證明難以言孤若無證明誰知孤卓卓云瞞和尚一點不得師云既瞞老僧不得墮在難以言孤卓云早被和尚道破了也師云又墮在難以言卓卓云試為行浚分析看師云好與三十棒卓云不妨起動和尚師云知恩便是負恩人卓禮拜而出師問範圍汝字範圍即今在什麼處安身圍云遍界不曾藏師云汝範圍耶範圍汝耶圍云唯我獨尊師云低聲低聲師問了幻前境若無心亦無則幻是何物了是何心幻云幻何必了了亦無幻無幻無了是名了幻師云無幻無了誰名了幻幻云鳥在枝頭啼花在瓶中笑師云與汝何干幻云和尚莫瞞人好師云也是帶累老僧懏侍者進禮拜師喝云四喝中是那一喝分析得出許汝參學事畢懏云紫羅帳裏撒珍珠師云未在更道懏云明破即不堪師云如何是你明破處懏一喝便出師休去師問百可南泉斬貓趙州頂草鞋而出二人意旨如何可云不因媳婦揚家醜那曉婆婆腳短長又問本源源云劍為不平離寶匣藥因救病出金瓶問國山山云一條拄杖兩人扶問鑒可可云兩彩一賽問志篤篤云和尚珍重學人禮拜師云老僧不恁麼道眾云請和尚道師云落霞與孤鶩齊飛秋水共長天一色師問百可世尊未出母胎度人已畢如何又說法四十九年可云從前汗馬無人識秪要重論蓋代功老僧不恁麼道可云和尚作麼生道師云不會作客勞煩主人又云勞後如何知恩者少負恩者多問荅機緣僧問如何是佛師云三腳驢子弄蹄行如何是法師云八角磨盤空裏走如何是僧師云十字街頭等箇人問四山相逼如何是出身一路師云獨步大方問世尊拈花意旨如何師云風行草偃僧云迦葉微笑意旨如何師云水到渠成問牛頭未見四祖時如何師云花園擺宴見後如何師云茅屋疏籬問龍得水時添意氣虎逢山勢長威獰忽然山崩海竭時又作麼生師云渠儂得自由問物有榮枯歲有新舊如何是不遷義師云昨日今朝事不同僧無語師云死漢問猛虎以肉為命為甚不食其子師云方以類聚問不是一番寒徹骨怎得梅花撲鼻香師云猶為貪餌客未是絕求人僧云如何是絕求的人師云衲被蒙頭睡正濃此時山僧都不會問法身有三種病二種光未審甚病甚光師云若不同床睡焉知被底穿問雪覆千山為甚孤峰不白師云從來不受人瞞問現成公案因甚趙州八十行腳雪峰九上三登師云不因弓矢盡那肯豎降旗問佛未出世祖未西來單傳一脈何人護持師云從來無間斷不落有無邊問四大互融因甚道水火不同器師云車不橫推理無曲斷問如何是正中偏師云燈籠呈笑面如何是偏中正師云露柱恰懷胎如何是正中來師云寰中天子敕如何是偏中至師云閫外將軍令如何是兼中到師云太平無象野老謳歌僧云五位既蒙師指示向上宗乘事若何師云向前來與汝道問所飲母乳如四海水身所積骨如毘富羅山未審誰是最初父母師云開眼也著合眼也著問歸來飽飯黃昏後不脫簑衣臥月明且道是什麼人境界師云有些認得想不起來僧云恁麼則逢場作戲去也師云還過得者裏麼僧便喝師打云畢竟過不得僧云一任縱橫師云看腳下問盡大地是箇解脫門為甚時人不入師云盡大地是箇解脫門更向甚處入問如何是夜半正明天曉不露師云突出難辯問突然揣出虛空骨驚起須彌折斷腰意旨如何師云重重疊疊上瑤臺幾度呼童掃不開居士參師問牛過窗櫺頭角四蹄俱過為甚尾巴過不得士云和尚師云山僧也替你不得也須要自過始得士云過也師云也是囫圇吞箇棗問一句明明該萬象如何是一句師云鷂子過新羅問函蓋乾坤即不問目機銖兩是如何師云薰風自南來問清光炤眼尚迷家明白轉身猶墮位未審天童意作麼生師云金屑雖貴落眼成翳問向上一路千聖不傳萬象之中迥然獨露未審獨露箇甚麼師云覷著則禍生問楞嚴經佛訶阿難汝雖歷劫熏修諸佛如來秘密妙嚴不如一日修無漏業未審無漏業作麼生修師云不慕諸聖不重己靈問行住坐臥不離者箇如何是那箇師云放汝三十棒僧云過在甚麼處師云垛生招箭問如何是西來意師云風過樹頭搖問久秘法音請師一震師云分明聽取僧云恁麼則喧天動地去也師云未是知音者問如何是第一義師云戲論僧云如何是某甲戲論處師云但有言說都無實義僧禮拜師便喝問無問無荅時如何師云死漢進云有問有荅時如何師云狂徒進云畢竟作麼生師云放汝三頓棒問著相修行多劫終成敗壞無心體極一念頓契佛家如何是佛家境界師云四智不能識五眼不能窺問諸佛諸祖權設方便不離世諦隨順世間會則途中受用不會則世諦流布流布且置受用一句作麼生道師云頭上笠腰間包問任他天下樂忻忻我獨不肯未知不肯何人師云闍黎失卻一隻眼問五宗極則機齊貫如何是齊貫之機師云一葉落天下秋問不用兩片皮向上一句道將來師云曾問人來麼僧云不曾師云誑語漢問古澗寒泉流不盡尋源到底事如何師云乾嚗嚗問家親作祟是如何師云秪要個護身符子僧云如何是護身符子師云但恁麼舉問朕兆未萌要會借功明位既是朕兆未萌為什麼借功明位師云太平無象野老謳歌問挨身入劍戟之場如何得不犯鋒鋩去師云切勿自生荊棘僧云忽遇軍兵圍繞時還有出身路也無師云求出即不堪僧云恰值囊空物盡向什處追尋師云轉轉沒交涉僧云恁麼則住在白雲最深處依然流水到門前師云也是虛張聲勢僧云和尚切莫壓良為賤師休去問報恩勝剎石佛浮來為是神通妙用為復法爾如然師云兩頭俱坐斷露出自家底進云古佛浮石而來今師浮石而住未審是同是別師云一點水墨兩處成龍問大地無寸土因甚妙高峰頂草離離師云只為無人能到問無為無事人猶是金鎖難如何脫得師云早起晏眠問從上門庭即不問濟下相承事若何師便打僧喝師又打僧云今日親見和尚師云猶少三十棒僧云作家宗師天然有在師云莫污老僧僧云適來觸忤和尚師云又作者箇見解僧作禮云者一禮也少不得師云喫茶去問一口吸盡西江水因甚波浪滔天師云吞吐不由別人問因甚不疑言句為大病師云不愁劍戟從空下只恐藕絲絆殺人僧云秪如攢簇不得底病如何療治師云不消報恩一劑問大地無寸草水牯牛向甚處牧師云本來無住著遍界得安眠問老人帶眼鏡看書隔了一層為甚反見分明師云明知不是伴事急且相隨問滿堂僧不厭一箇俗人多為何地藏容得十箇師云君子坦蕩蕩小人常慼慼問施主一粒米大如須彌山若人不了道披毛戴角還且道作麼生了師云驢膫子短馬膫子長問無夢無想無見無聞主人公畢竟在甚麼處師云南山起雲北山下雨師問雪岑覿面相呈即不問如何是賓主句雪云伯牙與子期豈是閒相識師問趙州訪二菴主又作麼生雪云尋常一樣窗前月纔有梅花便不同師云怎見得不同底事雪云瞞和尚一點不得師問南泉斬貓即不問趙州頂草鞋意旨如何雪云幸遇中郎鑒非同野舍薪師云趙州勘臺山婆子什麼處是勘破處雪云子規夜半猶啼血始信東風喚不回師云諸大士各說不二法門因甚維摩默然雪云效顰豈是良家女師乃頷之問三千七百則公案且道那一則了得生死師云三千七百則公案那一則了不得生死僧無語師打出問參禪不用心意識如何得不落去師豎拳云者樣用便不落問有一人終日喫飯不道飽終日不喫飯不道饑且道是甚麼人師打云者箇也不識問須向六句外鑒如何是六句師云你尋常用底問大善知識神天莫測為甚被人夢見師云長安自鬧我國晏然問既是寶塔因甚拆了一角師云一人傳虛十人傳實問千不是萬不是如何得是師云因有是可得不是有千般問三藐三菩提皆從此經出唐三藏因甚又往西天師云已知燈是火假意覓鄰家師至開先靜室額云空色同觀師問開云觀空非色觀色非空作麼生方得同觀開呈起數珠師云此是色空又作麼生開走出少頃復入作禮師云未在開云和尚作麼生觀師拈數珠云此不是色指空云此不是空恁麼許汝同觀開一喝師云馬祖一喝百丈因甚耳聾三日開亦喝師云汝會得百丈耳聾之旨方許汝會馬祖一喝汝既不會百丈耳聾之旨妄加兩喝太煞粗心大膽開無語揚古問言前薦得猶為滯殼迷封句下精通未免觸途狂見去此二途如何即是師云出頭天外望誰是我般儔問本色道流原無一事為甚衲子入門非棒即喝為是門庭施設為是本分生涯師云分身兩處看問從古作家慣布漫天網子打鳳羅龍如何方得出身一路師云斫額望扶桑秪要知天曉僧問云夜間有虎忽被拖去時如何師云四大本空何處下口蠱門問既是無位真人因甚向古寺棲泊師云金鉤拋四海玉燭續明燈問既云羅漢松因甚不向齋堂裏應供師云乞兒籮易滿問嵩山塔雲谷塔左右交參且道誰主誰賓師云含元殿裏問長安問未過范蠡湖清波無透路作麼生與棲真老人相見師云合掌庵前問世尊問山門頭金剛目不息怒拳不伸掌且道甚麼諍心不了師云舉起軒轅鏡蚩尤失卻威問東石橋與西石橋恰是對頭為甚過溪庵坐觀成敗師云踏開生死海跳出是非門復初問若人散亂心入於塔廟中一稱南無佛皆已成佛道既是散心念佛為甚亦能成道師云大海不擇細流問以我此物周給一國如何是周給的物師云破沙盆問於菩薩法遊戲神通淨佛國土如何是菩薩遊戲神通師云昨日夜叉頭今朝菩薩面問是法住法位世間相常住如何是常住的道理師云太白峰高清關橋短問此法華經深固幽遠無人能到如何是深固幽遠處師云海枯終見底人死不知心問大通智勝佛十劫坐道場佛法不現前不得成佛道如何是現前佛法師云去去西天路迢迢十萬程潯侍者問獅子山與虎丘山相咬且道和山說個甚麼法便得息諍師云秪消一笑問天無私蓋地無私載為甚蓮子峰崢崢嶸嶸天平山坦坦蕩蕩師云本自無私任其力量問一雨普施根莖有異即如無根之草還潤澤得他也無師云全仗渠力問近聞者裏有虎覿面撞著如何迴避師云畜生自有分疏問前面綠荷背後青松朝朝相見夜夜參隨未審他為何事師云秪要老僧點首問良醫之門足病夫爐鞴之所多鈍鐵如何方得消頑除瘥師云只為分明極翻令所得遲問昨日園中鋤斷蚯蚓今朝失足蹋殺蝦蟆懺悔即是不懺悔即是師云全靠老僧不得無奇問善卷洞遊者甚多為甚不肯停留師云未得空情識安能與石投問虎山日日被人敲鑿還有知痛癢者麼師云一塊鐵心腸老僧渾不顧問庭前柏樹子天下人榜樣因甚掩在泥裏師云只為韜光後芳名天下傳問雷書殿柱有甚麼人證明師云自有前朝士分明傳至今問澗水長流不竭且道源頭在甚麼處師云四海歸皇化千差起杖頭問既是離墨峰因甚黑漆漆地師云因明肯且拙方保一生安問獅子窟中無異獸如何容得許多外道師云歸依同一體存此善陶鎔僧問臨濟宗旨即不問如何是善權底奇特句師云三門騎佛殿進云恁麼則鯨吞海水盡露出珊瑚枝師云如何是汝露出底枝進云禮拜和尚師云放汝三十棒師問眾云婆生七子六箇不遇知音只者一箇也不消得便拋下水中既遇知音因甚者箇也不消得眾荅不契自荅云知之一字眾禍之門僧問倩女離魂阿那個是真底師云從來無假何用問真僧問虛空為鼓須彌為椎誰人打得師云無手人善打僧問南山起雲北山下雨意旨如何師云同道者方知僧問無情說法作麼生說師云春至百花開秋來林葉落僧問青青翠竹鬱鬱黃花且道誰人受用師云不見一法者僧問懷州牛喫禾益州馬腹脹意旨如何師云畜生同一體僧問古人未出方丈莊上喫油餈意旨如何師云明修棧道暗度陳倉石門參問云向叩庉村親聞法要今過天童舊面重逢兩上三登即且止破沙盆句請師通師云如何是親聞底事門震威一喝師云再喝喝看門云學人禮拜去也靈常禪人以十二問呈師垂荅頌示之問龍女獻珠忽然變成男子即往南方世界化度眾生為何如此快速師豎拳云是男是女頌云是男是女莫分疏遲速寧非妄見乎直下了然親透徹聖凡元是眼中沙問欽師點破馬師那一圈那裏是他點破處荅斫額望扶桑頌云欽馬相馳本偶然拳來踢去兩無偏但能識得無偏旨斫額扶桑事了然問雲門餅趙州茶是何意旨荅有口難嘗頌云趙茶雲餅布諸方味本無形舌豈嘗多少衲僧空自反誰能於此細參詳問恍恍惚惚其中有物喚甚麼作物荅驢膫子短馬膫子長頌云驢馬之膫定短長杳冥恍惚妄追攀未能直下超方便徒自區區覓大唐問破灶墮和尚以杖擊三下其灶為甚墮破荅焦磚打著連底凍頌云灶坍因擊事何疑打凍焦磚恰逗機不向此中直下領那及閑神野鬼兒問仰彌高鑽彌堅瞻在前忽在後是何等境界荅也是鬼窟裏作活計頌云道出尋常日用間渾然一體絕鑽研擬心測度堅高者竟日情存鬼窟邊問心不在內不在外不在中間畢竟喚甚麼作心荅春色滿園關不住頌云三處求心竟沒蹤滿園春色豈朦朧擬推內外中間得關住陽春始許通問能為萬象主不逐四時凋萬象以何為主荅舌頭不出口頌云萬象另有主舌頭應出口兩彩元一賽何用更追求問泥佛不度水木佛不度火離卻水火作麼生道荅還我佛來頌云離卻水火佛還來震威一喝絕疑猜高山流水古來調舍卻子期善聽誰問一切眾生皮褁骨這箇眾生骨褁皮以草履覆龜背上是何意旨荅一盲引眾盲頌曰皮骨從來兩不離強分內外陷當機前人遺落今人問引起諸盲無止時問道也者不可須臾離也須臾之間道在甚麼所在荅墻壁瓦礫頌云說個須臾便間然須臾問道孰能諳信口荅他墻瓦礫未悟之人正好參問二十年坐破七個蒲團不明此事如何一日捲簾忽然大悟荅時節若至其理自彰頌云昧卻當人坐臥間蒲團七破尚蒙然捲簾若不因時至其理如何得自彰勘辨垂代僧參師問報恩在水鄉非舟莫至還有不假舟楫而到者麼有時云既到報恩無禪可參無道可學畢竟圖箇甚麼因春雪不消師垂問古人道直待雪消去自然春到來今日已是春為甚雪不消眾下語不契師代云只為春前無雪二僧到參師問三人行必有我師焉二人同行意作麼生僧無語代云同行無彼此共住不知名師因秋收日忙垂問貪利圖名滿世間不如破衲道人閒為甚終日忙得徹困眾無語卻問師師云須知有不忙者在僧云如何是不忙者師云下了麥子又栽菜眾搬磚次師問昨宵意旨則不問今日搬磚事若何眾無語自代云不是一番雙手黑難教風雪不來侵師一晚問眾截斷天下人舌頭即不無怎教無舌人解語如何是無舌人浚維那云風吹石臼演摩訶又問內傳法印以契證心外付袈裟以定宗旨如何是內傳法印那云請和尚尊重師云法印與宗旨相去幾何那云一手猶分掌與拳師云歸堂去行濟呈偈師接云更有長處麼濟云盡在裏許師翻轉云未見奇特濟云文彩已彰師云不露文彩處道將來濟云覿面全彰更無回互師休去僧參師問那裏來僧云蘇州師云蘇州有有個甚麼僧便喝師云除卻喝聻僧拍桌師云除卻拍桌聻僧拂袖而行師云呸秪是這個戎形僧參師問那裏來僧云棲真師云棲真因甚不棲真僧茫然師問眾眾荅不契師代云為要竿頭進步北寺僧參師云既是北寺因甚門向南開僧無語因天雨垂問雨落天留客天留人不留且道去是住是眾下語不契侍僧云和尚作麼生師云不從天意豈近人情僧云畢竟如何師云老僧自有安閒法不落尋常去住間問趙州一向喚人喫茶且道是好心不是好心一僧云大家在者裏又僧云珊瑚枕上兩行淚半是思君半恨君懏侍者云太平無忌諱何處不風流室中舉琅琊問舉上座那裏來舉云兩浙琊云船來陸來舉云船來琊云船在甚麼處舉云步下琊云不涉程途一句作麼生道舉以坐具摵一摵云杜撰長老如麻似粟拂袖便出且道那裏是瑯琊杜撰處泓書記云得人一牛還人一馬明知客云龍蛇易辨衲子難瞞一僧云若不同床睡焉知被底穿澤維那云其奈增金以黃問城東老母與佛同生因甚不欲見佛從維那云頭上不安頭沐都寺云求人不如求己澤維那云全體露風流一僧云水不洗水潮侍者云腰間自有青萍利懶見時人舞太阿一僧云金屑雖貴落眼成瞖師云總不恰老僧意僧云請和尚代一轉語師云見則成錯問踏翻大海踢碎須彌因甚平地上抬腳不起眾不契師代云只謂用力太過師一日云一人發真歸源十方世界悉皆消殞未審三仙寺還在不在眾無對復舉僧問大隨劫火洞然大千俱壞未審者箇壞不壞隨云壞僧云恁麼則隨他去也隨云隨他去未審大隨者語有為人處無為人處眾荅不恰佛階云識得東風面拈來總是春眾問師云畢竟還有為人處也無師云有眾云如何是他為人處師云無孔鐵鎚當面擲問趙州勘二菴主庵主齊豎一拳為甚肯一不肯一眾荅不契師代云菴主眼裏有筋趙州舌頭無骨僧參師問千里同風則不問覿面相呈事若何僧云相識滿天下知心有幾人師云如何是汝知心處僧云開口見膽師云放汝三十棒師到天童便出三問驗諸衲子荅者甚眾曾未契合江北高源禪人再三禮請代荅師云汝逐一問來問云太白峰千古長然為甚麼眼眼看來色是青底師云千聞不如一見二問古人道橋流水不流為甚清關橋端在者裏師云承言者喪三問玲瓏巖遠近皆聞山中人為甚不知漏逗師云我嘗於此切源踊躍禮謝而退代古韶山見白頭因問莫是多口白頭因麼云不敢山云有多少口云遍身是山云大小二事向甚處屙云向韶山口裏屙山云有韶山口即從無韶山口又作麼生因無語代云喚無口韶山得麼玄沙在雪峰時光侍者謂沙曰師叔若學得禪某甲打鐵船下海去沙住後問光曰打得鐵船也未光無語代云若無某甲鐵船今日怎得有玄沙雪峰在洞山做飯頭每日曉色未分大眾喫粥山問曰你因甚麼日日不失者個時候峰云瞻星望月山曰忽遇雲霧靉靆又作麼生峰無語代云師子咬人韓盧逐塊雪峰問僧近離甚處僧云覆船峰云生死海未度為甚覆卻船僧無語代云和尚莫錯好昔有僧持缽到長者家因犬咬長者問云龍披一縷金翅不吞上座全披法服因甚被狗咬代云雲月是同谿山有異昔有僧到曹谿因守衣缽僧提起衣云者是大庾嶺頭提不起底僧云為甚在上座手裏守衣缽僧無對師代云也須驗過末山尼因僧到問云誰僧云獅子兒尼云既是獅子兒為甚被文殊騎卻師代云君子能屈能伸有僧化金飾佛官人問云從來只有佛度弟子為甚卻要弟子度佛僧無對師代云捨得自己贏得他人大寂進三界圖帝問云朕居何界寂無對師代云願王頓超三界續語四則興化問雲居云權借一問以為影草時如何居無語後住山二十年方云當時何不向他道何必興化聞云何不道箇不必大慧云何必不必綿綿密密覿面當機請續末句師云喚龜作鱉天童悟和尚頌夾山參船子云離鉤三寸如何道一橈打下洪波跳忽覺來時自點頭請續末句師云死中得活方希少天童悟和尚示眾云莫立程途別用功行住坐臥看何從忽然看出何從的請續末句師云越古超今第一人南泉示眾云王老明明自賣身一時分付兩傍人可憐天下爭酬價請續末句師云盡是韓盧逐塊僧
