body:
  text: 嗣法門人行浚等編小參結制小參僧問龍蛇混雜凡聖同居今日結制如何辨的師打云者裏著眼進云如是則棒頭薦取師云釘樁搖櫓漢進云煆煉須憑宗匠手真金終不混泥沙師云瓦礫不勞拈出乃云十方同聚會箇箇學無為此是選佛場心空及第歸此四句語正是發明今日結制安禪的意旨世間有為之法可學出世無為之法又作麼生學現前大衆可有心空者麼若或未然山僧不免為汝葛藤一上世間之學純用見聞覺知出世無為之學全截見聞覺知然而有為與無為其體無二秪因最初一念不覺忽起見聞覺知即將無為真體轉成有為妄法復起憎愛取捨之情塵遂感沉淪三界汩沒四生如旋火輪無時休息今日要在一念回光截斷見聞覺知即將有為妄法元歸無為真體若得默契神會則與諸緣無礙故經云覺見即眚覺非眚中此實見見云何復名覺聞知見今學無為欲截見聞覺知只者箇欲截之念早墮於見聞覺知之中矣是以古人別資一種善巧方便將箇無義味話頭拋向學人面前令其參究學人但知參究話頭則與見聞覺知不期截而自截故曰十方同聚會箇箇學無為從上諸祖亦有不因看話頭起疑情而於一言之下頓悟無生者蓋其為生死大事之心真切腳未跨門早有一種莫可自決之念梗塞胸中雖千里萬里撥草瞻風孜孜只欲洞明己事或十年二十年不能自決此念愈久愈堅終不肯須臾忘卻因有如是之志力斯得於一言之下頓悟無生故曰此是選佛場心空及第歸且道一言之下作麼生頓悟良久云分明薦取除夜小參僧問日從東上月向西沒作麼生是不遷義師云自西自東進云與麼則年年是好年日日是好日師云好在什麼處僧喝師便打問歲朝即不問正當臘月三十事如何師云滿堂添瑞燭進云恁麼則鼻孔撩天去也師云且莫草草乃云今古人如新舊年去無歸所古何遷須知結角羅紋處盡在今宵爆竹邊香嚴老人云淨潔打疊了卻近前向我覓我即與你一棒我有一棒到你你須生慚愧我無一棒到你你向甚處會雪竇云有一棒到你你即受屈無一棒到你與你平出向者裏會有者商量道坐在淨潔處急須打疊向前覓的喫棒有分覓的是病棒即是藥如此見解盡是義學之流杜撰禪和了沒干涉殊不知二大老一箇埋兵掉鬥一箇偃武修文各欲坐致太平誰知反招怪笑卓拄杖云爆竹豈圖催獵去梅花無意挈春來小參舉金州操禪師一日請米和尚齊不排坐位米到即展具禮拜操下禪床米就操位而坐操即席地而坐齊訖米去侍者云和尚受一切人欽仰坐位卻被人奪去操云若三日後來受救在米果三日後來云前日遭賊師云金州失位米胡遭賊稱鉤打釘剛是拽直好箇伶俐侍者惜其龍頭蛇尾若是山僧見米和尚道前日遭賊便問和尚失卻什麼米若擬議便與掌云祖禰不了殃及兒孫非但米和尚欽服直使金州退身有分大衆還知山僧落處麼如或未知更為頌出陷虎機拔山力行無禮必反爾失火難教不及魚覆巢須識無完卵晚參古人道昨日晴今日雨時分不相應三日後看取報恩結制已來不覺又過三日大衆還知三日後看取底意旨麼知得底不在此限不知底各各提起本參話頭如撞著生冤家相似生與之俱生死與之俱死行也如是參坐也如是參住也如是參臥也如是參參來參去參到茶不知茶飯不知飯寤寐俱息動靜兩忘忽然㘞地一聲心花發現方知古人早已為吾漏逗了也今人不能妙悟者只為人心不古口說參禪但欲讀熟幾則機緣以資談柄做幾首詩偈干譽於人初無一點真實為道之心決志出生死之念所以言語轉多窠臼轉深葛藤轉盛生死轉熾永無證悟之期報恩不惜多言為衆說破莫墮時流各須猛省久立珍重晚參內外大衆精勤辦道常住淡薄無可供養報恩將盡大地為麵四海水為酵太虛空為蒸籠做箇饅首大如須彌硬似頑鐵熱若猛焰供養大衆且作麼生吞若吞得便可饑來喫飯困來打眠寒則向火熱則乘涼水邊林下散誕逍遙長養聖胎如或未然有寒暑兮促君壽有鬼神兮妒君福晚參僧問有句無句如藤倚樹時如何師云兩頭俱坐斷樹倒藤枯句歸何處師云八面起清風進云秪如溈山呵呵大笑又作麼生師打一拂子乃云報恩昨晚將無大得大一箇饅首供養現前兄弟不料現前兄弟客氣猶存更不加餐遂成虛設今晚怪不得報恩翻轉面皮反要與衆兄弟索取飯錢以見報恩冤有頭債有主有麼有麼良久云且道報恩是何心行不見道你有拄杖子我與你拄杖子你無拄杖子我奪卻你拄杖子趁此清宵明燭之下人天大衆之前不涉分毫思算輕輕還出便可以攪長河為酥酪變大地作黃金婢視聲聞奴呼圓覺不為分外倘或不能更聽二偈既然無麵為饅首那要開囊出飯錢叉手向前輕吐露方堪撥轉上頭關才看結制已經旬日後工夫要認真㘞地一聲非小可人間天上獨稱尊小參巍巍不是高堂堂亦非露坐斷路千岐踏翻雲萬斛大矣哉不借二儀之覆載明矣哉不藉三光之照燭出類也千聖難與同居拔萃也萬法安能為侶淨裸裸卷舒自在赤條條去住何拘無可以名其名無可以色其色無可以知其知無可以識其識不是心不是佛不是物恁麼也不得不恁麼也不得恁麼不恁麼總不得到這裏作麼生稱謂作麼生比擬作麼生提攜作麼生舉唱縱然有口秪堪挂壁何以如此只為他朕兆未形成露布言詮才立便乖張雖然如是亦不可盡法無民向異方便中聊通一線驀豎拂子云還見麼諸佛以此出世祖師以此西來歷代宗師以此接物利生天下老和尚以此鉗鎚衲子拈起也吒吒沙沙放下也平平貼貼不拈不放又作麼生吒呀卓朔能哮吼便是金毛獅子兒小參清寥寥白滴滴曾無障翳靜悄悄空豁豁那有形聲大悲千隻眼從者裏豁開釋迦百億身從者裏分出初無前後一印而成若是大根大器底聊聞舉著剔起便行呼喚不回羅籠不住直下不疑天下人舌頭便可以籠罩古今大方闊步其或根器未純尚留觀聽猶滯皮膚直須向己躬下一一透脫步步腳踏實地頭頭洞徹根源金剛圈有什麼難跳栗棘蓬有什麼難吞自無諸聖可慕無己靈可重無見聞可落無聲色可隨淨裸裸常光現前赤灑灑壁立萬仞全體恁麼來全體恁麼去喚什麼作生死喚什麼作涅槃喚什麼作煩惱喚什麼作菩提恁麼也得不恁麼也得恁麼不恁麼總得為甚如此當體如如不變不動所以張拙云斷除妄想重增病趣向真如亦是邪隨順世緣無罣礙涅槃生死等空花推此以導四生推此以資三有正當恁麼時利他一句作麼生道擊拂子云不須他處覓只此是家鄉除夜小參報恩今夜分歲不效諸方舊例也不烹露地白牛也不裏鐵餕餡饅首但將清水茶白米飯和盤擎出管教一箇箇飽齁齁地倘有箇漢未諳本分更向者裏索鹽索醬秪向道演若只因曾照鏡無端疑失自家頭明年更有新條在惱亂春風卒未休小參妙性沖虛神機炳煥非垢非淨不變不遷迥出斷常全超今古纖塵不立遍界難藏擬議思量當面覆卻若論當人分上者一著子本來具足覿體現成心佛衆生三無差別因迷悟有殊致聖凡有異衆生因迷而昧故曰生死諸佛因悟而了故曰菩提菩提生死其性無二無二之性量等太虛包括二儀含攝萬物為群生之府作沙界之依窮始極終無一法而不從此建立若乃當下了悟豈不慶快其或未能亦不可向別處尋討只將一箇本參話頭頓在眼前如靠一座須彌山相似生亦與之俱死亦與之俱時時參究刻刻提撕日久月深確志勿移如人行路行到水窮山盡處自然有箇轉身的時節那時㘞地一聲始信我不相賺故經云有能受持此一法隨順菩提正修行因持一法功德故速得成於無上道各宜珍重毋勞久立結夏小參一春風雨阻歸期久客他鄉獨抱悲非是石頭偏路滑便舟蹉過幾多時還有不蹉過者麼良久云待汝刻舟劍去久矣我輩衲子等是拋卻故鄉捨離恩愛擔囊負鉢度水穿雲那邊經冬這邊過夏若不把自己腳跟下一件大事究教徹頭徹尾也只是徒受辛苦枉喫清淡於己何益報恩者裏初本無意結夏但恐同居衲子空喪光陰虛消信施又念得人不在衆多是以復為結制已過關者不在此限專為未過關者設也更有一種兄弟坐在半青半白似有似無認得目前昭昭靈靈一些影子自謂了辦及乎被人把斷咽喉又去不得此病最難所以雲門大師道光不透脫有兩般病一切處不明目前有物是一透得一切法空隱隱地有物相似亦是光不透脫法身亦有兩般病法執不忘己見猶存墮在法身邊是一直饒透得法身放過即不可仔細撿點將來有甚氣息亦是病雲門大師慈悲太煞向人無插手處痛下一錐秪要諸人自肯知非急忙下手究竟窮極方為諦當不然逗到臘月三十日一點氣上一點氣下眼前墨黑肚裏慚惶當此之時悔將何及莫言不道久立珍重小參舉古德云結夏來三七日寒山子作麼生又有道結夏來三七日水牯牛作麼生復有道結夏來三七日燈籠露柱作麼生報恩即不然結夏來三七日己躬事作麼生若識得己躬事便識得燈籠露柱若識得燈籠露柱便識得水牯牛若識得水牯牛便識得寒山子若是攢花簇錦五色鮮妍還他從上尊宿報恩者裏一點也用不著解夏小參一夏九十日四十五日病因茲罷上堂亦無請說者諸人還覺空過麼若覺空過則不知有塵說剎說熾然說無間歇烏待老僧鼓兩片皮然後為說法諸人側雙耳然後為聽法斯乃緣心聽法此法亦緣非得法性須向老僧未入堂諸人未雲集時若乃聞得會得方可以縱橫宇宙獨步大方其或未能本參公案急要翻身胸次疑團直須打破那時入此鞴中銛利豈比今日便乃舉一明三目機銖兩鑒辨邪正偏枯賞罰鉤錐收放古云雖然舊閣間田地一度贏來方始休復舉溈山問仰山一夏不上來作麼生仰云掘得一疄地種得一籮粟溈云也不空過仰云和尚作麼生溈云午後一餐晚後一宿仰云也不空過說了便乃吐舌溈云寂子何得自傷己命師云溈山父子雖則父作子述盡善盡美正眼觀來大似父不慈子不孝報恩又不然若道一夏空過卻又終日生病若道不空過實無斯須所作且道與古人相去幾何擲拂子云空將未歸意說與欲行人除夕小參一年一年又一年人老何曾再少年今日不知來日事好花能得幾時鮮大衆臘月三十日本分事作麼生良久云了即便了不用沉吟者一條大路千聖共由自古至今曾無二致所以道莫不從茲法界流一一還歸此法界不見昔日舜老夫好罵天衣懷和尚秀圓通為之不平一日舜老夫上堂秀圓通出衆問云豈不見圓覺經中道舜老夫遽云大衆久立便下座歸方丈秀圓通云者老漢通身是眼罵得懷和尚也可謂隔墻見角便知是牛臨機轉變如獅子遊行得大自在諸人若善參詳管取千了百當其或未然來年更有新條在惱亂春風卒未休解制小參結有終始制有修短迷悟同源聖凡靡間即在此時無不了辦久參宿學舉著知歸後進初機卒難湊泊只如威音那畔空劫已前生佛未分還有結解也無到者裏三世諸佛口掛壁上歷代祖師緘口結舌那邊且置秪如現前大衆坐立儼然爐中是火盞內是茶花開庭砌燕語梁間與威音那畔空劫已前是同是別但能者裏緇素分明自然目前無法胸內無心外不見器界內不見根身上無攀仰下絶己躬一種平懷泯然自盡到者裏說箇結制解制長期短期不覺付之一笑且道見何道理便乃如是豎拂云會麼乍噴石榴紅似火新抽蒲草利如刀小參廣慧寺裏初安衆不比諸山事事全淡飯粗茶聊款客無床少帳地開單蕭然輕脫無餘事正是諸人入道緣曠劫秪因耽厚享祖師公案未嘗參從今翻轉娘生面反覆追尋仔細看看到水窮山盡處冷灰豆爆霎時間忽有箇漢到這田地便是佛佛授手祖祖相傳本來成現何必多般山僧向他道雖然舊閣閒田地一度贏來方始休復舉僧問大隨劫火洞然大千俱壞未審者箇壞不壞隨云壞僧云恁麼則隨他去也隨云隨他去又僧問修山主劫火洞然大千俱壞未審這箇壞不壞修云不壞僧云為什麼不壞修云為同大千師云相元虛恆泯一體性雖實常在萬緣大衆恁麼會得如來禪許你祖師禪未夢見在要會麼二由一有一亦莫守日午打三更面南看北斗歲夜小參一年將盡夜萬里有歸人途路忘辛苦風霜意不禁祗謀今夕裏事事得圓成且圓成一句作麼生道自攜瓶去沽村酒卻著衫來作主人復舉五祖示衆云去年底今年用不著今年底後年用不著用不著重遭撲自古至於今誰錯誰不錯忽有箇漢出來道白雲不是今日錯向他道錯古林和尚云扶豎臨濟正宗揭示楊岐奧旨還他五祖始得雖然也是泥裏洗土塊山僧即不然去年底今年用得著今年底後年用得著用得著重拈卻一步闊一步一著高一著或有箇漢出來道長老恁麼說話也是無孔鐵鎚向他道若是無孔鐵鎚正好用得著師云二大老雖然各出手眼扶豎宗乘撿點將來不無擔板廣慧又且不然去年底今年底後年底箇中無缺亦無餘用著用不著冷暖自家知饑餐渴飲吾生事醉後添杯誰道癡或有箇漢出來道長老你底說話大似水面葫蘆只向他道門前定不栽荊棘免使人來沾著衣合掌云大衆萬福承勞久立小參僧問把斷要津不通凡聖未審還許學人出一頭地麼師云你試出看進云金毛不距獅王窟翻身直上絶羅籠師云猶未出在僧喝師云正好喫棒進云學人知歸有地師云且放汝一著乃云廣慧未啓口葛藤遍天下若更之乎也誰能透祖關所以藥山問石頭云三乘十二分教某甲粗知嘗聞南方直指人心見性成佛實未明了乞和尚慈悲為我指示頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生山佇思頭云觀子因緣不在此江西有馬大師汝往彼去應為汝說山禮辭徑往江西復理前問馬祖云有時教伊揚眉瞬目有時不教伊揚眉瞬目有時教伊揚眉瞬目者是有時教伊揚眉瞬目者不是山有省便禮拜祖云子見箇甚麼道理山云某在石頭時如蚊子叮鐵牛祖云子既如是宜善護持妙喜云好箇話端阿誰會舉舉得十分未敢相許天寧云藥山秪知蚊子叮鐵牛不知鐵牛叮蚊子露柱親遭一口燈籠無地藏身嚇得馬大師變作老妙喜我且問你話端從何處說起師云話端且止秪如蚊子叮鐵牛鐵牛叮蚊子且道是什麼人語是藥山語是天寧語要透祖關未有日在擊拂子云欲得不招無間業莫謗如來正法輪解制小參世尊不說說迦葉不聞聞春天莫問路雨過便行程與麼與麼天共白雲曉不與麼不與麼水和明月流與麼中不與麼不與麼中卻與麼處處緑楊堪繫馬家家有路透長安且道路頭在甚麼處震威一喝云只此一喝如大日輪升於虛空有眼者莫不睹其清淨光明雖與空色同居而不與之和合當恁麼時還著得結解二字麼還著得參禪二字麼還著得佛法二字麼還著得世法二字麼還著得冬期夏期長期短期數字麼灼然著不得不見道般若如大火聚近之則燎卻面門又如塗毒鼓聲聞之則喪身失命直饒佛佛祖祖競出頭來顯大神通作大佛事橫說豎說莫不在此清淨光明之中發現於衲僧分上了沒交涉且道衲僧有什麼長處自主自賓還自僕空菴空榻復空鐺冬至小參四序遷移於中有不移之體一陽來復於中有不動之源洞徹其源了達其體者則不見有遷移之四序亦不見有來復之一陽等閒懸明鏡于高堂運神珠于掌上萬象森然舉無遺照從此撥轉路頭便可隨機赴感脫或未徹其源未了其體未免隨波逐浪循境漂流一切時中無本可據須省流陰瞬息時不待人一失人身萬劫難復真真痛念生死發大勇猛起大精進奮大疑情不計寒暑一往直前忽爾冷灰豆爆㘞地一聲方信肇公云旋嵐偃嶽而常靜江河兢注而不流野馬飄鼓而不動日月歷天而不周物既不遷我何生死之畏哉雖然到此如人入海愈入愈深何也不見古人道學道以悟之為難悟之以養之為難養之以利他為難故經云理則頓悟乘悟併銷事皆漸除因次第盡果真見道之後須向水邊林下長養聖胎消除舊習候龍天推出方可為人如其不爾秖可自了大衆各當記取毋自遺忘縱使千聖出來必以吾言為則珍重珍重除夕小參兩冬除夕在廣慧臘去春來總一般惟有面皮成老色始知世相本無遷忽有箇漢出來道面皮豈非世相既成老色寧不變遷向他道今歲今朝盡來年來日新復舉僧問香林如何是衲衣下事林云臘月火燒山雪竇云臘月燒山萬種千般翹松鶴冷踏雪人寒達磨不會大難大難佛果云雪竇隨摟搜不能截斷淆訛道林則不然臘月燒山特地無端綿包特石鐵裹泥團師云這兩箇老漢一箇醬中著鹽珊瑚瀲灩十洲春一箇雪裏送炭蟾蜍映奪驪龍窟然雖各得其宜未能使人頓了廣慧又且不然臘月燒山葛藤盡然清涼片石憑坐臥間且道廣慧與古人還有優劣也無卓拄杖云若將優劣較錯過目前機吳定之請小參一鉤橫似月三點燦如星不將心字會方是契心人心符居士還知山僧底落處麼若知山僧底落處便知歷代祖師底落處知得祖師底落處便知三世諸佛底落處知得諸佛底落處便知自家底落處所謂識得一萬事畢脫或未能山僧未免為汝重添注腳諸行無常示生滅法生滅滅已寂滅為樂於寂滅中體若金剛量同法界同天之覆同地之載同日月之照臨同山川之秀麗等萬象而不遺齊古今而一致流金爍石而不熱折膠墮指而不寒迥離蓋纏超出言義居士能向者裏一肩擔荷洞徹無疑便見即凡身而證法身了世智而明真智高超三界永絶四流然後為人父者即以此教子謂之至慈為人子者即以此報親謂之至孝為人君者即以此撫民謂之至仁為人臣者即以此事君謂之至忠本無罪可懺罪自冰消本無福可修福如川至無恩不報無冤不釋無行不圓無果不克頭頭合轍法法圓融花中摘其優曇寶中獲其如意更無有過上者故經云是大神咒是大明咒是無上咒是無等等咒且道因甚如斯此法能超一切一切不能超於此法卓拄杖云千峰勢到嶽邊止萬派聲歸海上消除夕小參去年除夕在三仙今年除夕在報恩去年除夕恁麼道今年除夕道恁麼伶俐漢向聞所未聞見所未見處瞪開隻眼洞鑒玄微便知釋迦如來四十九年說法未曾談著一字達磨祖師九年面壁未曾合著口唇如未能委直饒你乾坤坐斷一念萬年正是陰中活計縱使懸崖撒手自肯承當大用現前也須勘過何也干將非九冶鋒利只尋常昔日大慧舉香嚴示衆云如人上樹口銜樹枝手不攀枝腳不踏枝樹下有人問西來意答他則喪身失命不答他又違他所問是時香嚴才恁麼道便有傍不肯底喚作虎頭上座出衆云樹上即不問樹下道將一句來大慧云險香嚴呵呵大笑大慧云險徑山這兩險有一險如天普蓋似地普擎有一險料掉沒交涉還有揀得出者麼若揀得出非唯親見香嚴亦使虎頭上座無安身立命處如無徑山將現成公案為你諸人下箇注腳喚著竹篦則觸不喚著竹篦則背師云大慧老人可謂好手手中呈好手紅心心裏中紅心豈肯自誇秪要求人報恩亦因行掉臂打草驚蛇會中可有透此關者麼有則不妨出來道看無則報恩自道去也豎拂云爆竹喜聞仍送舊來朝共賀太平年小參通身是病通身藥藥病端端只此身此身無相亦無形藥病從來沒處著藥病無著身亦無即是諸人真面目真面目休卜度擬涉意根便成錯舉拳云若能於此解翻身物物頭頭俱透脫透脫即不無如何是物物頭頭底句良久云玉欄杆上青獅子紅藕花間白鷺鷥小參僧問金粟山中無底鉢天童寺裏破沙盆今日東塔意旨乞師指示師云腳下薦取僧以腳打地師云錯乃云一二三四五六七智愚老少俱明白忽然問著明白底鼻祖也曾道不識識與不識盡掀翻無位真人不用參認著依然還不是低頭擬議隔千山大衆且道如何方得諦當噫箇中若是白拈賊他要偷金定不難小參僧問四境相逼時東塔向什處出身師云別有通霄路進云學人不會請師直指師云忘卻話頭了乃云心本是佛計較即乖道不用修污染不得只此不污染底現前諸佛之所護念過去諸佛亦然未來諸佛應爾恁麼道早已污染了也早已落思惟計較了也故曰若人欲知佛境界當淨其意如虛空遠離妄想及諸取令心所向皆無礙大衆還知佛境界麼山空雲自在天淨月孤圓建薰塔大會小參四楞著地八面玲瓏巍峨逼塞虛空爭奈時人不薦山僧寓居於此雖則閉門打睡那肯獨善其身法堂前草親手芟除敢問諸人圖箇甚麼且喜文殊大士暗識機宜把住楗槌未嘗輕下何則雖有鎡基不如待時茲遇本山護法宰官善信捨難捨之資精彩浮屠嚴飾殿宇夜燃七級明燈晝禮三千諸佛明明洞地放光歷歷和聲吐出斯亦未見未聞之勝舉末法之難得者也雖然猶是有為之事直須頓契無為方得事事究竟何也只因曾見籬邊菊自不重論九月天復舉世尊一日與阿難行次路見古塔世尊便作禮阿難云此何人塔世尊云過去諸佛塔阿難云是誰弟子世尊云是我弟子阿難云應當如是大衆既是過去諸佛為何又是現在世尊弟子既是世尊弟子為何又作禮如是推求一一相反阿難為何又言應當如是能向這裏明得透得一切有為法當體即無為卓拄杖起身衆請晚參師云結制來經一七瞬息流陰駒過隙頃刻蒼顏變老顏此時不徹何時徹隱實施權善導師教人自扭自家鼻扭上單扭落地繞佛經行扭不易扭來扭去扭不休自然扭徹自家鼻扭徹鼻兮非等閒跳出樊籠入祖位腦後還須喫一槌方可利生作佛事所以百丈懷海禪師參馬祖侍行次見一群野鴨飛過祖云是甚麼丈曰野鴨子祖曰甚處去丈曰飛過去也祖遂扭丈鼻負痛失聲祖曰又道飛過去也丈於言下有省次日祖升堂衆才集丈出捲卻席祖便下座丈隨至方丈祖曰我適來未曾說話汝為甚便捲卻席丈曰昨日被和尚扭得鼻頭疼祖曰汝昨日向甚處留心丈曰今日鼻頭又不痛也祖曰汝深明昨日事師云馬祖如善點龍睛不點則已點則飛去百丈如世良馬見鞭影而趨師資道契更無過者此事雖不屬師非師而莫契故黃檗云不道無禪只是無師六祖云迷時師度悟時自度南嶽偈云心地含諸種遇澤悉皆萌我此一衆人人眼裏有斤箇箇皮中有血聞恁麼舉當下盡該瞥地如有瞥者到方丈通箇消息如未能者亦不可太迫何也將心待悟其悟轉遲雖然舊閣閒田地一度贏來方始休久立大衆伏惟珍重冬至晚參師云劍輪揮處日月潛輝寶杖敲時乾坤失色正恁麼時無佛可尊無法可說萬象不能藏覆四時何以變遷說甚群陰剝盡一陽來復不見道旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周以見太陽門下日日三秋明月堂前時時九夏既是群陰剝盡盡從何去一陽來復復自何來大衆還會麼擊拂云觀方知彼去去者不至方復舉趙州問寰中般若以何為體寰云般若以何為體師云好手手中呈好手長水問琅琊清淨本然云何忽生山河大地琊云清淨本然云何忽生山河大地師云紅心心裏中紅心伶俐漢聞恁麼舉撩起便行以見天空地闊海晏河清其或未然有寒暑兮促君壽有鬼神兮妒君福莫言不道久立大衆
