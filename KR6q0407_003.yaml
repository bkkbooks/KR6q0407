body:
  text: 嗣法門人行浚等編揚州府海門廣慧禪寺語録山門豎高三際橫闊十方從上諸佛歷代祖師天下老和尚俱從這裏入拽拄杖便進佛殿城東老母與佛俱生生不面佛新廣慧與佛俱生生不背佛大衆且道不面底是不背底是又喚什麼作佛以坐具拂云數聲清磬是非外一箇間人天地間伽藍虛而靈寂而照事無巨細一切管到拈香云凡有施為盡出公道祖師心相印氣相求不用陳年爛葛藤舉香云拈起分明便知有禮淮海祖師昔日聞名今朝覿面且道如何是覿面底事不説不知不識廉恥據方丈從上諸大老盡向這裏龜背上拔毛馬頭上截角且道新廣慧到來又作麼生卓拄杖云有條攀條指法座云人天寶座三次親登要坐便坐要行便行遂升拈香祝聖畢次拈香云此一瓣香從尸陀林裏得來向千聖出身處決了不敢囊藏對衆第三回拈出供養天童堂上先師密雲大和尚用酬法乳之恩僧問海門獅子吼龍象總來參如何是接物利生句師云瞎進云一片定光輝宇宙直教四衆盡沾恩師云誰是知恩者進云學人有賴去也師云別日再驗問德山棒臨濟喝除此二途有何指示師打云喚作棒喝入地獄如箭僧喝師又打問離四句絶百非時如何師良久僧罔措師打云鈍置阿師乃云收拾吳綸到海門垂鉤秪為釣鯤鯨直饒戴角獰龍至且向竿頭聽處分所以古人道你有拄杖子我與你拄杖子你無拄杖子我奪卻你拄杖子有則偏與無則反奪得失是非誰能辨別欲得梅花香撲鼻定要一番寒徹骨然雖如是忽有箇不受煆煉底到來又作麼生拈拄杖卓云美玉不雕難作器旃檀受刻始成形上堂法身無相般若無知無相故隨類現形無知故遇緣即照三元山高不過十餘丈日日煙雲靄靄福山渡闊不過百餘里時時波浪滔滔海門與寺門貼對潮音共梵音齊響旭日照高樓衲僧得暖朔風吹古柏幽鳥添寒豎拂云大衆看看者箇是拂子那箇是法身指香爐云者箇是香爐那箇是般若直繞道得溪聲盡是廣長舌山色無非清淨身拄杖子未肯點頭在何也曹溪波浪如相似無限平人被陸沉上堂年初三好事不相瞞平常心是道何用更加參門裡出身易身裡出門難五臺山上雲蒸飯佛殿階前狗尿天且道是出身句出門句驀豎拂云竹密不妨流水過山高豈礙白雲飛復舉鵝湖問諸碩德曰四威儀中畢竟以何為道有者曰知者是鵝曰不可以智知不可以識識何謂知者是或曰無分別者是鵝曰善能分別諸法相於第一義而不動何謂無分別者是或曰四禪八定是鵝曰佛身無為不墮諸數何謂四禪八定是衆皆杜口妙喜云相罵饒你接嘴相唾饒你潑水天寧曰僧投寺裡宿賊打不防家師云廣慧又不然端坐受供養施主常安樂上堂舉六祖大師因僧問曹溪意旨什麼人得祖云會佛法人得僧云祖還得否祖云不得僧云為甚不得祖云我不會佛法妙喜云還見祖師麼若還不見為汝指出乃云蕉芭蕉芭有葉無丫忽然一陳狂風起好似東京大相國寺裡三十六院東廊下壁角頭王和尚破袈裟師云且道有指示無指示若道有指示指示在什麼處若道無指示妙喜老人豈是妄言良久云出頭天外看誰是我般人上堂心無自性假境而彰舉拂云喚作拂子則觸物無自體因心而現不喚作拂子則背心境俱泯性體亦忘畢竟喚作什麼搖拂云還會麼若也不會更通一線良久云明月堂前垂玉露水晶宮裏撒珍珠復舉于頔相公訪紫玉禪師問如何是佛玉召于頔公應諾玉云更莫別求公不契藥山聞云于家箇漢可惜埋卻紫玉山中公聞之竟造求決依前問如何是佛山亦呼于頔公應諾山云是什麼公于是有省師云藥山秪知紫玉埋卻于頔殊不知于頔埋卻紫玉于頔但知向藥山處求救而不知反被藥山埋卻何也不見道向第三句中薦得自救不了解制上堂僧問九旬禁足魚投網三月安居鳥入籠如何是出格為人一句師便打僧云白拈手段憑師顯更整綱宗利有情師云將謂別有麼僧云頭頭垂示處仔細好生觀師云元來元來僧云一等擎天手當機各有奇師云猶是詐明頭乃云剔起少林燈誰不生歡悅吹殺暗中行各要知時節奮佛祖鉗錘提衲僧巴鼻咸謂頂門眼正肘後符靈不肯深培厚蓄急欲播弄唇皮大似靈龜負圖自取喪身之兆鳳縈金網欲趨霄漢何期正當解制一句作麼生道春色滿園關不住任他紅杏出墻窺更有一偈舉似大衆腳下草鞋肩上包輕鬆那怕路途遙轉身換步無多子試看春風度柳梢彌勒院請上堂二月二瓜菜豆茄齊落地來朝受用在今朝今朝不辦來朝悔世法佛法沒兩般唯有禪家不等間赤體挨開無縫塔常把南辰向北看更有一般奇特處寒時向火熱乘涼忽有箇傍不甘底出來道長老既是向火乘涼有什麼奇特只向他道茫茫宇宙人無數幾箇知歸到此間復舉甘贄行者往南泉和尚處設齋黃檗為首座者請施財檗云財法二施等無差別者舁錢便出須臾復入云請施財檗云財法二施等無差別者即行嚫妙喜云一等是隨邪逐惡雲居羅漢卻較些子師云且道雲居羅漢即今在什麼處大家指出看良久云如無廣慧自指出也彌勒院裏也不識師誕日上堂舉龐居士問馬祖不昧本來人請師高著眼祖直下覷士云一種沒絃琴唯師彈得妙祖直上覷士禮拜祖歸方丈士隨入云適來弄巧成拙妙喜云馬祖上覷下覷則不無爭奈昧卻本來人龐公作禮也是囫圇吞箇棗祖歸方丈士隨入云適來弄巧成拙也救得一半天寧云説什麼救得一半他日換手槌胸去在師云龐居士高高峰頂立馬大師深深海底行妙喜老漢眼空四海傍若無人不料被天寧覷破且道覷破意作麼生三級浪高魚化龍癡人猶戽夜塘水上堂一春三箇月二月多風雨此月不同前芳菲遍桃李桃豈自能紅李豈自能白紅白分明不在花在花卻被他埋沒不埋沒從茲透露真消息非但覷破古靈雲亦乃覷破老迦葉所以陸亙問南泉云肇法師道天地與我同根萬物與我一體意旨如何泉指庭前牡丹云太夫時人見此一株花如夢相似南泉點醒陸亙廣慧點醒諸人且道廣慧點處與南泉點處是同是別若道是同未具參學眼在若道是別亦未具參學眼在畢竟如何易分雪裏粉難辨墨中煤上堂今朝三月半春月光繚亂穿花過柳落前溪是處澄潭無不現所謂相元虛恆泯一體性雖實常在萬緣且道如何是萬緣底性以拂子打圓相云本無偏照處剛有不明時上堂三春已過九夏初臨聚玄徒與林間扇真風於世外篆不雕之心印提出格之宗乘且道出格宗乘作麼生提還有道得者麼良久云麥子頭垂春熟好豆花口吐莢前心送法被莊嚴至上堂清淡廣慧寺莊嚴半點無通州季菴主成就化檀那供養三寶尊得福非小可為衆請説法度人還自度此是大乘因定獲大乘果山僧無法為人説升座無非告真實鵲噪鴉鳴代舉揚柳緑桃紅呈妙訣箇事從來不覆藏臨濟德山徒棒喝輸他鼻祖自知羞獨坐少林唯面壁此是人間大丈夫令余千載常相憶常相憶內外身心如鐵石大衆身心既如鐵石為甚又常相憶良久云是精識精是賊識賊毫釐有差天地懸隔到虎丘上堂僧問針芥相投師資契合隆祖家風重為克振師云緑樹陰濃夏日長進云龍得水時添意氣虎逢山勢長威獰師云也是依他做就問潑天門戶龍象奇逢舊國新王即不問子承父業事如何師便打進云擊開金殿鎖撞動玉樓鐘師云勞而何用進云秪如坐致太平又作麼生師云月明簾外轉身難進云四海浪平龍睡穩九天雲靜鶴飛高師云許汝一半進云這老作家猶在師云纍及老僧不少士問法王法令今日重新睡虎遺風乞師垂示師豎拂子云還見隆祖麼進云法窟窟中獅子子一聲哮吼萬人驚師云低聲低聲進云恁麼則水秀山明地靈人傑去也師云猶是兩重公案乃云才入空門慕此山到來果爾不尋常石頭塊塊生公列緑樹條條露祖顏先聖時時升紺座梵天日日繞華筵衆中莫道無聞見剎説何曾有間然所以道諸佛道不及處人人開口道著諸佛行不到處人人舉步踏著既然道著又能踏著因甚問著十箇有五雙不知落處只為分明極翻令所得遲卓拄杖下座上堂僧問打鼓弄琵琶相逢一會家清風拂白月地角接天涯賓主相逢即不問願聞法要請師宣師便打僧便喝師又打僧又喝師云三喝後又如何僧禮拜云舉頭天外看誰是我般人師云果然乃云挈杖沿場事不凡豈貪香供入人間一條白棒求知己果是英靈出衆看拈拄杖卓一卓云不向此時親決了空教兩鬢著霜寒上堂前宵愁夜雨今日喜天晴了達其中旨高低一坦平所以道藏身須是沒蹤迹沒蹤迹處莫藏身塵塵盡是毗盧佛色色無非觀世音海中有月毋撈捉腳下無舟努力撑既是無舟撑箇甚麼下坡不走快便難逢開爐上堂廣慧寺裏復開爐出礦精金會也無直下不生顛倒見管教凡聖兩情枯所以古人道凡聖情盡體露真常事理不二即如如佛且道佛在甚麼處塞北千人帳江南萬斛船上堂天上月圓人間月半欲隱彌露擬晦全彰是以釋迦掩室于摩竭無剎不現淨名杜口于毗耶聲震大千無舌人方能解語無手人正好行拳德山棒如雨點臨濟喝似雷奔正是好手手中呈好手紅心心裏中紅心恁麼事須是恁麼人若得恁麼人自然舉一明三目機銖兩面南看北斗低首望青天拈起時纖塵不立放下時萬彙齊彰且道不拈不放又作麼生當陽皎潔無回互一道孤光朗太虛上堂海門何可羡所羡是諸山屢捐清淨資作供到三仙三仙無所長何德報諸山呈拄杖云只將這條棒棒棒棒諸山棒下忽翻身所酬非可量不是涅槃心亦非正法眼千聖不能名萬靈徒渴仰獨有過量人到此絶伎倆大衆既是過量人為甚卻絶伎倆四海浪平龍睡穩九天雲靜鶴飛高歲朝上堂舉香嚴云去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧連錐也無真淨云去年富未是富今年富始是富去年富只有一領黑漆布衫今年富添得一條百衲袈裟歲朝抖擻呈禪衆實謂風流出當家鳳林云香嚴貧未是貧奈何猶有箇渾身真淨富未是富家私未免俱呈露鳳林這裏不説富不説貧隨家豐儉沒疏親豎拂云收來兔角長三尺放去龜毛重九斤師云可謂蚌鷸相持俱落漁人之手廣慧鼠尾續貂也要出一頭地也説富也説貧客來管待驗疏親豎拂云時逢瓠子彎彎曲才遇冬瓜儱侗伸解制上堂舊冬結制遲今春解制速只要己事明毋論期延促筆描菩薩火中行泥捏金剛水底宿不作奇特商量已得見超佛祖阿呵呵會也麼解開布袋口放出甕中鵝海安廣慧寺上堂才過新春與上元臘梅開了白梅開柳眼才青桃萼綻莫教錯過好生看衆中還有善看者麼不妨出衆與拄杖子相見無則山僧別行一路去也世尊四十九年説法未嘗道著一字雖然不道一字函函翰墨淋漓祖師十萬餘程西來未嘗接得一人雖然不接一人箇箇頂天立地權實雙行性相不二縱奪自由主賓互換所以天龍秪豎一指祕魔一味擎叉德山入門便棒臨濟入門便喝斯皆藏身須是沒蹤迹沒蹤迹處莫藏身如能諦信無疑管取一生了辦復舉白雲端和尚云若端的得一回汗出一莖草上現瓊樓玉殿若未端的一回汗出縱有瓊樓玉殿被一莖草蓋卻山僧今日拈卻一莖草且道瓊樓玉殿在甚麼處拈拄杖云還會麼海門到此二百二更加二百到揚州上堂春風習習春雨霏霏陳陳示古佛家風點點演今時妙義法無異相即色全彰時無異緣和聲吐露上根利智一聞千悟獲大總持撒手懸崖更無餘事且應時一句作麼生道芍藥花開菩薩面棕櫚葉散夜叉頭上堂目前無法正體昭然所以山不是山水不是水人不是人物不是物萬象歷然神機廓爾所以山即是山水即是水人即是人物即是物提起金剛王斬斷有無見向名言未立文彩未彰已前一時坐斷如天普蓋似地普擎等虛空之寬廣同日月之恆明一切處無不圓滿一切處無不周遍淨裸裸了無得失赤灑灑併絶見聞上無佛道可成下無衆生可化向威音那畔藏身卻在聲色門頭吐氣等間現出三頭六臂橫拈倒用逆行順化隨機赴感於一毫端現寶王剎坐一微塵轉大法輪正與麼時且道如何指示一言難啓口千古意分明啓建龍華大會衆居士請上堂師云法無定體遇緣即宗祖意全提十方坐斷從上佛祖有口只堪挂壁衆中有超佛越祖者麼出來道看僧問世尊靈山會上説法慈氏龍華會上説法是同是別師云分身兩處聽進云聽後又如何師云便能獅子吼進云獅子作麼生吼師豎拂子云聞麼進云某甲不聞師云正是有耳不聞華藏語乃云昔投嘉會已堪誇此日還過喜更多建設重重勤接引現生同遇入龍華現前大衆既與老僧同入此會當與老僧同見同聞龍華教主三會説法度無量百千億衆即今在山僧拂子頭上現大人相放大光明初會説法大衆還聞麼若也聞得且道説甚麼法若道不聞是為有耳不聞華藏語既不能聞則不能見是為有眼不睹遮那身既然不聞不睹雖入而不入雖遇而不遇便成空過有何益哉已過關者不在其數未過關者若是眼裏有筋皮下有血聞恁麼話便能奮起新鮮志氣咬緊牙根捏緊拳頭豎起脊梁晝三夜三定要討箇分曉討來討去忽然討著便見身心本空見聞莫及上無攀仰下絶己躬便與龍華教主把手共行非為分外到恁麼地始不負入此大會使建會衆姓各獲無量不可思議之福是則名為福田僧也敢問大衆討來討去忽然討著底事作麼生還會麼屋上直排三道麴門前低叫一聲糕卓杖下座海門衆居士請上堂師云百年難遇歲朝春生世罕逢龍華會歲朝春不遇於我何損益龍華會不逢福因無處植是以諸位善信來入三仙發此莫大之勝心協力建此龍華大會成就一切宰官長者善男信女種此莫大之善因可謂萬善同歸六度齊修自利利他之佛事皆悉圓滿矣何也欲引一切成就檀波羅蜜故建此龍華道場欲引一切成就毗梨耶波羅蜜故建此戒堂欲引一切成就忍辱波羅蜜故建此般若堂欲引一切成就精進波羅蜜故建此大悲堂欲引一切成就禪波羅蜜故建此觀堂欲引一切成就智慧波羅蜜故建此華嚴堂雖然欲窮千里目更上一層樓不見梁武帝問達磨祖師朕自即位以來造塔建寺供佛齋僧有何功德磨云此是人天小果有漏之因非真功德帝云如何是真功德磨云淨智妙圓體自空寂如是功德不以世求帝問如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識今有一頌舉似大衆鷓鴣啼處百花香信步間行踏帝鄉寄語途中未歸客休將此語錯商量下座上堂龍華教主無我執故得分身千百億百億世界坐道場百億世界莊嚴具百億世界化群迷百億世界修供養身放百億大悲光六道衆生皆解脫何故聻獄道衆生遇此光轉苦趣為樂土鬼道衆生遇此光轉飢虛為飽滿畜道衆生遇此光轉愚癡為智慧人道衆生遇此光轉十惡為十善羅道衆生遇此光轉嗔心為慈悲天道衆生遇此光舍快樂而修菩提師驀豎拂子云即今彌勒世尊又放一光了也大衆還見麼若也見得便與彌勒齊肩脫或未然龍華大會難遭遇報本酬恩在目今下座上堂龍華會啓慈雲彌覆於娑婆水陸堂開法雨普滋於震旦一毫頭上現寶王剎莊嚴別是一乾坤一微塵裏轉大法輪梵唄永歌於晝夜還有騎聲蓋色者麼良久云不見道心如法亦如無實亦無虛有亦不管無亦不拘不是聖賢了事凡夫若據龐居士如來禪則可祖師禪未在且道如何是祖師禪陳雲橫海上豎拂云拔劍攪龍門擊拂下座上堂僧問龍樹枝頭光赫奕全彰箇段真消息果能直下便知歸何待當來問彌勒直下知歸則且置如何是箇段消息師豎拂云會麼進云恁麼則四方八面活潑潑縱橫沙界露堂堂便拜師云未是這箇消息乃云昔年去去實不去土山嶺上多柏樹今歲來來實不來山門依舊向南開不去不來成底事大家出手建龍華所以昔日龐婆入鹿寺設齋維那請意旨回向婆子拈梳子插髻後曰回向了也便出頌曰牙梳反插鬢雲斜文綵分明莫點加堪羡老婆多伎倆能將公道驗龍蛇大衆且道如何是龐婆底公道豎拂云橫按莫邪全正令太平寰宇斬癡頑下座上堂才過初一又逢月半流光易邁幻境非堅大家好整歸鞭莫待手忙腳亂販夫灶婦懇切瞻依外道魔人誠心歸命庶免閻老子打算飯錢其或不然打鬼朏臀有日在敢問大衆歸鞭作麼生整不見古人道百骸俱潰散一物鎮常靈百骸潰散終歸土一物常靈何處安頌曰一物常靈何處安白雲散盡見青巒排空聳翠磨今古剔起眉毛仔細看如其不會正好加參上堂言言見諦八角磨盤空裏轉句句超宗三腳驢子弄蹄行不落離微一句作麼生道天高群象正海闊百川朝復舉昔時法華和尚終日誦法華一日誦至諸法從本來常自寂滅相豁然大悟添後兩語春至百花開黃鶯啼柳上據老僧檢點將來是則也是是則未是何也只為冬行春令老僧亦續二語諸法從本來常自寂滅相十月天漸寒綿衣及早辦不敢與古人鬥巧只要應箇時節下座
