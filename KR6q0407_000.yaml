front:
  text: 浮石和尚語録敘昔張文定謂三代以下儒門淡泊收拾不住英靈漢子盡歸釋氏舉馬祖坦然丹霞輩以實之張無盡賞為名言然達磨西來不立文字形於紙墨何有吾宗諸方説禪浩浩徒以組章織句為工其去經生家掇拾餖飣詫為洙泗淵源者何殊燕乙也夫五宗之盛莫如臨濟自應菴華密菴傑諸老而降一條白棒直接人天大用大機實心實行舍密雲老漢外寥寥不少概見近則首服膺報恩浮老和尚蓋其天懷日朗道氣風疏早歲餐糲蘸鹽神枯形瘠發甘死禪席之願入定終日如寸香頃脫白未幾固已人法雙忘矣後從七女尸陀林有省旋於殿角薰風公案打失鼻孔得大休歇得大解脫覺從前陳爛葛藤看破都只尋常密老人猶未輕相印可復取靈苗根本二語俾作義理禪論直至表裏洞然手口無礙始有隨處開堂代余為衆之記莂其間啐啄同時針芥相取真不啻古人拽倒繩床輾車直過矣從此全提正令八坐道場用賞用罰劈面惡鉗魔來佛來驀頭生按海內有是父是子之目今全録具在掀翻窠臼洞揭真源斫伐稠林都無死句詎承虛接響一流所能倣佛哉蓋如妙峰親見德雲莖草能操殺活宜乎虞山老毗耶以善財南詢文殊採藥為斯編譬喻説法也夫曹溪之後分為二枝而臨濟獨盛臨濟之後分為二枝而楊岐尤盛可見委曲垂手不如直截提持者之於今為烈矣試讀師諸録如百尺孤桐無枝可蔭如懸崖萬仞迥絶攀緣雖不離文字而依然不立文字之綱宗彼監寺受記於慈明廝兒受記於黃檗一則謂異日兒孫遍天下一則謂吾宗到汝大興於世或者與師後先合轍乎築土應占分燈現瑞黃園五色金蓮之徵庉村浮來石佛之讖彰彰若彼豈偶然已哉豫才讓髯蘇莫殫參寥之蘊悟慚無垢寧窺妙喜之藏因師法嗣拳石沃公之請謬辨數言於首他日名載傳燈偕垂不朽淡泊儒門藉以生色矣四明弟子史大成立菴父薰沐敬題浮石禪師諸會語録序浮石禪師刻福城語録竟請余為之序既而檇李松陵廣陵諸會語録次第刻成復以全録序為請余之序福城録也舉善財南詢因緣謂師於妙峰頂上親見德雲了畢大事再舉文殊採藥因緣拈出師一片老婆心與四海禪宗點眼此中是草是藥能殺人能活人明眼人試一著眼如數家珍如觀掌果福城一會如是檇李松陵廣陵諸會語録亦復如是即由此升座説法坐盡此世界微塵剎數道場亦一一如是故知師雖坐福城不起於座而歷檇李松陵廣陵諸會師雖現説福城語録不動舌本而遍説檇李松陵廣陵諸會語録何處不是草何處不是藥何一味不能殺人不能活人東澗老人自笑舌頭短為此老作福城語録序如是乃至作諸會語録序亦復如是若於此處會得正不妨一莖草上定綱宗也老人説是言已有人笑曰文殊師利勸善財南行於妙峰山頂求見德雲善財至德峰經七日已乃見德雲比丘於別山經行自在公于福城諸會見浮石和尚安知和尚在德峰住地耶在別山經行耶佛不云乎如人持尺量虛空復有人隨計其數公將持尺量虛空乎抑亦將隨後而計其數乎余聞之大笑并書之以為敘歲在壬寅五月朔日虞山蒙叟錢謙益撰浮石禪師語録序不慧憶從丙子初夏走四明天童覿面密老人逮己卯初秋復晤於吾里黃暗翁素園中值余匆遽赴召時聞之暗翁云適夜夢園池雙開五色金蓮恰得浮石林野兩和上為老人同日囑付的的莫大因緣余歡喜讚歎云此真祗樹給孤獨園也嗣後滄桑幻化蹤迹越寥丁亥冬日余從雍廂假還晤林和上於東塔方丈始知東塔為浮和上舊道場逮壬辰秋日復假還聞牧和上繼林天童之席浮和上復繼牧席始知天童為浮和上新道場矣既得從東谷堅法嗣通一番天童消息莊誦五會餘録始知自當湖青蓮而松陵報恩而海門廣慧而嘉禾福城而入主天童祖庭説法浩浩早已傾溟渤而倒須彌矣逮丁酉春日吾檇李諸檀信虔從報恩延主棲真雲谷和上道場不慧特放遠棹竟日落草盤桓矜式孤峻高標祖風丕振未幾而還主報恩矣話到威音那畔直是竿頭進步徹底掀翻薑桂天性到老逾辣入泥入水無非為人九鼎在法門千秋所希有也即有善頌者對蜜説甜徒作合頭誑語庶幾據實敘事聊當晏坐麈談云爾康熙改元嘉平月望國子司業兼掌祭酒事前戊辰二甲進士虞衡郎副廷尉冏少卿曹溪憨祖親侍弟子福徵談貞默槃談撰時年七十有三浮石和尚語録跋浮石禪師語録目次卷一住嘉興府平湖青蓮禪寺語録蘇州府吳江報恩禪寺語録卷二蘇州府吳江報恩禪寺語録卷三揚州府海門三仙廣慧禪寺語録嘉興府東塔禪寺語録卷四寧波府天童景德禪寺語録秀州棲真寺語録常州府宜興善權寺語録卷五蘇州府常熟福城禪寺語録卷六小參卷七入室問答機緣勘辨垂代代古卷八拈古頌古法語卷九偈贊佛事雜著行實卷十詩偈浮石禪師語録目次終
