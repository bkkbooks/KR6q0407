body:
  text: 嗣法門人行浚等編偈贊古林寺募糧世界未成此寺先興歲序既行不動此林中有偉人勞構軒楹頓空我相善接雲朋百事皆具一切現成十方歸望若故居亭駢肩接踵絡繹如雲日給不敷用告檀那儘力施來泥多佛大十二時夜半子昨日纔完今日始唯有無為學道人終日凝然貓捕鼠雞鳴丑一覺翻身便抖擻無端豎起銕脊梁驚得泥牛銜月走平旦寅披起衲衣開大門踢醒巖前睡菸菟佛祖都來一口吞日出卯萬仞山頭先已炤入廛垂手沒疏親兔兒不食窠邊草食時辰一眾都餐不溼羹偃鼠飲河非吾種大鵬劈海取龍吞禺中巳萬行花敷普賢智豈做尋常鱉鼻蛇養長頭角興雲雨日南午分明打出三更鼓金毛獅子忽翻身木馬嘶風叫冤苦日昳未大白牛車平等賜雖有小根小莖來不效瞿曇羊鹿濟晡時申打得獼猴箇箇惺直教不外攀花手便是如來清淨身日入酉窗禽也解尋窠走須臾大地黑漫漫千聖從來不知有黃昏戌我家獵犬當門立管你千賢萬聖來劈面一口要見骨人定亥野豬帶箭攻人稼震威一喝豁然惺一輪明月當空掛山中四威儀山中行楖栗橫擔破白雲上層巒遠眺愈精神山中住卓立懸崖無所繫者一層那個人敢履山中坐爐焚柏子香易過峭巍巍冷眼俱覷破山中臥月移松影穿窗過蝶夢斷不識人間路示鑒可禪人屈指參隨已十年鵬程尤滯半途邊直教展翅南溟候得座披衣事事全觀音大士稽首大悲王能拔諸有苦一手援一道六道悉安妥欲與一切樂是樂等於我若有一不肖罪自心未普眾生何所之但向染邊趣捨自尊貴身說法示同類日月掌中擎晝夜永立佇引入聞思修共證圓通智又眾生好染不知非大士隨機現白衣瓶瀉柳頭甘露水得霑一滴世間稀又鬚髮青疏慈容滿月跏趺端坐度諸苦厄將錢買餅人盡知拈出瓦瓶誰測識要測識問取嘉禾孫和石又誰家籃裏無金鯉賣弄人前努著嘴不辭提得臂兒酸要使人人暗相委暗相委一段風流徹骨髓又渺渺洪波不易尋多年撈摸始相親今朝豈是閒提出要使閻浮人見真咄又普門大士示多身遍歷塵間六道行逆順強良慈一體故將多手接多情又普門大士狀千般隨相生情被孰瞞昨日入廛今出海何曾異卻半毫端又不向街頭賣冷坐待人來問著籃中物言魚口錯開達磨一函經一拄杖一箇缽盂隨身放梁皇殿上聖亦無少室峰前法豈剩默然趺坐語如雷九十六種俱膽喪接得神光一個兒斷臂安心作榜樣又杖頭經腳下葦褰裳濡足誰相委不因走入驚人浪那得竿頭稱意魚又採寶須憑識寶人陽春雪曲孰曾聞不是祖師來太早要留樣子曉兒孫壽亭侯協力匡先主全憑偃月刀七軍謀已決三足鼎時操破壁光炎漢封金壓魏曹書中明底事儘可悟英豪天童密和尚像贊一條白棒不離宴坐是聖是凡毫無放過打斷命根猶未歇手直待再蘇有出身路出身路未舉棒前都蹉過又世壽七十七說法二十五萬指常繞圍半字何曾吐牽出楊岐三腳驢便教認取玄沙虎邵先生遺真心宇邵先生余生未相識所以睹尊容是非莫能決或曰是先生余乃未敢諾或曰非先生余亦未敢別不諾不別間恰與先生合先生達生理故曰帶不來先生達死理故曰帶不去不來與不去此是無生訣無生無不生生生繼不絕臨行三囑言子孫遵未歇於此見先生先生奚生滅冶堂孫居士小像童子倚杖而立冶翁執拂而坐余欲發其高誼未敢輕意露布不露布午夜正明天曉不露一空禪師小像秦山曾結社東塔共參隨破家散宅後天涯各自趨愧我多飄泊羨君獨掩扉兀坐三十載陶然如一日生平不露頭角臨終稍吐風規咄莫待夜行剛把火直須當道與人知湘南居士乞題行樂長松下怪石旁揮羽扇坐琴床一段天機急須自薦討盡世間便宜不落思筭徬徨待伊轉得身時方好喫余痛棒明湛法師像聽出聲見超色一點孤明湛然不息有時陞座談經有時跏趺靜默欲識阿師行履不落聖凡階級俞秋來小像是僧非僧是俗非俗三教精通百氏咸熟突出烏珠仔細看展開兩手是什麼非但淨名杜口鼻祖也道不識白齋律師像四大本空人人著相五蘊非有念念攀緣著相故莫肯捨其一毛攀緣故誰能空於一念一念若空捨全身不吝四相不著燃諸體何難顧爾白齋其見是歟兩手秪存五指一身備及萬行古之藥王善見即今白齋今之白齋即古藥王善見分實不分相原無相渾古今為一體濟五濁而無方先老和尚贊銅棺山頂大徹禹門堂上親傳一條白棒振起濟北將墜之綱宗六坐道場直指積劫沉埋之故寶若貧兒遇王父受用無窮似病子得良醫了生脫死慈悲莫及恩大難酬當年不遇提攜今日何從得識寤寐尋思無可酬舍己從人堪報德又若言是我師我師已去世若言非我師面目渾不異是與不是總皆虛我師之真紅冶知又老漢從來沒樣丹青妄描其狀若還是我本師那有閒功坐上忙忙六道拯迷流度盡眾生方了願又描也描不成畫也畫不就通身一條棒棒下令人透果能透體露堂堂無別有咄巖芝師小像纔出龍池門開闢罄山去今將四十年撐天并拄地有耳誰不聞有眼誰不見露柱掛燈籠山門朝佛殿一生參學事已成兩手相扶猶不放護法鎮府楊公像贊堂堂楊公維周之虎世出名胄在夫子所爰及公身繼光乃祖不煩一矢定茲南土吳民艾安辭祿養素德望信人功烈遠播晚歸法王作法金湯追美大年為紀為綱物外世間並濟休光眉宇豐隆實維楊公南山有松媲美斯容侍者純素為師祖洞然請題像贊欲識洞然師從來未常晤忽見紙上的怳然如會過者個即洞然只恐成差誤者個非洞然眉目誰遮護直須掇轉太虛看萬象光中全體露亭亭兮玉樹丰標凜凜兮冰壺襟度琅玕山裏建叢林玅泉堂上真慈父輪珠靜坐默無言從教海底旋烏兔咄懸向高堂松蒼石古雲停耿居士像身居濁世意尚清閒屠刀放下與佛齊肩參禮多方知識唯求一著機先誠為法門弟子世儒拱手推賢仁廉義廉青草卓卓白雲邊道弘德弘綠水涓涓碧澗中踏翻大海踢倒孤峰咄這裏識得不枉覿面相逢見月律師像持戒但束身非身何所束當頭能坐斷是名真見月雲山居士像贊雲山自古兩相依雲作山裳山作居脫去遍空籠宇宙收來小塢可藏伊花開碧軸家常畫水瀉清泉供客炊彼此互為誠自得天然一種不思議自贊孤卓首座請行也然坐也然語也然默也然行坐語默體安然從來本體難描畫畫出誰知失本然欲本然卓卓孤峰獨頂天範圍首座請者漢本來沒樣丹青怎生描狀認取者個便是摘花碓杵頭上不假摩醯隻眼洞徹元初意況總然畫得成渠也是範圍模樣無奇西堂請自他有異形影還同兩沒交涉吞吐虛空隨緣不變兮突出難辨不變隨緣兮觸處皆逢咄正恁麼時隨緣耶不變耶今日斬新翻舊案曹谿無底水無痕均實監院請先天不生後天不滅正恁麼時丰姿越格握臨濟之吹毛截野狐之窠窟乘慈明之巨舟拯苦海之沉溺慣將一喝驗來機耳聾三日求人識拳石都監請者老漢禪不明教不諳律不持佛不念脫體無依道方一貫噫到底還他肌骨好不搽紅粉也風流山衣書記請不譚玄不說玅三拜得髓鼻祖已道整衣就座又如何千古萬古令人造古余書記請咄哉者漢全沒思筭聖亦不希凡亦不厭好不自誇歹常自見輕輕拈出口頭句落草求人續正傳祖田知客請前三三後三三一領袈裟搭半肩剛然洞徹其中旨天上人間事不凡碧岑禪人請手持麈尾默無言一領袈裟搭半肩直視兩傍筵下眾箇中誰不占機先玉田知客請諸佛出世唯為一事脫珍御服著弊垢衣隱勝現劣捨淨入穢者漢無端走入群隊被人問著一事料你開不得嘴雪屏知客請智者不自贊自贊即是愚除卻愚與智於中作麼題欲題題極處惟有自家知白菴維那請咄哉者漢無一可羨自幼家貧失學未老氣血先弱不貴門庭熱鬧秪圖賢衲數人各各冰霜節操永繼太白傳燈楚雲西堂請天童一會人惟汝不唧溜祖師向上事晝夜苦參究鈍置二十年方識自家醜欲作他家兒莫效伊做就徹底盡掀翻斬新成活計針眼裡𨁝跳剎竿頭遊戲始可入廛垂手定然出類拔萃孤巖副寺請太白峰前事分明舉似伊手中拈白拂腳下謾針錐那邊別有真消息只許渾家父子知古天知藏請影從形生形從心生心若不生形影皆空空原不空玅化無窮無窮妙化背覺合塵一條白棒天下縱橫啟迷為悟點銕成金能所不立物我互融上行下效永繼祖燈松源書記請手拈白麈尾用處不思議未具超方眼誰人識得你蠱門書記請眼裡無觔皮下沒血原來似箇傀儡抽牽便露醜拙咄誰知正法眼向者瞎驢滅白嶠西堂請者漢幼愚拙文義全不識老大自知非心常懷映雪半點不相瞞盡情為伊說春風原不在花枝至體從來無簡擇育焉知客請者漢為人別無指示一條白棒令人悟去悟與不悟有何憑據獅子解翻身韓盧唯逐塊一一檢點分明豈肯懡㦬放去放與不放自家知珍重兒曹莫效伊佛階書記請本來無面目特地五十七半點不相瞞渾身皆露出江南去復來刺腦入膠漆若再打之遶何日是休日今欲作退藏佛階代我劃雪岑書記請像像像者裏寫得著方顯真見量非但出人頭地千聖無不遜讓法喜長老請十九出家三十見道正眼看來堪發一笑且道笑箇甚麼一片白雲橫谷口幾多歸鳥自迷巢演教退長老請咄哉者漢無一可羨禪未經參道豈預諳唯喜恬退善推過量榮辱不形毀譽莫辨不掩他長不遮己短一切時中二空為觀若真吾嗣理當一貫鈍斧禪人請者漢從來不住相妍妍醜醜非其狀蓋色騎聲絕見聞塵塵剎剎自呈樣功德天黑暗女癩狗泥豬咸共體只為初時一念迷直至於今立彼此巧施爐鞴情襟大舉鉗鎚鎔固執縱逢錯節事難分自有人間鈍斧子雪衣知客請道為率性之源身為載道之器器潔則形端影直源淨則響順聲和影直故皈從者眾響順故感化者深凡為化導之師荷擔法門之任莫不從修身養性始惟閒居慎獨乃為得之且道如何是慎獨底事一領布衣光似雪雒陽歸後不曾緇靈常書記請雖坐鬘徑峰實在國山院彼此沒囊藏拈出與人薦直下識得渠真假俱是幻緇素若分明堪為我法眷撮土作香焚是名真供養五空侍者請無道可尊無法可說得座披衣應箇時節眾中雖有玅吉祥擬欲白椎遭點額大圓書記請這老漢沒崖岸法界以為身虛空是其量五湖衲子孰知蹤四海高人咸罔測惟有丹青顧周望妙筆輕輕能寫出拈條白棒按來機打得心空及第歸更有一般相為處入門頻喚點茶來了幻知客請老漢從來據實不會無端捏出蕩除佛祖玄妙掃空魔外妖孽手拈白拂按來機覿體為伊渾莫測唯有禪人字了幻多載相隨方始諳冷地思量無可酬權請丹青寫模樣他年懸向草堂前管取野狐自潛狀法音侍者請麤眉細目髮白齒落老老大大何勞做作不若放下身心隨處逍遙快樂寄菴首座請描不成畫不就這個阿師從何逗漏三尺麈尾信手拈七尺烏藤豎背後識得伊家親做處方堪踞坐獨稱尊佛杲後堂請最甘清淡絕攀緣一種平懷樂性天高據猊床提正令橫拈麈尾驗來賢燈傳太白堂中焰花吐祇園樹裏顏見徹老僧真面目滿林綠葉蔭春巔其生書記請咄哉者賊有甚奇特指鹿為馬喚龜作鱉禪不用參法無可說慣將三日耳曨案要使衲僧當下徹梵點知藏請老僧無面目從緣示幻蹤夢中瞠笑眼筆底現慈容悟真元無體了相亦非身身體兩無處分身遍剎塵慎獨監院請者漢從來無相恰被丹青描狀處已唯好謙和待人專於敬讓說法不通文義治家一味小樣元是沒搭煞的阿師何用焚香供養竺堂後堂請者箇阿師不立