能諦信其中旨觸處光明遍界香純覺禪人火以火炬敲空云敲空作響擊木無聲於茲薦得純覺遺身其生也春枝發萼其死也秋葉歸根不入榮枯之相安知己力乃充擲火炬云咄隱凡靜主火諸行無常示生滅法生滅滅已寂滅為樂於寂滅中無聖可成無凡可隱一味平懷泯然自盡其生也春萌夏茂其死也秋收冬藏天有四時而成一歲人有四相而成一生還知不隨四時之榮枯不被四相之生滅者麼舉火炬云佛殿階前石獅子大洋海底鐵崑崙擲下火炬得心火頭火寒是火熱是冰者裏會得是真得心若還不會以火把打圓相云難逃者裏安身噫泥牛昨夜遭漂泊直至如今不見蹤南天竺國僧羅漢揜龕弗住西乾入大唐驅驅萬里為參方腳跟未動身先到四座名山掌上看不避寒暄尋古跡但隨信施結良緣我今雖把龕門揜正體何曾有間然起龕當陽曉示同道方知覿體提持全資識者卓拄杖云若向者裏透得便可以撒明月珠噴旃檀氣如或未然更通一線拽拄杖引云隨我來也舉火打圓相云括盡乾坤包藏萬有任爾十聖三賢儘力跳他不出茲者亡過羅漢托生西域圓寂中華兩土勝緣資生頗足雖不能光揚佛日接物利生一片仁慈十方修德蒲團午夜淨念堅持正好百年聚首誰料一旦告終如今既然到此可謂世緣畢備末後殷勤截斷路頭一堆猛燄且道畢竟向什麼處去劫火洞然毫末盡青山依舊白雲中淨如禪人火憶汝曾參金粟禪灶紅眼豁識生緣而今老大都忘卻天上人間快活仙纔聚首已三年箇事須知一著先脫體本無元字腳生來死生總脩然攛下火今朝撇下娘生褲一道紅光燼目前映山禪人火纔入空門未幾年便招此疾日長眠行學兩途難已已無奈多生業力牽不逢點出金剛體奚識輪迴沒變遷以炬打圓相中點云咦汝能諦信其中旨臘月梅花到處鮮了幻上座起龕師以杖敲云寸板藏身未是長直須赤體露堂堂藏露兩途俱坐斷翻身便是法中王隨我去莫遲延復敲云只將者點真消息永作人間脫苦方舉火了幻幻緣何必了緣生生處即無生劫火洞然毫末盡青山端在白雲中今日為汝重註破人間天上任縱橫復打圓相云須記取莫朦朧自從撥出寒爐火世世將來續祖燈靈虛禪友封龕師詣龕前以杖擊三下云葉落林空霜滿天西風吹沒渡人船今朝撇下娘生褲收拾龕中假我關復擊云假我關靈虛當下絕塵凡喝一喝拽杖便行聖恒知客火一生參學事將成長夜昏沉忽爾侵了得此身原是幻誰生誰死絕諸塵虛明自炤非心力脫體無依孰聖恒轉身句子親相示月掛秋空分外明慧覺火慧覺兄慧覺兄春風吹暖柳垂青景德堂前曾覿面歸家自不涉途程所以道只此見聞非見聞無餘聲色可呈君我今更助一把火管取通身手眼明遂攛下火炬古余維那父母姊靈骨入塔一子出家九族生天古人垂語話不虛傳舉靈骨云大眾會麼不因樵父指怎到葛洪家彌勒慈氏開光法身無相法眼無涯無相故端居兜率無涯故普現人間本有常光爍太虛從來不受塵遮掩只因隱實施權一任有開有閉不妨錦上更鋪花有意氣時添意氣隨身布袋沒些些等施所求無不遂十字街頭等個人自笑至今猶未遇大眾且道還有遇底時節麼豎拂子云時時示時人時人自不識慧津上座火師舉火炬云來無所從去無所至巍巍不動分明舉似所以道處處真處處真塵塵盡是本來人真實說時聲不現正體堂堂沒卻身慧上座向這裏薦得自然上無攀仰下絕己躬生死涅槃同於昨夢一切蕩然無罣礙便是逍遙出世人其或未能老僧贈汝一把火留取人間作慧津法孫等即掩龕半生參學事方周正欲陞堂啟後眸不把音聲為佛事便將身教示同流老僧為汝將龕掩惟恐令人錯較量以杖三卓云關龍池萬如和尚入塔云無生而生者法性之隨緣生實無生者隨緣之不變隨緣不變故山光水色頭頭彰古佛真機不變隨緣故鳥韻松聲法法演圓常妙偈所謂性相平等體用一元從來無我無人畢竟誰生誰滅惟我法兄萬翁大和尚以淨法界為身本無出沒大悲願力示現受生既受生已作人天之模範為末世之津梁由是三坐道場說法二十餘載所化弟子得一知半見者不可枚舉親承印可續佛慧命者五十餘座可謂光前裕後越古超今者矣私謂說法既久化導日長所化之機不生難遭之想懈與進脩反荒道業是以上年十月二十九日身示微恙忽爾告終嗚呼頓令山花失彩松檜生愁白雲低影黃鳥哀鳴致使七眾無依如失怙恃欲求耳提面命之誨安可復得凡有心者莫不追悔而進修正見我兄去留得所順逆皆權以杖指塔云大眾看看還有這個光明幢在高不可攀堅莫能動生凡育聖之胚胎袪邪怖惡之標幟天龍擁護神鬼欽崇正恁麼時我兄全身奉重石室安居一句作麼生道地靈出人傑源遠定流長卓拄杖起座五空徒封龕師以杖指龕云生從這裏出死從這裏入生死本來空焉有真出入故經云性真常中求於去來迷悟生死了不可得真常之性則不問且道這裏是甚麼所在還會麼鄉村四月閒人少採了蠶桑又插田且喜吾徒撥轉生機別行一路世出世間俱坐斷管教凡聖不相通仲濂汪居士封龕師以杖擊龕云一生為眾太忙生累得身心兩不寧予昔有書曾已勸今朝欲作豈能行人天福果雖勤辦佛祖單傳荷未能以手掩龕云老僧親手將龕掩待汝抽身喝下明雜著報恩齋單引赤烏始創無三寶處建立三寶石佛浮來可思議中不可思議嚴淨莫先於毘尼宏範孰過於禪道欲使法雲常聚戒月恒輝大開香積廣接雲臨須憑善信竭力施來一任衲子橫咬豎嚼助我飽參報君多福禪智齋單引夫叢林者乃聚眾之所也草聚而有靈芝木聚而有巨材水聚而有鯤鯨僧聚而有聖賢草孤則偃木孤則斜水孤則臭僧孤則野未見少法不仗相資相助而成也草木以雨露為資鯤鯨以水深為資僧眾以信施為資一缺所資道無可辦福無可求是以僧仗信施而辦道俗仗眾僧而求福所以財法二施等無差別題十八羅漢圖余聞十八大士曾領旨於靈山俱登四果權現形於苦海迥絕諸緣廣度有情入深無漏化導他方此土應供天上人間妙用難思神通莫比平履於波紋之上橫身於峭壁之間虎錫振時鎔寒冰為煖地龍盂灑處解熱惱作清涼跨鱉附蝦騰雲駕霧遨遊龍宮海藏步武南嶽天台隱顯以時去來無定忽無心而觸目擬有意而難窺驗仰山於集雲峰巔拋圓相而全機頓契偕黃檗於瀑漲渡口擲篷笠而伎倆全施如今落在山僧手頭也要借渠鼻孔出氣偈曰聖賢不落有無邊恰被丹青畫得全擬是擬非俱未在春風吹出樹頭鮮題成岵吟尊慈王宜人節孝節孝撫孤幼先賢未易全海門岵公母賢中之最賢教子已成名奉姑樂有年尤勝柏舟誓報夫非一端子亦固無負天理之循環予知成氏門忠孝永綿延題錢聖月所居𠁼丆德不孤必有鄰𠁼丆從此得題名未舉筆時先覷破聖凡無地可容身好男不看春好女不看燈擬向明中坐還輸暗裡行丈夫須具超方眼莫被時人換卻睛題崔曰可家藏東洲先生墨蹟東洲先生乃先朝砥柱明代才翁文壓歐蘇詩凌李杜字邁右軍忠烈貫於杲日仁孝著於海邦予生也晚聞而慕之每抱不得識荊之嘆茲寓三仙得晤曰可居士為先生之曾孫出先生墨蹟詩章見示為之摹寫其筆外之意吟詠其句外之趣直使白雲低影黃鳥添聲湖山拱秀翰海停波黯然而思惕然而會令人神清目朗垂老益壯怳如面對尊顏親聞謦欬可以釋我曩時不得識荊之嘆矣因題數語歸曰可居士和勝因禪師拄杖子惺惺寂寂者條杖情與無情沒兩樣死死生生涉險夷一念知歸心膽壯壓塵泥透荊棘卓卓孤標為眾格冒雨衝風不記年歷盡冰霜成就力別同儔離巉岳隨流得妙忘驚愕聊把尋常鄙見施偶值英資方許摸欲埋頭推領眾縱橫與奪儘拈弄殺活擒拏向上機狸奴白牯咸知痛策上下點疏親榮辱無拘為利生將此深心奉剎塵癩狗泥豬共一身或時喜或時嗔大施常開折攝門輕輕撥轉無為化聖見凡情總不存牧牛牧牛兒好著力牛不馴兮誓不息從來烈性恣咆哮權把繩兮緊緊執按春秋調歲月牛始淳兮繩始撇雖然卓卓在伊前不侵苗稼方端的淨裸裸赤灑灑體露堂堂忘管帶直入千峰與萬峰白雲堆裏真瀟灑水也足草也足隨意餐兮隨意宿閒將頭角向人施露出本來真面目脫簑衣解箬笠悠悠芳草閒吹笛笛聲吹出舊宮商分明洩漏者消息得恁麼且休歇好箇牛兒待時節忽然大地一聲雷耕遍乾坤在掌握童牛兒何所立人自空兮牛泯跡一段孤光亙古今都盧只是無孔笛阿呵呵會也麼眨得眼來滿眼花若還透過者些子不妨隨處作生涯善權寺齋單世尊遺教命持缽以資身檀度修因施齋糧而祈福身失資則慧命無依福不祈則樂果無由是以祈樂果者應施糧以齋眾續慧命者當持缽以受施內外交需彼此努力又叢林復建衲子雲臨常住必仗施主之齋糧成就衲子之修行施主必仗衲子之修行成就施主之福果交相成就如鳥之二翼車之二輪缺一則不能行矣掛鐘板師執板云敲空作響重整百丈老祖之儀規擊木無聲始契波離尊者之軌範斯乃入聖超凡之正路斷情截集之良方諸佛因之而得證列祖藉此以悟真今之學者必也仗此而參修是以天龍擁護魔外歸從某也謹遵遺命呈板云將此高懸擊板云大眾聞之各宜珍重行實師戊子誕日大眾袖香請說行實師固辭眾固請不已師不獲辭乃云若論此事本自現成在俗出家原無二致秖因未得入頭要了本分若非出俗求師何由洞了因是背親投師其間歷盡苦辛不及枚舉然亦不必舉今因大眾固請略舉大概予乃趙氏子父文母李氏世居虎林移徙當湖父年向老艱於嗣息禱神得生生後家業漸凋六歲破學學名重光家益寒七歲遂經營度日十三歲不茹葷屢欲辭親出家顧鮮兄弟不忍遽離因習課誦晨昏不輟十九歲父母欲為我完娶嘆曰此時不行他日難脫矣于是背親至南海普陀禮紹宗禪師薙髮將三月即歸省親親泣絕而甦者幾幾遂不忍相離便育髮以慰母心日閱楞嚴兼持大悲神咒一日在母前講因果言出家有如此之益在俗有如此之累母笑曰汝既決志出家終難苦留但不遠去我心即安矣由是得行己志復禮武原普淨庵乘白法師剃度受雲棲蓮大師沙彌戒從明耶二法師習教上鶯窠山禮一初禪師是師慈悲踰等因發心親侍三載時值枯淡日餐糲粥箸蘸生鹽致染腸瘋不果所願適值湛和尚開講鹽官天寧遂往天寧乞圓具足大戒次參聞谷老宿于靈祐示我參父母未生前面目是夏結制秦山逼拶太過得勞力傷寒纔痊又值湛和尚于嘉禾東塔開堂復往求單進堂身甚尪羸眾拒不得入予曰得死禪席是大幸也眾皆嘆服因而得入由是隨眾二旬身體輕安精神復舊入定一日如寸香頃後往鶯窠山結制與法林禪友矢志夜不放參一夕昏重難遣因同堂禪侶閱五燈會元值七賢女觀尸陀林因緣有省遂說偈曰一池蛙鼓夜喧喧歷歷明明道口邊通報五湖林下客從今不必更加參下山急欲遍參知識以求印可因父母年耄無倚借繆居士書院養親纔一年母去世次年父亦相繼告終喪葬事畢復參湛和尚于天寧入門便問達磨一宗只者是還別有湛云還別有予便喝云還別有麼湛云還別有予即退身三步合掌云還別有麼湛云還別有予曰某即如此還別有請和尚道湛云我要去拜客待我轉來向汝道予時不諳作實語會私計果若別有予之見處未為徹法源底待其說破不值半文矣必須自己參透方為真得重理前工冬上雲門結制進方丈求單湛問如何是佛法的的大意予云老老大大還問者箇話湛休去命余為參頭予一日領眾入室湛問古人有三句如何是第一句予曰帶累某不少湛云如何是老僧帶累處予曰落二落三湛又休去次參本師密雲和尚於金粟予問如何是即此用尚打一拂子予曰如何是離此用尚亦打一拂子予曰恁麼則儱侗不少尚云難道有兩箇予禮而出明日進方丈求侍者單尚允之一日侍立次尚云古人問如何是諸佛出身處荅薰風自南來殿角生微涼汝作麼生會予不能荅尚曰快還我下落予瞢然力參三晝夜連呈數偈尚俱言未在予亦自慚後果有箇會處便入臥室禮云某會也尚云如何是汝會處予曰鷂子過新羅尚云未在還我偈來予即書云薰風自南來殿角生微涼我今看破處也只是尋常尚然之予禮而出從此自知前來悟處一一無差因錯會湛和尚一言還別有又苦數年始信古人云早知燈是火飯熟幾多時自此金粟常住有不周者予出外募時或少有所補發心供眾為浴主一年維那三年隨師赴閩而旋尚赴育王請予辭掩關普淨菴又因受業師得恙甚重破關侍奉不久過世尚復至金粟結夏予禮覲尚留予領眾為教授尚應天童請金粟乏主尚意屬于予隨命朱柏臺費孝廉等堅請三次余皆不諾後子穀蔡居士痛哭堅請余領之交過三日忽發眼疾力辭去上秦山住靜越三載赴嘉禾和石孫居士請住東塔進院日眾請上堂予力辭秪為眾說小參三稔畢謝院事復上天童省覲尚仍命為侍者一日天雪尚問好雪因甚不落別處予曰秪為大地無寸土尚曰既無寸土畢竟落在甚麼處予曰前山與後山師亦然之後命知客一年冬辭出山掩關尚出二題一曰靈苗秀巧動止俱妙二曰根本庸麤舉措乃孚授予曰能作義理禪二篇許汝閉關予蘊之旬日莫能下筆一日隨眾出坡因冒風疾熟睡單次忽得題意即起搆燈信筆而成明日呈尚尚閱畢云太明白了予曰猶恐其晦也尚曰存之次日辭出山請題頂相尚曰汝自題罷予曰某題是某底尚即索筆親書是夜三更尚同侍僧玄玄扣予寮門予啟戶尚入坐曰汝年四十七三年關滿恰是五旬老僧許汝隨處開堂予曰和尚雖是慈悲相許某自量力可出福緣不足則不出也福緣頗足量力未充亦不出也必候兩可方出尚笑然之遂拜辭往武原陳仲修家菴閉關明年秋尚因事出山至蘇寧波海道持書請尚還瑞屏顧居士親送入山路轉嘉禾尚患腹疾履素黃居士請留家園調治予聞特破關至黃園值尚齋次命侍僧曰教大家莫散咸集花廳上眾集尚執拂而出整座而坐舉拂曰浮石我用不了底付汝為眾去予曰某何人也敢當斯任尚曰知汝持重不必過謙予拜而受之履素對尚曰弟子昨夜夢見小園池中開五色金蓮不知何瑞乃應今日在此付浮大師豈不異哉眾皆聞而驚喜是冬即應當湖青蓮寺請次遷普度今往報恩此予一生之醜拙也本當自掩因爾眾懇不能諱卻用是忉怛至此惟願大眾莫效予之狼狽也眾皆忻躍嘆服禮謝而退
