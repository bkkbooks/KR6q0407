body:
  text: 嗣法門人行浚等編拈古舉世尊初生時一手指天一手指地周行七步目顧四方云天上天下唯我獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平師云世尊纔出頭來只要起家立業那顧垛生招箭雲門大師雖則據令而行剛成賊過張弓豎拂子云大眾見麼不因樵子徑怎到葛洪家舉世尊在靈山會上拈花示眾是時眾皆默然唯迦葉尊者破顏微笑世尊云我有正法眼藏涅槃玅心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉師云世尊拈花眼空四海迦葉微笑傍若無人且道正法眼藏是什麼乾屎橛舉外道問佛不問有言不問無言世尊良久外道歎云世尊大慈大悲開我迷雲令我得入作禮而去阿難云外道有何所證而言得入世尊云如世良馬見鞭影而行後來百丈恒舉此話請益法眼語未終眼云住住汝擬向世尊良久處會麼丈從此悟入師云不向良久處會向什麼處會復顧左右云百丈悟處與外道悟處是同是別若道是同天下宗師盡為外道伴侶若道是別東土衲僧不如西天外道者裏緇素分明許汝參學事畢舉世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應一若言有智不應二一二之義其義云何佛言大王汝於過去龍光佛時曾問此義我今無說汝亦無聞無說無聞是為一義二義師云世尊雖則善荅帶累波斯匿王墮在死水山僧則不然待問一二之義其義云何豎拂子云喚作拂子則觸不喚作拂子則背此是一二之義畢竟喚作什麼匿王若向者裏透得非唯不落一二之數亦且慶快平生舉文殊起佛見法見被世尊威神貶向二鐵圍山千巖和尚云大眾不起佛見法見還免得貶向二鐵圍山麼世尊也是憐兒不覺醜師云千巖恁麼道也是自屎不覺臭敢問大眾起也貶不起也貶作麼生免得眾無語師湧身云觀世音菩薩將錢買胡餅放下手卻是饅頭舉教中道未離兜率已降皇宮未出母胎度人已畢師云此是黃面老子閨閣中物罄底搬出與諸人面前了也還見麼若也見得必自信自肯脫或未能不妨更為諸人下箇註腳落霞與孤鶩齊飛秋水共長天一色舉世尊一日陞座大眾集定文殊白椎云諦觀法王法法王法如是世尊便下座師云世尊雖是頭正尾正卻被文殊使令若是山僧纔見文殊出眾便乃震威一喝即歸方丈直使文殊一場懡㦬何也我為法王於法自在舉永嘉云江月照松風吹永夜清宵何所為佛性戒珠心地印霧露雲霞體上衣大慧云者箇阿師好與三十棒且道過在什麼處不合將常住物入衣缽下師云大慧老人雖則捉賊獻贓棒不虛發怎奈不顧自家失利大眾還知失利處麼不許他人富甘得自家貧舉陸亙大夫對南泉云肇法師甚奇怪道天地與我同根萬物與我一體泉以手指庭前花云時人見此一株花如夢相似師云陸亙將此勘驗王老師卻被王老師勘驗陸亙雖是無語其旨了然若會得陸亙了然處要識天地同根萬物一體有什麼難舉僧問風穴古曲無音韻如何和得齊穴云木雞啼子夜芻狗吠天明徑山云者黃面淛子恁麼荅話也做他臨濟兒孫未得在今日或有人問徑山古曲無音韻如何和得齊只向他道木雞啼子夜芻狗吠天明師云富而好禮以見無驕財不苟得方無濫取徑山老人是不能逃二者之咎只欲抑人揚己不懼旁觀雖然還知徑山為人處麼若非舍己從人那見婆心太切喝一喝舉雪峰仁禪師云終日忙忙那事無妨且道如何是無妨底那事良久云心不負人面無慚色師云報恩則不然終日閒閒那事難安且道如何是難安底事上床落地日應三餐且道與古人是同是別若道是同未免喫報恩棒若道是別亦未免喫報恩棒為甚如此不是報恩硬與棒大都緇素要分明舉千巖示眾云老僧如猢猻種樹種了便拔看大眾根生也未眾無語自代云根生也師云根生則不然未免自起自倒山僧也不種也不拔秪問大眾如何是無根的樹子眾無語師云無根樹子也不識舉百靈問龐居士云石頭得力句曾舉似人否士云亦曾舉似人來靈云阿誰士點胸云龐公靈云直是妙德空生也讚嘆不及居士卻問百靈阿師得力句曾舉似人否靈云亦曾舉似人士云阿誰靈戴笠便行大慧云者箇話端若不是龐公幾乎錯舉似人雖然如是畢竟百靈輸他龐公一著何故若不得箇破笠遮卻髑髏有甚面目見他龐公師云百靈戴笠子正要與龐公相見為甚大慧道不得者箇破笠遮卻髑髏有甚面目見他龐公還會麼欲得不招無間業莫謗如來正法輪舉臨濟上堂兩堂首座相見同時下喝僧問還有賓主也無濟云賓主歷然復召眾云要會臨濟賓主句問取堂中二首座師云臨濟大師卻被者僧覷破報恩則不然者僧纔恁麼問劈頭便棒非但使者僧脫洒亦且與二首座相見舉興化謂克賓云汝不久為唱導之師賓云不入這保社化云會了不入不會不入賓云總不與麼化便打云克賓維那法戰不勝罰錢五貫設饡飯一堂次日自白槌云克賓維那法戰不勝不得喫飯即趁出院師云興化法令若不如是之嚴何以見他克賓所謂父為子隱子為父隱直在其中矣舉丹霞於慧林寺遇天大寒取木佛燒火向院主訶云何得燒我木佛霞以拄杖撥灰云吾燒取舍利主云木佛何有舍利霞云既無舍利更取兩尊燒主自後鬚眉墮落師云丹霞燒木佛冷煖自知院主墮眉鬚其禍難了盡道木佛本無舍利誰信丹霞以杖撥底喝一喝云青天白日切莫眼花舉趙州訪道吾吾見來著豹皮褌把吉獠棒在三門前等候纔見州來便高聲唱喏而立州云小心祇候著吾又唱喏而去師云道吾勘驗趙州卻被趙州勘驗雖然趙州輸他一著何故著賊也不知舉深明二上座同行見一鯉魚從網跳出深云俊哉好似箇衲僧明云何似當初未入網時好深云明兄猶欠悟在明行三十里方省師云結交須勝己似我不如無舉靈山會上有一女子於佛前入定佛敕文殊出之文殊遶女子三匝鳴指一下女子入定儼然文殊遂運神力托至梵天撲下女子亦復儼然佛云非但汝一人出此女子定不得設使百千萬億文殊亦出不得下界有罔明菩薩能出此定佛語未竟罔明從地涌出佛敕令出定罔明遶女子三匝鳴指一下女子遂出定師云文殊自文殊罔明自罔明女子與瞿曇從來不異心一箇點即不到一箇到即不點一箇亦點亦到一箇不點不到向者裏分析得明方具得參學眼然未具透關眼在且道如何是透關眼一氣不言含有象萬靈何處謝無私舉臨濟問洛浦云從上一人行棒一人行喝阿那箇親浦云總不親濟云親處作麼生浦便喝濟便打師云臨濟探竿在手深淺預知洛浦死坐竿頭不求進步還有知恩者麼直饒有也只是喫棒底漢舉趙州訪黃檗檗見來便閉卻方丈門州即於法堂上叫云救火救火檗開門搊住云道道州云賊過後張弓師云二大老相見可謂碁逢敵手落子非輕一箇把住雙關一箇頻連虎口雖能各展奇謀到底不無優劣且道在阿誰分上試檢點看舉南陽國師云說法有所得斯則野干鳴說法無所得斯則獅子吼師云大小國師只解瞻前不能顧後有所得無所得則且置畢竟喚什麼作法啼得血流無用處不如緘口度殘春舉僧問雲門如何是驚人句門云響師云雲門老漢接機甚便秪是閉門不落閂空費己力忽有人問報恩如何是驚人句只向他道低聲低聲舉雪峰示眾云盡大地是箇解脫門因甚把手拽不入師云雪峰老漢可謂千鈞之弩不為鼷鼠而發機舉僧問高安澄禪師舊歲已去新歲到來還有不受歲者麼澄云作麼生僧云恁麼則不受歲也澄云城上已吹新歲角窗前猶點去年燈僧云如何是去年燈澄云臘月三十日師云高安老漢被者僧看破且道看破在什麼處臘月三十日舉黃檗因南泉問什麼處去檗云擇菜去泉云將什麼擇檗豎起刀子泉云汝只解作賓不解作主檗以刀子點三下師云二大老雖是互相勘驗賓主歷然檢點將來南泉輸卻一籌若是廣慧見他把刀子點三下只道箇轉見不堪雖然碁逢敵手方堪著琴遇知音始好彈舉溈山因仰山摘茶次謂仰云終日摘茶只聞子聲不見子形仰撼茶樹溈云子只得其用不得其體仰云未審和尚如何溈良久仰云只得其體不得其用溈云放子二十棒師云溈山陸地興波仰山隨邪逐惡若無末後二十棒直至於今沒勦絕何則一把柳絲收不得和煙搭在玉欄杆舉黃檗因百丈問什處來檗云大雄山下採菌來丈云還見大蟲麼檗作虎聲丈拈斧作斫勢檗把丈一摑丈笑歸陞座為眾曰大雄山下有一大蟲汝等諸人也須仔細老漢今日親遭一口師云捨己從人真大丈夫若非刖足曾三獻怎得連城價倍高舉僧問大隨法真禪師劫火洞然大千俱壞未審者箇壞不壞隨云壞僧云恁麼則隨他去也隨云隨他去僧不肯後到投子舉前話子遂裝香遙禮曰西川古佛出世謂其僧曰汝速回懺悔僧回大隨隨已化再轉投子子亦遷化師云者僧不肯大隨甚是難得反被投子害他一生舉李駙馬問慈明我聞西河有金毛獅子是否明云駙馬甚處得者消息來李便喝明曰野干鳴李又喝明云獅子吼師云問也問得好荅也荅得妙只是末後猶欠收機未免落他彀中還有出得者麼試𨁝跳看舉唐代宗問忠國師百年後所須何物忠云要箇無縫塔子帝云請師塔樣忠良久云會麼帝云不會忠云我有付法弟子耽源卻諳此事召問之國師圓寂後帝召耽源問源呈頌云湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識師云可謂字經三寫烏焉成馬要會無縫塔樣麼向國師處見則易向耽源處見則難何也毫釐有差天地懸隔頌古世尊初生右脅初生不肖兒罄將家醜布寰區只因半點難瞞昧殃及兒孫無盡時女子出定女子慣自粧妖瞿曇沒點氣息帶累罔明文殊至今遭人甄別教中道未離兜率已降皇宮雲散家家月春來樹樹花不勞些子力當處足生涯世尊不說說迦葉不聞聞鍼芥相投絕易難師資道合本天然靈山多少奇男子誰敢輕酬作指南阿難倒剎竿金襴之外更何傳平白阿難起釁端誰道飲光無把捉呼喚門前倒剎竿今說無心處不與有心殊擬用無心墮有心通身荊棘入荒林吾今真得無心旨聲色頭頭不自昏國師塔樣囫圇塔子甚分明豈是尋常捏聚成從來有樣堪描畫小似須彌大似針青源米價廬陵米價荅何難貴賤高低當處看若是久經行販者自然輸價兩家懽馬祖不安身橫竹榻懶跏趺酬酢情懷謾道無玉質不分梅笑雪鷓鴣啼得客心孤百丈再參擬喝多云震若雷天懸秪為錯毫釐誰知百丈翻身處日午三更悟大機南泉牽牛入堂首座拊牛背三下南泉出趙州放一束草於首座前座無語千聖從來只一頭南泉為眾自忘羞引他首座成顛倒打正還輸老趙州破灶墮灶神冷地賣聰明問著聰明當下昏不經棒打泥團破縱有聰明何日惺溈山水牯人牛互喚兩無拘智理雖分共一如直下見超無別伎快教扶起淨瓶來南泉斬貓提起剛刀問兩堂眾中誰敢露鋒鋩輸他趙老這些子赤腳悠悠獨占強南泉云馬祖說即心即佛王老師不恁麼說不是心不是佛不是物不是心佛物王老師兮親口說是甚麼沒交涉清白眼中休著屑中邑獼猴無事生端驗作家獼猴內外喻偏賒若非捉手言相見辜負當年小釋迦鹽官索扇扇子破也索犀牛侍者茫然絕應酬誰道更闌秋夜永蘆花月色正綢繆龐居士到芙蓉太毓禪師處毓行食與居士士接食次毓縮手云生心受供淨名早訶去此一機居士還甘否士云當時善現豈不作家毓云非干他事士云食到口邊被他奪卻毓乃下食士云不消一句不消一句意如何甘不甘兮沒兩塗下食了時無後語誰知龐老出常徒趙州狗子問處孤巍荅自然強生擬議隔千山昔年趙老原無意莫效韓盧逐塊間趙州柏樹子庭前柏樹子粒粒甚分明相識滿天下知心有幾人夾山參船子煙水茫茫擲下鉤多年難遇我般儔點頭忽得金鱗現跳入滄浪即便休子湖狗子湖烈犬正當門終日橫身不露形觸著直教惡性發無分上下與卑尊德山托缽春滿乾坤花滿林綠楊冉冉亂啼鶯湘江一曲漁家樂不涉宮商調更清睦州擔板丈夫意氣本無拘自畫隨人喚即違欲識睦州相會處豈容擔板衲僧窺臨濟三頓棒三遭問話三遭打冷汗通身沒可把㘞地歸來氣象新𡎺拳鼓掌賣瀟灑臨濟入滅正法眼藏是何物父子相酬滅不滅臨終被喝心纔冷罵做瞎驢誰透徹香嚴擊竹裹足雲林大似呆生前消息強安排若非擊竹一聲㘞滿耳聞來總是乖靈雲見桃花春風舒笑豔陽天逐水桃花爛熳然可惜一雙清白眼無端擉瞎在桃邊趙州勘二菴主古制焦桐彈到今調中翻覆驗知音高山流水分明極未識于今孰解聽芭蕉拄杖一條拄杖滑如油與奪從教得自由有意氣時添意氣不風流處轉風流保壽開堂棋逢敵手休輕下優劣全昭一著間兩將未分先覷破徒教車馬各爭先荊棘林中堪獨步馬能千里故追風直饒翻轉無情面似向南離聽處分雲門須彌山一念不起須彌山光前絕後沒遮攔雲門忒煞傾肝膽那個男兒肯荷擔玄沙問小塘長老昨日許多喧鬧向甚麼處去塘提起袈裟角沙云料掉沒交涉畫虎畫皮難畫骨知人知面不知心小塘提起袈裟角心骨何方徹底傾首山竹篦拈卻兩頭會也麼輕輕踏著別無他轉身須是英靈漢不被渠瞞始作家婆子燒庵抱住慇懃問最親供他死漢少知情若還具有羅空手一彈分明落一禽黃龍三關我手何似佛手曾盜淨瓶楊柳露出白拈嘴臉天涯無處藏醜我腳何似驢腳步步全無好惡早經踏著烏龜箇箇都是硬殼人人有箇生緣良駿何待加鞭迅速穿花過柳追風逐電如煙五祖云譬如牛過窗櫺頭角四蹄都過了秪是尾巴過不得透得尾巴過牛身方始全縱橫泥水裏毛色轉新鮮看得尾巴透方傾參學心百花林裏戲片葉不沾身破沙盆沙盆既破量寬洪包括乾坤更可容一切聖賢收不得秪因沙界覓無蹤僧問本師密和尚如何是三寶密云一餐胡餅兩餐粥僧云不是者三飽密云老僧日日奉持問得分明荅得親奉持那肯別殷勤茫茫宇宙人無數幾箇知歸不外尋本師一日上堂舉世尊初生話畢乃云汝等不見黃面老子更向者裏討甚麼碗下座一時打散彼丈夫兮我丈夫有何虧尟向人圖枉教喫盡伶俜苦到底衣珠外得無末後句末後句透何難臘月梅花帶雪看箇中若善尋梅者不用寒香到鼻邊和普明禪師牧牛頌十首未牧蹉過聲前這一哮反生邊見歷途遙披毛帶角渾無慮糞草何曾識稼苗初調纔識牛兮鼻已穿翻然自肯更加鞭暫時不在頻偷走猶把芒繩緊緊牽受制渡水穿雲不亂馳任他呼遣總相隨雖然已是堪調治未許山童暫放疲回首一回入草一回頭可比初時性已柔滿徑落花思踐履客途煙雨豈羈留馴伏玲瓏石畔古松邊任運騰騰始貼然手裏有鞭須放下鼻中去索不須牽無礙觸處逢渠得自知入泥入水又何拘饑餐渴飲困來睡底事從來無欠餘任運己眼撐開宇宙中胡來胡現任茸茸山童閒唱還鄉曲不覺令人歸思濃相忘喪盡偷心豁達中人牛何異復何同從今兩絕隄防力可以西兮可以東獨炤脫盡皮毛赤體間堂堂獨露笑談間不是渠儂能了達秪因透徹上頭關雙泯空空寂寂杳無蹤一點靈機盡埽空智理不存悲化普一輪明月炤幽叢世尊陞座文殊白椎法王之法若何觀已見文殊彊指南不是瞿曇大慈愍潑水教收智者難世尊睹明星以己方人世盡然瞿曇未越見還偏不思愧點胭脂額故把硃砂畫雪顏外道問那一通那通不識五通虛樹本無根豈有枝仙人不遇大慈父兩足懸空步步虛靈雲見桃因桃起見見非桃桃既非桃見亦消桃見兩消是甚麼靈雲從此得逍遙栴檀瑞像情與無情共一真木雕泥塑解飛迎世尊親手曾摩頂你我原非有二人婆生七子六個不遇知音只者一個也不消得便拋下水中婆婆抱子問來原撫棹酬機見不偏不遇知音猶自可知音知處道情乾僧問首山如何是佛山云新婦騎驢阿家牽新婦騎驢阿家牽因邪打正道方圓曲高不落尋常調越色超聲契別傳法語天植駱居士五十懸弧之辰作佛事薦其先嚴請說公今年五十上天一晝夜天方夢夢然不知有佛法公反勝於天知苦修解脫自度能度人先從度親始非但一世親世世親皆度追思曠劫來循環六道苦備知異類身曾昔為父母所以調御師普度於一切公能效佛行大孝莫可喻示鈍斧禪人非剛打就豈鐵鑄成八風不動四相無侵收放自由佛魔難近只這一著無可標名喜子老大執侍三稔欲離吾右刈茅蓋頭孜孜無倦操持實乃僧中之龍和羅飯骨董羹隨家豐儉暢子平生金沙眾居士以念佛米供齋求法語向來米價貴如珠此米超珠珠莫及一句彌陀一粒米一粒米動一佛出若將供養老趙州定然有口也不食何故聻念佛一聲漱口三日還會趙州此言麼秪為念佛人不得理致心外有法取捨情生反污己口不若不念故道此爾要知得理之念謂之正念失理之念謂之邪念須是得正去邪始得且作麼生方乃得正去邪如大勢至菩薩云都攝六根淨念相繼如是念佛是為得理何謂都攝六根淨念相繼淨念者念無雜念相繼者念無間斷六根者眼耳鼻舌身意都攝者因眼貪色耳貪聲鼻貪香舌貪味身貪細滑意貪法塵貪即是愛經云有愛則生愛盡則死故知貪愛為生死本如今要斷生死先斷貪愛貪愛作麼生得斷即將一句阿彌陀佛念念相繼則自然眼不取色耳不取聲鼻不取香舌不取味身不取細滑意不取法塵總歸一句彌陀謂之都攝六根貪取謂之亂一句彌陀謂之淨淨以掃亂亂除愛盡則生死之因自空輪迴之果自息如是念佛方得斷生死出沉淪趣菩提證涅槃纔是究竟念佛是為得理正念趙州祖師要人明取念佛之理接引盲修瞎念之輩故曰念佛一聲漱口三日汝等善人擔柴運米助我雲廚老僧特為發明此理得明是理歸家一心念佛無雜無斷各各得生唯心淨土箇箇得見本性彌陀當生珍重記取記取徹空上人持卷乞法語上人號徹空法名曰慶秀慶則慶其徹空則空其秀慶徹徹於空空秀空於有於法為真空於有為妙有妙有原非相真空即是物始知一貫錢依然兩五百真空不住空妙有不住有空有兩不住藏身於北斗真空不離空妙有不離有空有兩不離頭陀自抖擻喚甚為真空喚甚為妙有空有兩誰喚露出本來面無空說真空無有說妙有空有兩俱說機用安可測身心本一如身外更無餘但有空可徹土上又加泥到此際非容易報恩猶未輕相許擊破如來藏裏珠掀翻祖師關捩子會盡古今三術闍方可利生施法雨示監收常住田疇賴汝監收一人輕著力眾得飽齁齁雖然粥足飯足未是汝足直教嚼著無米飯普使人天香滿腹示潤芳後生家須早計莫把光陰虛自棄為僧若不究根源生死循環豈兒戲聲名動有何好添得眼前鬧炒炒貴圖身世事奢華不顧業識來牽繞闖驢胎穿馬腹一旦囊藏俱露布徒教受苦萬千般有口難言向誰訴莫待角生悔已遲即今休把青年蹉終朝捏箇無手拳打破虛空見碧天從教混入黃河裏那日隨流衣自乾回山示眾師云古者道三日不見亦須刮目相待老僧出山已來不覺八月矣院中事務不無幹辦未審各各本分事亦有深契否百丈老祖道我被馬大師一喝直得三日耳聾如何是耳聾底意旨速速道來若有道得貼體者老僧拄杖子兩手分付如或未能不可輕易放過示新戒師豎拂云諸佛子看看諸佛出世只為發明者箇汝能會得者箇三無漏學悉已具足其或未然且依經云眾生受佛戒即入諸佛位新戒依佛言是名真菩薩所以道三業清淨佛出世步步踏著黃金地三業不淨佛滅度黃金地上難移步依教奉行眼前明歷歷不依教奉行腳下黑漫漫依而不依口中說食終難飽不依而依身上穿衣方免寒四句百非俱坐斷千生業海頓枯乾到恁麼地喚甚麼作菩提煩惱阿那個為生死涅槃盡大地人齊斫額國山峰月炤人寒解期示眾七日禪期雖已周本參未透豈能休直須洞徹西來意生死牢關一筆勾後生晚進忌聰明且要虛心學老成記取古人好言語要渠癡鈍過平生大道本天然那許妄穿鑿離心意識參出聖凡路學參須真實參直待冷灰中豆爆悟須真實悟更加絕後而再甦方堪繼續祖燈永作人天龜鑑切不可半塗而廢得少為足貪他利養要人禮敬假粧知識粉飾無聞不慚不愧錯因錯果未得言得未證言證大妄語成造無間業一時苦事臨頭他日悔之晚矣諸仁者當聞是語銘刻在心依此而行超凡入聖出類拔萃得大受用庶不辜負生平大眾久立伏惟珍重迎龍庵求開示去歲承招今日齋貴圖一飽了余懷誰知眾請重開示須信談玄口不開大眾既是談玄為甚口不開不見教中道是法不可示言辭相寂滅諸法從本來常自寂滅相所以昔日外道問佛不問有言不問無言世尊良久外道云世尊大慈大悲開我迷雲令我得入於此見得是謂上根於此不見可謂東土衲僧不如西天外道山僧未免更向第二門頭別通個消息正是教中道我有異方便助顯第一義故世尊初生一手指天一手指地周行七步目顧四方乃云天上天下唯我獨尊是異方便助顯第一義年登十九念世無常捨王宮居雪嶺苦行六年因睹明星忽然大悟歎云奇哉眾生皆有如來智慧德相良由妄想執著不能證得是異方便助顯第一義隱勝現劣經行樹下三七思惟云若但讚佛乘眾生沒在苦破法不信受墜於三惡道我寧不說法疾入於涅槃尋念過去佛所行方便力亦應說三乘作是思惟時十方佛皆現梵音慰諭我善哉釋迦文第一之導師於是機分大小道殊半滿說法四十九年談經三百餘會末後於靈山會上百萬眾前拈一枝合歡梧桐花舉示四眾唯有迦葉破顏微笑便云我有正法眼藏涅槃妙心實相無相教外別傳付囑與摩訶大迦葉是異方便助顯第一義於此會得是謂中根如其根器淺劣不能領會且看昔日有智閑上座聰辯過人問一荅十問十荅百一日參禮溈山次山問聞子聰辯過人問一荅十問十荅百此皆冊子中語向父母未生前道一句來閑乃杜口無對禮請溈山說破山云我若與子說破他日罵我在乃禮辭溈山併去所習結茅於忠國師遺跡終日呆呆地討箇父母未生前消息日久月深忽於掃地次拾瓦礫擊竹作聲頓然打破疑團洞徹生前消息便設香望溈山禮拜云當時若與我說破怎得有今日此便是鈍根人參禮善知識做工夫悟道的樣子蓋因入道遲速不同故分根器有三種雖說有三於悟處無有異大眾古人如是爾豈不然各宜憤悱急自究取莫將閒學解空費好時光
