body:
  text: 嗣法門人行浚等編寧波府天童景德禪寺語錄師在華山同葉受天童眾護法請上堂報恩擔子纔交卸已入西山養病軀閉戶不聞塵俗事開門接見大檀書細揣力微難荷重追思祖席豈容虛目昏齒落誠無用自有金湯永護持大眾且道如何是護持的事山門鎮靜燈無盡祖道重揚葉有光到山上堂至座前拈疏云天無私蓋地無私載乾坤既爾人理亦然公正分明再煩維那宣過宣畢陞座拈香祝聖畢復拈香云此一瓣香第四回拈出奉供本山先師密老和尚用酬法乳上首白椎云法筵龍象眾當觀第一義時海眾沸騰遂止問話乃云遞代相承古今不易法門重荷貴在有力大人山僧年當衰邁時值秋晚已甘退居同葉忽蒙檀護見招因念先人法席扶病入山賴有遠近檀那合山大眾協力相扶使法輪與食輪共轉福性與慧性同修其或不然未免旁觀者哂此事且置到山一句作麼生道豎拂子云月愛谿聲流不去雲懷山色復飛來上首復白云諦觀法王法法王法如是師至南翔萬壽寺請上堂自忘衰朽赴天童匍匐諸山興轉濃賴有法嗣咸出手大家扶起破沙盆祖翁叢席非輕視浙省名藍第一山天上卿雲生泰嶽人間福水長滄溟正恁麼時一句又作麼生豎拂云水向石邊流出冷風從花裏過來香開爐上堂僧問祖庭創闢萬山巔七十餘燈續後先此日爐開烹佛祖沙盆意旨請師宣師云日輪正當午進云一句歸宗萬國朝虛空合掌森羅拜師云如何是拜的事僧呈坐具云和尚也須著眼始得師云你是箇瞎漢問清光匝地簇錦攢花風雲際會且置如何是天童境師卓拄杖云失卻你眼進云和尚也須著眼看師打云還見麼進云日輪正當午白雲覆青山師打云總是眼花乃云天童主法已頻更今臘開爐屬老僧一眾同參須努力大家扶起破沙盆沙盆扶起不尋常八面玲瓏盡放光四聖六凡無可避大千沙界箇中藏大眾藏即且置為什麼無可避還會麼天上五衰相現人間八苦交煎上堂僧問海眾雲臻即不問擊鼓陞堂事若何師打云要你薦取進云應時及節一句又作麼生師云仲冬猶寒乃云老僧出世至於今化主相煩數百僧惟有迥然真出類到頭不昧始初心六年苦行緣方就萬里關山覓施人自利利他辦箇事總教當下契無生大眾如何是無生之旨良久云玲瓏巖上石飛去復飛來元旦上堂僧問一元來復百福俱臻慶時納祐一句如何道師云歲朝東北五禾大熟進云恁麼則人安物阜海晏河清去也師云時清休唱太平歌乃云元旦一萬事吉衲僧不用加參管取通身眼徹因甚如此不羨銕牛耕陸地慣能井底種林檎解制上堂僧問繩頭把住滴水冰生布袋解開珠迴玉轉妙手僧繇描不就請師點出大家看師便打進云謝師一棒當陽妙覿面還他作者知祗如解制一句又作麼生師復打進云恁麼則一條拄杖子隨處立乾坤師云如何是你拄杖子進云孟春猶寒伏惟珍重便禮拜師云好與三十棒問三月安居今已滿解制一句乞師宣師云晴乾不肯走直待雨淋頭進云踏得故鄉田地穩何須向外去馳求師云如何是你故鄉田地進云無影樹頭花爛熳春光不與四時同師云如何是你不同處進云一句迥超千聖路萬靈何處謝無私問渡頭喜得水聲息古國梅花香滿林布袋解開雲水去清關橋翠鎖何人師豎拄杖云見麼進云和尚則恁麼學人又不然師云又作麼生僧頓足師便打進云拄杖點開新日月芒鞋一任破青山師云切莫亂走乃云獨釣寒潭過一冬竿頭稱意幾回逢從今且聽隨流去等待風雲自受擒眾中還有不受擒者麼良久云千山勢到嶽邊止萬派聲歸海上消上堂太白峰頭煙雲靄靄清關橋下澗水潺潺潺潺非聲靄靄非色非色非聲誰能薦得若也薦得便知天地與我同根萬物與我一體可與靈雲香嚴二大老把手共行同門出入到恁麼地只可自利未得利人若要利人須知更有向上事在且如何是向上事豎拂云天上有星皆拱北人間無水不朝東上堂本是沒量人一切難描摹從出母胎來將錯而認錯合掌云大眾會麼我不敢輕於汝等汝等本來是佛佛誕上堂大患莫重於迷為病良劑莫善於悟為藥直教脫體輕安藥病一齊拈卻所以經云破有法王出現於世隨眾生欲而為說法只如世尊初生一手指天一手指地週行七步目顧四方乃云天上天下唯我獨尊且道隨眾生欲不隨眾生欲若人道得貼體句天童拄杖子即今兩手分付其或未能莫將閒學解埋沒祖師心上堂箇事明明不覆藏青山疊疊正當陽衲僧具有超方眼蓋色騎聲脫體彰所以陸亙告南泉云肇法師也奇怪解道天地與我同根萬物與我一體南泉指庭前牡丹花云大夫時人見此一株花如夢相似諸人還知南泉指醒大夫處麼若知南泉指醒大夫處便知老僧指醒諸人處若知老僧指醒諸人處便知佛佛授手祖祖相傳處脫或未能不免老僧再為諸人下箇註腳若將眼見終難會耳處看來方始知開爐上堂僧問法幢高豎利物利生爐鞴重開烹佛烹祖向上鉗錘知玅密當機不讓且如何師云好與三十棒進云一喝分賓主炤用一齊行如何是炤用齊行底事師打云還識得者箇麼進云恁麼則百戰場中誇獨勝萬人叢裏奪高標師云未許汝在進云怎奈龍吟大海虎嘯高原去也師云正好喫棒僧禮拜云沾恩有分師乃云萬古長空一朝風月萬古長空渾不動一朝風月任安排眾中還有出手者麼良久云如無老僧獨弄去也朔日開爐謂結冬無端掘窖陷諸人如能箇裏翻身轉便是林間出世僧大眾還知翻身底意麼不見道至道無難惟嫌揀擇但莫憎愛洞然明白既明白已正好朝打三千暮打八百則譬若牛過窗櫺頭角四蹄俱已過還有尾巴過不得在過得過不得則且置如何是即日開爐底意百爐鞴鉗錘全不用不加火力自相鎔臘八上堂我佛世尊四月八日降生臘月八日成道降生時便乃一手指天一手指地周行七步目顧四方乃云天上天下惟我獨尊成道時乃云奇哉眾生皆有如來智慧德相良由妄想執著而不能證得世尊初生時早已揭露人天眾前臨末稍頭復言成道者何也正見世尊乃是古佛再來度生為急務故纔出胎時便乃全體揭露獨尊之旨欲使一切天人悉皆領悟怎奈根器未純聞如不聞見如不見世尊只得隱聖同凡捨四海之富萬乘之尊辭恩割愛離皇宮入雪山隳肢體黜聰明六年勤苦於臘八夜睹明星方云成道此道非我一人獨有乃人人本具具而不能證者只為汝等二六時中不思善便思惡不思善惡便落無記一切有為之法如夢幻泡影頭頭執著事事認真所以不能證得更見世尊慈悲之至婆心之切為汝諸人猶未悟去即今在此討箇甚麼以拄杖一時旋風打散歸方丈上堂急景凋年候朔風凍雨天雪中來送炭千里不辭艱為甚肯如是只為閉門造車開門合轍憶昔南院顒和尚上堂云諸方只具啐啄同時眼未具啐啄同時用有僧出問云如何是啐啄同時用顒云作家不啐啄啐啄同時失僧云未是某甲問處顒云汝問處作麼生僧云失顒便打僧不肯師云南院可謂孤高者僧亦為希遇雖然仔細檢點將來二俱未在何也不見道有諸己然後求諸人無諸己而後非諸人即今有傍不甘者出理前問老僧向他道髑髏常干世界鼻孔摩觸家風且道老僧與南院還有優劣也無如有緇素得明即今分半座與伊其或未能莫將無事為無事往往事生無事中下座解制上堂大盡三十日小盡二十九解制在歲終方木逗圓孔如能句下翻身不枉摩裙擦褲果乃見得透信得及擔荷得去如龍得水似虎靠山逆順縱橫隨緣自在其或未能他日閻老子算飯錢打鬼胐臀有日在此事且置即今解制一句作麼生道蚯蚓驀過東海泥鰍倒上須彌卓拄杖下座師誕日古余維那請上堂那問爪牙久伏在深林未肯輕將露與人今至法王獅子窟當陽聊且一嚬呻遂一喝師云好喝那作圓相師便打那云棒頭有眼須辨龍蛇師云瞞他不得那又喝師云再喝看那云不勞再驗師便休去乃云本自無生慶有生有生方得契無生有無坐斷非為妙有有無無建本宗所以紙衣道者參曹山山問如何是紙衣體衣云寸絲不挂山云如何是紙衣用衣便脫去山以手拍肩云只解恁麼去不解恁麼來衣便來問山云一靈真性不假胞胎事如何山云未是妙衣云如何是妙山云不借借大眾還知不借借麼不見華嚴云相原虛恒泯一體性雖實常在萬緣敢問大眾如何是萬緣底性如有道得恰好老僧拄杖子兩手分付脫或未能老僧自道去也豎拂子云會麼掬水月在手弄花香滿衣下座上堂今朝六月一箇事紛紛俱漏泄柳陰深處噪新蟬池上荷香襲幽室嘶風木馬空成夢喘月泥牛醉未知所以當年缺齒翁曾對梁王道不識佛心天子雖聰敏至此茫然如面壁何以不見經云盡思共度量不能測佛智且道如何是佛智笑裏一毛無間斷毫端十字路縱橫天童退院上堂師云昔夢先師喚老僧老僧出接見先人手持雨傘忙撐起頻喚來來與共撐是故聞呼予即至果遭此地兩無秋冥中猶仗先師力不覺怡然二載周自揣暮年難獨荷敢邀碩德繼先猷遙請木兄承己諾殘棋一局適將收敢辭大眾出山去莫訝相逢未有期須知無去無來者千里何曾間一絲大眾既千里之遙為何不間一絲豎拂云會麼定光金地遙招手智者江陵暗點頭卓杖下座秀州棲真寺語錄上堂拈疏云好事不瞞人對眾親拈出復呈云大眾會麼恐有不會再煩維那宣過指法座云峭巍巍壁立萬仞孤迥迥突露當陽和盤托出無人會曲彔重登再舉揚喝一喝便陞拈香畢維那白椎云法筵龍象眾當觀第一義乃云纔入西山又出山天緣於此孰能攀去住不生留別念一道孤光萬境含所以道萬法是心光諸緣惟性曉本無迷悟人只要今日了既是本無迷悟要了箇甚麼豎拂云還會麼雖然舊閣閒田地一度嬴來方始休白椎云諦觀法王法法王法如是下座上堂僧問太白破沙盆舊話棲真今日又重圓破沙盆話即不問棲真新令請師宣師云門前一對金剛進云蒙師指出新條令普使群英盡飽餐師云如何是你飽餐底事進云百戰場中誇獨勝萬人叢裏凱歌回師云未許你在進云和尚不得壓良為賤師便打進云杖頭點出摩醯眼爍破晴空亙古今師云今日且放過進云大眾證明去也乃云捏不成團裂不開孤光耿耿絕塵埃丈夫如未超方便徒使瞿曇空歎哉是以浮談萬卷不如至理片言腐藥千箱豈若還丹一粒還丹一粒點銕成金至理片言轉凡作聖秪如目前天是天地是地山是山水是水僧是僧俗是俗作麼生轉撒開一切浮名目著著拈來不是塵卓拄杖下座浴佛上堂僧問海天浩渺法界無邊未審瞿曇又在何處降生師云腳跟下薦取進云赤體風前烏律律放光動地豈繇人師云莫眼花進云恁麼則旃檀林裏香風發錦上鋪花三兩層師云轉見不堪僧喝師便打乃云一番拈起一番新今日瞿曇得降生此事明明無間隔頻燒香水浴金身眾中有知恩者貼體道將一句來良久云如無山僧自道去也指天指地令人會七步周行示獨尊卓拄杖下座上堂僧問綠樹陰濃夏日長子規聲裏好商量臨濟三玄來啟問請師一一為宣揚師云風吹不響鈴兒草雨打無聲鼓子花進云三玄三要承師指末後一句事如何師打僧喝師又打僧云有意氣時添意氣不風流處也風流師云退後著乃云青悠悠蘆葦四遶白茫茫秀水一灣庭前古柏參差閣後新篁直豎即此便是棲真境擬問棲真成自昧問既成昧不問不知正恁麼時如何即得舉起拂云會麼三級浪高魚化龍癡人猶戽夜塘水上堂荷葉團團擎翠蓋蓮華灼灼鬥紅粧馨香越格無人薦又逐薰風過埜塘可謂婆心太切迷子何知是以世尊退兜率而降王宮脫珍御而著弊垢達磨西來折葦渡江面壁九載已見慈悲之極損己而益人如母念子靡所不至故經云達一切法即心自性成就慧身不由他悟香嚴擊竹靈雲見桃長慶捲簾百丈扭鼻斯皆達法自性者也雖然只如傅大士云須彌芥子父芥子須彌爺山水坦然平敲冰來煮茶且道明甚麼邊事豎拂云還會麼陳年骨董無人問拈出當陽也怖人擊拂子下座龍池掃塔眾請上堂僧問象駕入山林木盡皆失色正法眼藏一眾仰望匡扶報德酬恩則且止祖禰不了事如何師云不勞上座擔憂進云秪如三聖推他保壽出頭為甚瞎卻鎮州人眼師云秪為流通進云恁麼則有意氣時添意氣不風流處也風流師云倒一說進云謝師荅話師云今日老僧失利問春雨如膏新點黛和風樹老正垂陰蓋覆乾坤則不問歸源一句請師宣師云放汝三十棒進云古塔喬松迎瑞靄生機獨露杖頭尖師云非汝境界進云與麼則龍池一脈源流遠萬派聲歸海上消師云遠之遠矣進云一雨三根皆普潤大千無處不霑恩師云知音者少僧禮拜歸眾乃云遞代相承古至今法音三世布寰中禹門堂上師親印太白峰前兄繼燈惟有老僧緣甚尟半生清淡寄松陵戊春為作翁兄奠努力登山惜暮齡茲因古帆侄同合山勤舊禮請老僧陞於此座老僧素不知道何法可說但盡偷心洞然明白是以釋迦為此掩室於摩竭淨名為此杜口於毘耶鼻祖為此對梁武道箇不識且道老僧見處與古人見處還有優劣也無良久云犀因翫月紋生角象被雷驚花入牙常州府宜興善權寺語錄上堂至法座云法無定相遇緣即宗事無一向有請則赴呈疏云大眾既已洞明何煩維那再讀以拄杖指法座云從空疊就平地敷陳祖令既行當仁不讓遂陞座拈香畢復拈香云此一瓣香多生種植半世辛勤今當第五回拈出供養天童堂上明故先師密雲大和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象眾當觀第一義師云法幢經偃已多年眾手相扶豎不難世出世間功德聚勸君莫作等閒看眾中還有出手者麼僧問離墨峰高連太白曹溪浪湧漲荊溪把定封彊則且止隨方導物事如何師云看孔著楔進云如是則一句無私今古共清風匝地四簷生師云從來不敢擔當進云曾經白汗出莖草現瓊樓師云說得不如行得進云今日親領和尚師云只恐孤負老僧乃云法幢境界絕思惟碧眼黃頭竟莫窺任是三賢并十聖也應到此豎降旗大眾且道法幢境界有甚奇特不見教中道法幢者乃表根本大智此智為諸佛之師即如來清淨法身此身即釋迦如來本然自性此性非獨如來有之一切眾生皆已具足只因一點無明當面覆卻遂成迷昧苟非大智光明炤了何能轉凡成聖永脫輪迴是以諸佛如來由此大智光明力故頓獲本妙明心契同毘盧法界諸大菩薩由此大智光明力故廣修萬行頓成滿足菩提一切聲聞緣覺由此大智光明力故圓修四果獨證單空一切凡夫由此大智光明力故炤空煩惱徹悟自心天下宗師由此大智光明力故據坐猊床弘揚祖道是以從上佛佛祖祖莫不由此大智而發行由行會理證理成果凡有動作施為莫不由此大智而得成就所謂百億毛頭師子智一莖艸上現全威茲因明如商谷等自念為僧不寓於十科事佛徒消於百載是以發弘誓願恢復久廢之古剎恭同闔邑縉紳文學居士遠招老僧主法自揣年邁無力擔荷再三推委推委不下只得勉力詣山陞於此座證明如上之功德莫不皆從大智而發行事成功倍則證理成聖不難矣凡為善權捐捨一椽一柱一磚一瓦所獲功德與眾上人功德無異雖然眾上人與眾施主還見得三輪體空不住於相麼卓杖云因該果海空心量果徹因源報莫窮下座監院設齋請上堂僧問洞壑空山無聲不應洪鐘在架有扣則鳴學人擬興數問請師一一為荅師云逐一問將來進云墀偃千年柏碑題三世因如何是善權景師云兩洞真仙界進云眉橫離墨翠衣掛國山雲如何是景中人師云遊人接踵來進云任他崖石爛終古為誰通如何是人中意師云到此方知學人未問已前一句又作麼生舉揚師云秋深黃葉落進云將謂春歸無覓處依然轉入此中來師云不可妄通消息乃云進院以來經六日長宜風俗毫無別渴飲饑餐事事同謙和到處生歡悅個事從來不覆藏擬議低頭成自隔不自隔冷灰豆爆豁雙眸天上人間無等匹今日慈炤監院設齋供眾禮請山僧陞座要與大眾結般若緣若有人問結緣且止如何是般若向他道林空山露骨風動水生紋卓拄杖下座浪木靜主領溧陽舊縣上興埠董張史三居士設齋請上堂師云子月一西來祖意分明極赤體條條不覆藏玉容點點無遮隔舉拂云信手拈來不是塵擊拂子云從來撲落非他物只要當人見得真曠劫無明當下息三世諸佛本同參歷代祖師元氣合聖見凡情一并消涅槃生死空依號到恁麼地且道還假修證也無雖然舊閣閒田地一度嬴來方始休臘月結制上堂師云善權臘月結制不效諸方舊例亦非特出一頭秪要諸人共會且道作麼生會昔年迦葉為阿難倒卻門前這剎竿今日大家共扶起做個兒孫不枉然卓拄杖下座出山回上堂師云出山經月始回山舊歲新年莫異看胸次不存來往跡超今越古事無難所以古人道不執有相弗住空寂二邊不住中道迥立脫體無依孤光絕待眾中還有到恁麼地者麼良久云有無且置如何是超今越古不難底事豎拂云莫待夜深剛把火即今當道與人看解制上堂師云老僧無福又無能人事攀緣念似冰秪可杜門延暮景那堪搖尾乞諸鄰今朝放出英靈漢散與諸方繼祖燈他日有緣再相聚親疏惟驗棒頭痕大眾且道有痕者親無痕者親有痕者疏無痕者疏試檢點看良久云作麼生檢點試玉須經火求珠不離泥卓拄杖下座
