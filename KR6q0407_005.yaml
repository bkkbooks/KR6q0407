body:
  text: 嗣法門人行浚等編蘇州府嘗熟福城禪寺語錄山門云豁開戶牖內外通徹凡聖交參龍蛇互入遂喝云須知香海寬洪那比污池淺迮便入佛殿云佛者覺也佛在者裏覺在甚麼處呈臥具云無相國中留不住月華影裏覓還難伽藍云拈香禮拜神明自知昔受靈山囑今當大護持祖師云隻履西歸後兒孫滿大唐不肖忝於斯慚拈者瓣香方丈云據此室行此令驅耕奪食拔楔抽釘任他隱勝現劣以劣作勝明鏡高懸妍醜自現即日鎮臺楊護法設齋請上堂師指座云只此華王座人人盡可登但能真悟徹足下便升騰且道悟箇甚麼還見麼便陞拈香云此一瓣香端為祝延今上皇帝聖壽萬安惟願堯風清六合佛日炤三千復拈云此一瓣香奉為滿朝文武闔國公卿乃至本府本縣各位尊官咸作王家砥柱永為佛法金湯復拈云此一瓣香奉為護法檀越縉紳孝廉文學人人獲堅固之身各各悟毘盧之性復拈云此一瓣香奉為本山肇建浮圖寶殿大功德主現生五福咸臻他報二嚴克備復拈云此一瓣香第七回拈出奉供天童堂上明故先師密雲大和尚用酬法乳之恩師歛衣就座維那白椎畢僧問法雷大震猊座高陞虎驟龍驤即不問入院風規事若何師舉拂云看取令行時進云古虞山色千層秀新塔風光七級高如何是福城境師云親言出親口進云隨宜所說法如雨太白源流一派長如何是境中人師云一人上座萬人參進云意氣不從天地得縱橫何處不風流師云切莫詐明頭進云解下虎鈴驚大地象王鼻孔謾撩天師云料你也不識僧禮拜退乃云昔年曾住福城寺今日依然住福城彼此處殊名不異百千諸佛一燈明故經云我見燈明佛本光瑞如此敢問大眾如何是本光良久云不明自發則諸暗相永不能昏喝一喝下座師昔曾住嘉禾福城結制毛德卿同眾居士請上堂師拈香畢乃云福城寺裏始開爐七事元來一事無衲子如能真辦道三餐供給有檀那故曰聲和則響順形直則影端門內有君子門外君子至秖如道本天然如何用功方為真辦不見古人道若起精進心是妄非精進若能心不妄精進無有涯心不妄者以見真參之力也因真參力故故心無妄經不云乎諸妄消亡不真何待豎拂云會麼未明有說皆成謗明了無言死水中擲拂下座久隱禪人同童聖修包祖瑞陸志一吳超惺眾優婆夷請上堂云一年四季已過三惟剩隆冬又將去衲衣下事豁然惺拍掌呵呵成笑具既已得惺為甚反成笑具只為踏破草鞋無覓處得來全不費工夫舉世尊昔日在靈山會上說無量義經入無量義定是時天雨四花地搖六震世尊從眉間放白毫相光炤見東方萬八千土於是彌勒騰疑文殊領荅乃云我見燈明佛本光瑞如此即此本光人人本具箇箇不無在聖不增在凡不減迷之則生死始悟之則輪迴息迷悟兩無干方堪入廛垂手接物利生昨日夜叉頭今朝菩薩面逆順總成權折攝皆方便此猶是建化門庭邊事畢竟歸根得旨一句作麼生道震威一喝下座梁父王居士壽誕請上堂僧問福城初興一物無般般應用仗檀那今朝虔設雲廚供慶讚因齋事若何師云風來草偃進云竺國西天增壽域須彌頂上𡎺金隄師云水到渠成進云大家一缽和羅飯鼓腹謳歌頌太平師云分明聽取僧禮拜退問放行也是處是慈氏把住也無門無善財請問和尚即今放行則是把住則是師豎拂云汝道看進云恁麼則兩頭俱坐斷八極起清風師云是把住是放行進云和尚是何心行師云路遙知馬力進云學人禮拜去也師云日久見人心乃云朔風凜凜歲將周新舊相交秪一旬雪月霜花無限意誰能於此悟天真是以陸亙大夫問南泉云肇法師也奇怪解道天地與我同根萬物與我一體南泉指庭前牡丹云時人見此一株花如夢相似大夫無語大夫無語則且止南泉荅處大眾還知麼若也不知老僧為汝下箇註腳不離花顏識肇顏花顏怎比肇顏鮮肇顏不在花顏上萬紫千紅盡失顏還知老僧見處麼若知老僧見處便知南泉荅處若知南泉荅處便知陸亙問處如總不知不可丟在無事甲裏不見道若人生百歲不會諸佛機不如生一日而得決了之此事且置今日因齋慶讚一句作麼生道壽山增聳福海添流啟明劉居士薦義兄恃雲金居士三七之辰設齋請上堂云從苗辯地因語識人極盡今時方堪成立眾中還有極盡今時者麼有則不妨露箇消息良久云無則老僧自露去也管鮑分金世所稀名標青史貴無欺男兒誰不應如是獨讓金劉二士為只此一點無欺之正氣充塞三界包括二儀萬聖千賢莫不從茲流出故經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出此經者即正氣之謂也吾人眾生從無始來迷背此經名曰無明頓起三細六麤造十習因受六交報生生死死死死生生如旋火輪無有休息故曰情生智隔想變體殊金劉二士生則重義謂之君子死得正氣必為仁神在人世中可謂出類拔萃者矣較於出三界聖人便有霄壤之隔何也只為未盡輪迴隨業流轉但能回心向道一念回光頓破無明二死永亡五住究盡上無攀仰下絕己躬淨裸裸赤灑灑正恁麼時如何通信不見一法即如來是則名為觀自在解制司理嘉生許護法同詹太夫人請上堂云正月纔過二月臨流陰半點不饒人耳邊又覺添霜鬢生死循環悟始停眾中還有正悟者麼良久云不見古人道悟則不無怎奈落第二頭敢問大眾如何是第一頭以杖駕肩顧左右云楖栗橫擔不顧人直入千峰萬峰去季齊王居士請上堂僧問說戒期逢二月初端然依樣畫葫蘆是凡是聖須分別彼丈夫兮我丈夫如何是丈夫底作用師云一人有慶兆民賴之進云如何是聖賢底心行師云地獄未空誓不成佛進云戒光從口出是何意旨師云蹉過不少進云如是則千江有水千江月萬里無雲萬里天師云又是從頭起問師將七十古來稀妙旨當堂接上機新塔善權同一體分身兩處道巍巍如何是道巍巍底句師云楖栗橫擔不顧人直入千峰萬峰去進云桃花應節放黃鳥遇春啼師云兩彩一賽問浮圖聳霄漢萬象悉迴旋如何是新塔境師云門對虞山添秀色進云皓然霜雪鬢四海衲僧歸如何是境中人師云龍蛇混雜凡聖交參進云人境蒙師指真機又若何師便打進云舉頭天外看誰是我般人師云低聲低聲僧禮拜退乃云頭頂天腳履地漢語胡言誰不會觸境生情事事垂言前領旨般般慧阿呵呵會也麼棒打石人頭嚗嚗論實事且道如何是實事良久云暮春三月朔桃蕊已將麤卓拄杖下座信女超琪請上堂僧問妙峰孤頂即不問特地風生事若何師便打進云一條界破青山色今古長如白練飛師云承言者喪進云龍吟霧起虎嘯風生去也師云滯句者迷乃云老年晝寢覺身安春雨頻頻興自闌未得純修無上慧人間天上福為先故經云修有為福捨一而得萬報況修無上慧耶且道如何是無上慧不見道覿面相呈第一機纔然眨眼便差違擬心動作投坑阱開口分疏落是非有法尚猶縈見網無疑未可脫情圍捲簾袖手當軒坐禪板蒲團為發揮且道發揮事作麼生震威一喝云但看江南三月裏鷓鴣啼處百花香下座信女吳門曹氏請上堂云花期三月已輕過立夏仍交四月初識得薰風南面起莫將冷熱較親疏故經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辯真實所以道身世悠悠不繫舟得隨流處且隨流今朝有酒今朝醉明日無錢明日愁所以僧問法眼如何是曹源一滴水眼云是曹源一滴水頌曰曹源一滴有來因荅處無如問處親但見桃花隨水去不知流出洞中春且道如何是洞中春卓杖云頻呼小玉元無事秪要檀郎認得聲明虛禪德同丁用卿鮑玉泉居士請上堂僧問千里迢迢送供來忘勞為法世希哉請師展演超方句指點當人得意回師便打進云有意氣時添意氣不風流處更風光師云被汝道著進云覿面無私一句子令人千載骨毛寒師云負恩者多僧便喝師亦打乃云昨日曾將今日期秪因檀信遠臨扉須知箇事離言說請說令余暗皺眉所以僧問馬祖云離四句絕百非請師直指西來意祖云我今日勞倦不能為汝說問取智藏去僧問藏藏云我今日頭痛不能為汝說問取海兄去僧問海海云我到者裏卻不會僧復舉似祖祖曰藏頭白海頭黑者僧問處欲向白拈手裏分金卻被馬家父子當面換卻雙睛全然不曉末後舉似馬祖重納敗闕只如祖云藏頭白海頭黑意作麼生豎拂云會麼黑白口開成話墮分明土上更添泥啟建蘭盆勝會鎮臺楊大宗請上堂僧問中元節屆一雨涼生和尚高陞此座畢竟將何舉揚師便打云向者裏薦取進云恁麼則情與無情皆承此恩力也師云只恐說食不療饑問法幢高豎四眾雲臨普利一句請師速道師云唵啞吽進云恁麼則有水皆含月無山不帶雲師云平地上死人進云謝師荅話師云放汝一頓乃云至孝無如目犍連度親親到銕圍間手持缽飯消饑火業重徒將母手牽白佛垂慈須仗眾方堪釋汝母深愆趁此良辰僧自恣廣設蘭盆供眾賢但得十方雲水至消除母業頓生天勝事留傳千古後永為孝子度親緣由是鎮府楊公及眾護法遵依佛制恭就新塔福城禪寺建盂蘭盆會福國裕民廣孝報恩普利道場七晝夜於中幢幡間列衲子交參演誦神章歌揚梵唄設香羞供養十方賢聖然明燈煇煌七級浮屠遍施摩伽斛食賑濟大地孤魂正當人天普集躬臨法筵虔請山僧陞於此座特為表揚作諸佛事所集功德專申報薦揚府先遠宗親乘斯法力速離幽冥往生蓮界面見彌陀得蒙記莂更冀在任為國交征殺戮官民等眾各各解冤釋結咸遂逍遙伏願皇圖鞏固帝道遐昌甘雨時調民災永息四方黎庶樂昇平一國生靈歌至治雖然萬法最初無不善一心才動有差殊即今善惡俱拈卻妙性空空體自如大眾且道如何是空空底妙性豎拂云還會麼聲前有語難容舌惟許頭陀一笑傳下座結制知浴勤修領居士許雲翼請上堂云今朝重整沒弦琴非水非山孰解聽果有超群出格者不妨假指助徽音僧出問久仰琴川最上宗特來千里得相逢懇垂的旨超方眼幸冀吾師一線通師打云便與你通者一線進云者猶是老漢陳年作用拈向一邊斬新條令合作麼生師復打云且道者是新是陳僧一喝師連棒云胡喝問鐘鼓鳴時集聖凡潑天爐鞴實非常金毛不懼臨危事便請當軒善舉揚師便打進云棒頭擊開諸聖眼去也師云喚作棒入地獄如箭射僧一喝師又打僧禮拜歸位乃云九旬結制今朝起寢息諸緣究本參㘞地一聲開頂目超凡入聖剎那間然雖具隻摩醯眼腦後應須痛著鞭為甚如此不見道欲窮千里目更上一層樓舉昔日寶壽開堂三聖推出一僧壽便打聖云恁麼為人非但瞎卻者僧眼瞎卻鎮州一城人眼在壽便下座歸方丈可謂陷虎機深擒龍手疾雖則埋兵索戰怎如箭定天山正是棋逢敵手琴遇知音若在老僧分上又且不然眾中忽有推出一僧只向他道八十翁翁入場屋真誠不是小兒戲恁麼為人非但瞎卻者僧眼瞎卻一城人眼在更向他道啼得血流無用處不如緘口度殘冬且道老僧與古人用處還有優劣也無有則不妨檢點看良久云檢點且置即今結制一句作麼生道缽袋暫將高掛起草鞋仍曬待春風卓拄杖下座佛成道日知浴領居士請上堂僧問佛身充滿於法界普現一切群生前世尊為甚卻降皇宮師云豈不聞普現一切群生前進云世尊未生度人已畢因甚雪山六年師云只為你者瞎驢僧便喝師便打僧又喝師連棒云胡喝問世尊初生便道惟我獨尊因甚麼睹星方悟師打云你還知世尊獨尊處麼進云恁麼則知恩方解報恩師又打云如何是你知恩處進云覿面無回互當機任卷舒師云猶道得一半問悟道雪山成話柄惟明生死絕淆訛曾聞兜率三關語還許即今請益麼師云一一問將來進云撥草瞻風秪圖見性和尚性在甚麼處師打云我也不識進云恁麼則掬水月在手弄花香滿衣見性之人能脫生死眼光落地時作麼生脫師云待汝眼光落地即向汝道進云恁麼則雲駛和月運舟行連岸移能脫生死必知去處四大分散時向甚麼處去師打云向者裡去進云恁麼則潮去還歸海月落不離天三關已蒙師指示頓超生死句如何師打云退後看取進云一句了然超百億拈來恩大實難酬師云閒言語進云莫將鶴唳擬當鶯啼師不顧乃云苦盡甜來孰不然香糜麻麥豈輕餐出世世間底事業雪山有志定方圓彼既丈夫我亦尒不應自卑生退屈豎拂云大眾明星現也還見麼若也見得徹去便乃光吞萬象氣絕諸塵其或未然不免略通一線當陽見定無毫髮擬議尋思隔萬山卓杖下座上元解制上堂云天上月圓人間月半體用雙彰理事一貫相原虛恒泯一體千差攝入而無礙性雖實常在萬緣一多緣起之無邊花根本麗虎體原斑雖然不改舊時顏未免人人添一歲既添一歲為甚不改舊時顏任他日月縱橫掛一亙晴空萬古閒更有一頌舉似大眾百日禪期幸爾圓雲廚乏供事難全七旬老矣應休去此席從茲遜後賢監院慎獨為和尚慶誕領居士設齋請上堂師云上堂擔子已經辭今又重挑為甚底只為遠來檀信願那容固必且隨宜上與不上法元同畢缽羅巖峙水中玄辯樞機空蕩蕩少林門下路方通或謂單傳直指全無委曲今又說個隨宜得非委曲耶豈不聞德山見僧入門便棒臨濟見僧入門便喝雖然覿體提持直截分付不知正是第一委曲也故曰便是猶倍句動目即差違欲問曹溪旨猶成第二機大眾如何是第一機良久云還會麼任教滄海變終不與伊通公魯周居士設齋慶誕請上堂師云印心莫若楞伽玅蕩相無如般若親會得二經真的旨千紅萬紫一般春雖然譬如暗中寶無燈不可見佛法無人說雖慧莫能了且道如何是說底佛法雨水正月中驚蟄二月節陳家市眾居士請上堂師云投老年來事易忘任他烏兔兩頭忙飢餐渴飲隨時過無力閒遊到別方舉昔日同安丕禪師因僧問如何是和尚家風同云金雞抱子離霄漢玉兔懷胎入紫微僧云忽遇客來將何管待同云金果早朝猿摘去玉花晚後鳳銜來同安老漢雖善荅問在自己家風了沒交涉設有人問福城如何是和尚家風只向他道老年住箇破院子有鼓無鐘響不全忽遇客來如何管待非惟盤內無蔬果廚下無糧煮飯餐且道與古人是同是別試檢點看良久云檢點且置即今因齋慶讚一句作麼生道七旬祝誕檀家福一句伽陀佛種緣信女葉氏法名寂廣請上堂千聖從來有一機當陽見徹絕離微試看倒用橫拈處奮怒那吒亦失威所以昔日僧問乾峰十方薄伽梵一路涅槃門未審路頭在甚麼處乾以拄杖畫云在者裡僧至雲門復理前問門云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾看他二尊宿一人要伊覿面搆去一人要伊暗中領悟雖則各有為人處檢點將來二俱未善何故聻一人辭簡轉使信莫能及一人辭繁翻令摸索不著若到福城門下總不恁麼忽有人問未審路頭在甚麼處只向他道一片白雲橫谷口幾多歸鳥自迷巢上堂向上一路千聖不傳直下了達只在目前還識目前意旨麼不見僧問玄沙學人乍入叢林乞師指箇入處沙云還聞偃溪水聲麼僧云聞沙云向者裡入目前雲水浩浩識得古人指點處麼如未識得更為頌出東瓜直儱侗瓠子曲灣灣將來一鍋煮普請大眾餐上堂桃李春風錦萬機遊人正是賞芳時王孫不惜黃金彈拈出林間打雀兒試看王孫欲獲林間一雀尚且不惜手中金彈況我林下人圖出生死悟明大道豈反有所惜耶是以神光問道于初祖便乃斷臂船子接人于洙涇便乃覆舟斯皆自利利他不惜身命之樣子也出類拔萃之英雄求道豈王孫獲雀可比雖然老僧見處又且不然上無佛道可成下無眾生可度數聲清磬是非外一箇閒人天地間揮拂下座上堂空劫已前一段事明明動植共宣揚道人胸次機輪活變腐為奇別有方是以世尊拈花迦葉微笑南泉斬貓歸宗斷蛇禾山打鼓雪峰輥毬趙州茶雲門餅曹山酒金牛飯斯皆變腐為奇者也且道老僧變腐為奇又作麼生良久云更有一般難信處腳尖踢出佛如麻上堂師云一念纔生一佛成河沙煩惱總歸真等閒唱箇還鄉曲禪板蒲團子細聽聽則且置還鄉曲作麼唱良久豎拂云會麼千山勢到岳邊止萬派聲歸海上消上堂師云小玉聲中得路時揭開藏海顯全提須知琴水溪邊意白鳥雙雙度柳枝所以昔日魯祖尋常見僧來便面壁南泉聞云我尋常向僧道佛未出世時會取尚不得一箇半箇他漝麼驢年去師云魯祖若無南泉但得其用南泉若無魯祖但得其體向魯祖處會得活了死不得向南泉處會得死了活不得如何方得體用一如死活一貫去豎拂云有水皆含月無山不帶雲上堂烏飛兔走急如梭明暗何曾昧得他箇裡本來無可說謂言無說已成多豎拂云大眾且道是有說是無說擲拂下座為五空徒起龕師以杖擊龕三下云三年冷坐如彈指久屈方伸事易為轉身爍破無明㲉入聖超凡趁此時舉火云五空五空五法既空則上無攀仰下絕己躬天上人間惟吾獨尊還知獨尊之旨麼以火炬打圓相云能為萬象主不逐四時凋
