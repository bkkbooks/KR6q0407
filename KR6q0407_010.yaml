body:
  text: 嗣法門人行浚等編詩偈共計一百六十二首五言四句計十三首龍池十景禹門橋為鎖清溪水虹霓駕碧空遊魚如過此頭角自崢嶸娑羅樹禪林多古樹絶少是娑羅殿角亭亭立心空緑蔭多中龍池水靜知龍隱山高暑亦寒乘時雷雨動變化入雲端分賓嶺道人絶迎送賓主若為分極目遙千里相看嶺上雲白雲巖片片風難動玲瓏若墜雲幾多人過此入眼不能分避暑窟石窟藏深處炎蒸氣不侵涼風何日至颯颯動長林試心石塊石懸空半雲根萬丈深未能忘我相到此盡沉吟憑虛閣奇崖搆小閣時被白雲埋拾級聊憑眺天風腳下來伏虎石怪石形如虎當途也畏人一朝能覷破從此兩忘情玉昜臺玉陽本名預昜以日出先照得名因字音相似遂誤為玉朝登玉陽臺上下一輪日俯仰萬波紅令人動心魄丁堰往如皋聯舟風送穩天晚趁晴和行盡千株柳如皋路不多大林五旬一片清涼地大林為所依從來塵不染何用更知非送白巖不惜燈前別何勞訂晤期但依松竹老遠隔未曾離五言八句計十三首賦莖虀庵濁富人多競清貧世見遺只知千石酒誰顧一莖虀道向淡中得詩從間裡思二途雖見徹取舍貴能離次答藍田叔用古韻崔白登山暖頭陀入寺寒昨朝千嶂雪今午一溪湍凍解承和惠情忘仗力參人心多好智誰似石頭頑留別松陵衆居士依依解纜日握別病來慵身泛嘉禾棹情留舊隱蓬巖花空自玩蘿月暗相通千里休云隔雲開露碧峰侍師過虎溪不辭肩負錫且喜命隨舟蒼翠雨中樹飛鳴水上鳩但將心並洽莫論事難周山色湖光裡寧堪作浪遊宿雲岫庵遇雪高臥不成寐唯嫌衾尚單幾翻爐內火頻壓枕邊寒窗色疑殘月籬聲誰折竿曉來山寺外一片白林巒過祇園庵一入祇園路迢迢直向前不經樵父指獨往杏花天抱拙應忘世尋賢豈論年蓬門三下響打透竹籬邊過青螺庵一村又一村過盡見籬門野路依然闊間花元不繁雨添新水漲風起晚鴉翻若問青螺事波心印月痕送鼓峰之徑山解瓢分碧澗冷處自能知未得同山住臨行怨路歧崚嶒蠻石面屈曲老杉枝泉水聲長暗雲中聽者誰師住三仙衆以詩賀次韻酬之老朽多飄泊恬然了宿緣豈耽塵世欲猶寄海門天廣惠前朝寺三仙昔日賢逢人恁麼舉離此別無禪賦得有約不來過夜半白日空間放故將今夕期琪花難獨賞珂月待聯詩風響如敲戶月移疑到墀三更空倚望不省竟何之寄族兄殊居無百里相見每更年自覺情疏淡誰知惜比肩鶴髮成間事童心了舊緣一條家裡路須省快加鞭次詹叔臧居士於世惟甘弱干戈不用持失猶吾所貴得豈彼能遺道自情空著才因壓衆辭毋煩他處覓只禮自心師秋雨赴請好日晴偏少貪程帶雨過黃花庭賞未紅蓼岸看多否極時當泰年高志不磨世緣唯我薄難免笑懡㦬七言四句計七十三首山居一庵結搆四山中面面芙蓉插碧空秪許野人歌白雪更無遊客駐青驄又掃除轇轕坐山窗列祖因之建法幢大道本無取舍執初機習重要渠降又巢雲野鳥下階墀知我生臺有法施漸近僧雛就手食一回食飽上高枝又抬頭秪見白雲飛舒卷無心為發機塵點劫來何所住隨風聚散竟忘歸又烽煙不到此山居墾土栽蔬得自如時摘野花供佛眼清香滿室襲人裾又霜飛木落孰無吁道者隨時卻自娛黃獨深深埋糞火不知山雪壓吾廬又山深午夜不聞雞暗揣人間夢不齊誰得此時能自醒轉迷成智不勞提又居山豈是把頭埋要把工夫自己揩一得此心渣滓盡縱橫三界了無乖又山居無主亦無賓清理田園亦認真身寄閻浮如旅泊肯將夢事較疏親又一身謝事似浮雲雲去雲來莫與群不用安排延歲月徑松窗竹自成文又終朝默默坐蒲團澗水山花代我言不識此時誰領悟頓教直下息心猿又屏絶夤緣夢亦安山窗簾卷看巑岏不愁貧到無衣食荷可為衣松可餐又徙倚門前只見山層層積翠隔人間吾生居此非圖靜要養天機出等間又山居無事學栽蓮看取花開盛夏天一陳好風池面過清香送到鼻頭邊又門外漻漻水一條參差榆柳夾溪橋過橋飲水眠雲去不厭風吹樹上瓢又莫道山廚太寂寥客來野菜作佳肴天生一種真滋味嚼著令伊不肯拋又獨行獨坐意何豪聖見凡情俱已消日夕間間無所事逢場作戲似兒曹又不覺山翁髮已皤間消歲月在巖阿柴門緑蔭啼黃鳥一段天機會也麼又亂雲堆裏我為家繞戶寒梅歲歲花坐對清香消瞌睡不知人世換年華又間攜竹杖步高岡遠見車塵亂夕陽富貴目前誰不競到頭輸我善修藏又野鳥關關弄巧聲山床猶未道天明窗前積翠翳朝日不是耽安懶惰生又萬緣無染始相應擬重些些便不能取舍兩忘方契道順吾取舍可分燈又繩床不動坐長林細聽枝頭自語禽恰是老僧談不到好從徹證祖師心又山居道者沒虛談截去浮詞住冷庵信重一言追年布生全五語效瞿曇又野草間花驀地拈毋容擬議涉廉纖造車合轍從來少為道求人自要嚴又煙雲抹過老松杉一軸丹青卷入函妍醜不分消息斷飛來燕子自喃喃又妙理玄言水瀉瓶何曾用得一星星任他惹動天花落蚤力何能振祖庭又門前一徑向雲開萬壑千崖腳下來行到翠微深絶處數聲啼鳥喚人回又丹青描得舊時容挂向空堂覿面逢心境相融何所見黃花翠竹滿庭中又間看青山青幾層短笻隨步一身輕莫言此事沉空寂到處風光總現成又碌碌奔馳沒了期不如歸隱得便宜山林一段悠然意未許寰中達者知又心空事事皆無礙日用何曾不現成野叟盡情言不及山禽啼處太分明又岌岌峰巒四悄然就中別是一壺天現成祖意無人會寫作山居詩百聯夏日送雪竇和尚還山蓬門深掩為誰開雨歇黃梅法駕來瀹茗正堪談契闊匆匆冒暑又南回又雪頂髼鬆驚老顏同參能幾導人間東南法道惟兄振攜杖應須歸故山次佛慈禪師蜜蜂五韻一年活計在春時李白桃紅盡采歸衆口嗷嗷何所倚豈貪遊戲向空飛二穿花過柳快生涯趁此春光采入衙兩腿酸麻安敢息只愁天雨未回家三同餐同作又同時去去來來不斷飛義氣十分成一夥人能如此快心脾四正逢三月好風光努力營為日夜忙採滿花心應足食隆冬天氣自相當五君臣道合衆和同少有參差便不通彼此掉頭施冷刺難教傷處不流紅贈既明禪人劫初收得光明鏡蘊在靈臺方寸中若也一鎚都擊碎是非形相盡皆空贈慧幢禪人掀翻般若悟天真間卜幽居遠世塵不動舌根渾吐露從教花雨自紛紛送德合省親秋風吹汝上歸程我有何言贈汝行明月杖頭能著眼面痕端不負娘生落梅零落枝頭春已窮或沾泥上或飄空莫言桃李多顏色盡在東風幾日中其二才見東君嫁玉真惡風毒雨妒來頻莫愁香色消磨盡更有枝頭無盡春登煙雨樓買得扁舟度上樓遠煙浮碧水悠悠憑闌有意何人薦忽見沙邊數點鷗其二石級層層仰面看野花無數雨漫漫客心盡向波心泊只恐朱顏不耐寒其三湖鳥湖雲盡悄然何人得意晚樓前看來個個皆遊客誰得憑欄到暝天其四徙倚樓前見遠村煙花雨色混無痕時時變換湖中景白鳥飛來不厭繁登軍山楊子江邊石一團誰人錯指喚軍山若非野衲藏修上鶴冷雲孤孰往還其二海水周遭路不通恍如蓬島在波中若非買個漁船渡那得親聞頂上鐘其三危危卓立亂波中盡日寒當八面風振古如斯常不動性情恰與道人同贈雪爐道人舉步絶無蹤不與時人行處同焰起紅爐消積雪誰知雪積焰爐紅贈百峰頂笠腰包到石鷗劈空一棒若冤讎峰頭百朵通皆占恰落尋常第二頭天台老僧乞偈滿頭黑髮已成霜何事區區下石梁不是住山心不了秪因未了度人腸體素乞偈壽乃師圓朗五旬一段孤光照剎塵剎塵圓朗孰為塵從來壽量原無算誰道伊師五十春示慈音萬象之中獨露身鳥啼花落盡慈音不能箇裡承當去徒用工夫向外尋送聚之遊黃山七十二灘一客舟上崖不必問徽州白雲成片風吹散三十六峰多露頭其二怪松怪石兩爭奇如此黃山誰得知他日吾兄停策處春鶯也要索吟詩送一拙歸徑山白雲堆裡冷難辭鍊得身心百不知試問凌霄峰頂月何人先見上松時送初弟之吳門折得梅花滿袖還春風吹上虎丘山為余問取松頭月誰是生公昔日顏送林野和尚赴請數載參隨太白山神珠瑩淨絶追攀萬松關裡春雷動草木昆蟲盡展顏送僧離離黃葉滿山秋干木隨身信步遊踏得故鄉田地穩清光照徹萬人頭答偶僧居士戲題蝴蝶入窗才過西園又復東穿花戲蕊興無窮誰教誤入間房內紙上尋門卒未通其二逗入窗櫺作網羅倉忙求脫奈情何趁時斂翅凝神去應發天機透露多扇語出入從君秪半年面皮粧點也徒然願存他日思今日不自輕拋鼠糞邊示熙凡居士靜把浮生世景看有誰能保此身安尋常閲遍古今事寵辱憂歡幾萬端示永侯居士拜相封侯身世雄百年富貴剎那中何如修省祈真悟頓使多生業性空詠萱花任他桃李鬥芳菲且自藏頭靜養機直待一朝時雨至滿身披出赭黃衣示本源居士本來自性天真佛不假修為向別求但要尋常無愧已自然處處徹源頭贈勇蓮老禪師握別鹽官二十秋知公白髮已盈頭熾然重整參尋念世上新添一趙州示習之顧居士一點靈機觸處陳百工技藝習來純龍官雖具千般寶采者須求如意珍示玄穎朱居士尋常日用占機先擬議相違路八千但得此中親薦取寒林仍舊百花鮮七言八句計六十二首日中食望煙乞食向前村出鉢平持立近門但得一餐隨厚薄便收雙足度黃昏不徒磨我驕奢習更要知人榮辱根人世盡緣謀食苦眼看湯火競頭奔樹下宿遠承遺範宿林墟午夜悠悠得自如細草成茵趺坐軟野花為帳夢魂舒微微月出懸枝後淡淡風來動葉初為省長安珠履迹陶然于此絶躊躇糞掃衣淨洗堆頭搕𢶍塵絲絲寸寸惜如珍綴成一片渾無破衲就千針勝卻新披出不愁風似箭擁來偏覺暖于春任他寒暑忘更換愈見風流道不貧腐爛藥為道忘軀固有因幻形扶得道方親飢來鉢有施貧食病起囊無買藥銀他棄殘渣仍細拾我投宿疾可輕身蘇通不假岐黃手人我山空效自神參金粟本師密老和尚日腳垂來雨腳收幾村晴樹引孤舟問津曾未迷前路到寺疑如見昔遊桑鼓遠聞金粟外海光直射石鷗頭幸生斯世逢斯老得入拈花第一流隨師入閩赴黃檗山次葉臺山太師韻一回溪徑一回盤黃檗山開地勢寬雲過嶺頭空鳥道水瑩澗底逼人寒神珠久隱獅林下化日新懸麈尾端負錫不辭千里外草頭祖意指人看其二客棹南來興不窮青山兩岸一帆風衝開巨浪魚方現劃破洪濤景亦空竹色溪光相映緑花明霞燦各成紅隨師豈浪奔州邑欲把心宗播海東其三乍入山來天尚陰雨侵瓢笠度崎嶔靈淵水瀉腳邊去佛座峰高杖底尋紺殿已藏林樹老疏鐘曾共海濤沉無緣此地何能到到此毋勞更覓心天童十二景太白峰群峰難學此峰靈未雨先雲信可徵自有龍潭通海脈更無鳥道引人登崔巍削出空中骨攀陟爭來象外僧天上長庚今在是放光如雪蔭千燈龍隱潭聞説神龍隱有年水深潭靜竟茫然一漚滅處消空界點滴興時潤大千頭角藏來從未露風雷頻起絶無緣抱珠默養休光在贏得山靈世上傳萬松關截斷紅塵松作關層層夾立遞分班濤聲亂落高低路翠色晴連遠近山萬里鶴歸興有托五湖僧到動忘還世人不識從茲叩匍匐何途入此間玲瓏巖翹首巖前接見新白雲四出一嶙峋粗頑偏怪能生竅穿鑿尤奇不破真化士湧空身出眼飛猱伏竇石窺人松聲竹色相呼映靈洞寧容虎豹蹲活眼泉石上涓涓一眼通不知流出自何從隔林聽去聲疑雨到澗看來勢若龍萬畝山田分可救千村煙火汲能供曹源一滴真相似落在吾家用不窮獅子柏庭前老樹忽嚬呻踞地撑天欲驗人枝葉枯時看骨力爪牙露處識根因風來抖擻生靈籟雨過髼鬆占好春狐兔絶蹤纖草盡蘢蓯特出趙州身萬工池一方碧玉印門中開鑿當年動萬工頭上有天沉作底地中生月走如空深山草木如經雨古路塵沙不起風滌膩洗愆曾未吝幾人於此露心胸清關橋漫延松徑到清關頂笠腰包好息攀古柏兩行中截斷深溪一帶接潺湲掠虛水燕雙飛去吠實山猱獨往還橋內不知橋外事且遺塵境入青山鉢盂峰何人擲鉢踏空行化作孤峰得此名盡地托來猶尚重普天裝入豈能盈有時出霧疑初展鎮日藏雲似失擎我欲借來常乞食好煩飛下一囊盛鎖翠亭未到但知亭鎖翠到來方識翠含亭孑然鶴立渾無倚忽爾雲歸若有扃清冷石泉堪掬漱虛徐林籟可憑聽凄其風雨何人過獨有叮叮殿角鈴祖印崖不惜懸崖舉似君祖師心揭萬重雲鳥章龍篆蒼煙合漢刻秦鐫碧蘚分點畫未彰先有印陰陽已判尚無文絲毫錯誤終難契九上三登不厭勤問水石水石從來不共謀石常鎮靜水常流石根偏向水邊出水勢爭歸石處投決決長年渾未息頽頽終日獨成幽相離相合緣何事突兀臨湍問得不即事滿巖桃李別人間秪許幽棲道者攀翠嶠插空無鳥度蒼松匝地有船灣昔人居竇消貪暴此日藏舟息冥頑禍福信知非外召且將末路寄春山二避暑無如傍柳陰幽居水閣孰相尋凝然獨坐涼生案莞爾忘言物會心荷小易撑一葉艇林深容宿四來禽此間莫訝真深邃更有人家住最深三群峰疊疊勢爭雄幾所樓臺隱樹中一帶斷垣間菊徑半空飛瀑亂松風呼童石上尋芝草問路溪邊見野翁知有別峰最高處暫容老衲得相通四閉戶垂簾卻畏寒爐添榾柮始相安已知入谷塵囂遠豈識登山途路難雪後看雲迷草樹雨中聽竹雜風湍逶迤曳履雲根上聲色迢然耳目寬友人過訪依依楊柳緑成叢取次桃花爛熳紅深掩柴門誰剝啄漸回春夢自矇朧枝頭好鳥來窗下天外孤峰落檻中幾度東風吹獨坐今朝石上詰諸公客舟夜雨舉棹剛逢夜雨侵風聲和葉戰溪陰遠隨漁父尋歸路歷盡煙波見客心紅蓼汀邊棲鷺濕白楊堤畔臥雲深世間總是荒涼境好向江天放意吟送僧之越草鞋結束即飄然踏破前村幾里煙滿目青山開越地一林黃葉落吳天探津自買雲邊棹得句誰聞月下舷知爾面前山水別不將到處作三禪送僧入山雪裡相逢話竹邊離歌又動柳堤煙生前再會寧無地別後添愁自有天杖撥亂雲知路徑笠移明月到林泉素懷未必還山慊談及人間便不然送雲藏住山南北東西走一場竟將瓢笠入山藏芒鞋踏破參方眼布衲披回濟世腸英氣卻成寒谷彩道風偏和野梅香萬松林裏雲常滿不必頻頻掩竹房送等呆住徑山行盡雙溪筏不通杖藜登岸即山中間時常識雲興處忙裡偏聞鶴唳空頭髮養長成稚子身心煉得作衰翁呆師沒點安排力出語應如谷口風寄講師一局楞嚴事若何躬慚淫席扣禪那因無靜默真修力尚有多聞狂慧魔愛見不生因克果心言俱直水同波欲詢大覺初方便一喝臨機細揣摩答可參座主兀坐寥寥想舊容犬聲忽爾到庭中去時曾指春堤約來日當看秋蓼紅滿徑菊香生客思一林葉落露家風直須截舌還能語撥轉宮商調自同過尹山禮永隆禪師塔追次皇明太祖韻道行高標千仞松便將烈火顯真功多生積愛誰能捨宿世良緣豈偶從一片栴檀香世界兩行血字動皇宮信非般若薰修力怎得瑩然出色空西園赴約湖水湖山路正繁不辭跋涉到西園當年招隱曾相許此日探幽踐昔言近水遙山相映帶長林豐草絶攀援敢將叢席都拋卻曳杖從茲隱石門偶僧居士以詩章見惠書此答之佳句咿唔口不離恍如春酒泛酴醾不由警枕揩磨力那得揮毫立就奇衛玠善談深自愧子平絶倒有誰知從來名下無虛士往往聞人説項斯贈明巖大師片帆高挂向吳來湖水瀰瀰眼豁開風送白雲籠古寺鳥銜金粟繞香臺道全不礙魔來擾禍盡應知福自回毀譽兩忘堪住世一輪明月絶塵埃示講主從來不貴説為行默默還須履踐真曠劫塵緣應自淨等間習氣莫容侵一條脊骨如金鑄百折衷腸似鐵淋造到言窮辭絶處再來喫棒與安心次韻答叔鼎沈居士寒燈午夜火猶清照著令人徹本生光影門頭休駐足色聲叢裡好撑睛不須他處求分曉但向其中了識情山野為公重指月棒痕突出玉蟾明挽夾山林皋和尚分襟角里草餘年遠隔溪山思罔然將謂同條常接麈誰知一箭竟離弦踏翻幻海升兜率剔起真燈續正傳顧我寒林孤吊影何時重見火中蓮挽福嚴費和尚太白峰前別有年豎幢吳越共南天正期退老還攜手豈料翻身蚤息肩林鳥變聲啼不輟野花作色落還旋雖然贏我一籌去他日綱宗孰定傳挽永泰模公法侄去年留得老僧來周折殷勤見大才自謂百年燈有賴誰知一夕事都灰青松雨折傷巢鶴白雪晴飛痛嶺梅歎息祖庭賢已隱雲堂何日鼓重雷張公洞張公昔日居崖穴愛選峰巒布室中遺迹有軒丹灶冷迎賓無路白雲封高低巧設懸空石起伏深藏走地龍始信仙源在人世到來何事覓無蹤玉女潭青山疊疊樹叢叢玉女何緣隱此中潭水一泓澄似鏡野花無數映如空只因清冷遺珠翠長得風流伴竹松渴鹿趁來隨量足年年深淺底相同仲春大雪寒衣才減復加身頭帽仍添一幅巾窗上乍聞聲颯颯屋頭已見白鱗鱗臘中到地方稱瑞春半飛空秪益顰惟願蒼天息災眚忍于斯世苦良民答太平庵同塵禪人六十餘年混世塵為尋知己歷艱辛乘風欲作投林鳥破浪欣逢出網鱗獅窟正宜留象迹雞園且喜絶狐身門開合轍非容易唯仗懸崖撒手人答聖月錢居士送入天童之作即次原韻祖庭主法責非輕投老何堪任大名自分山樗宜退守敢煩國士遠相迎就途正怯三冬冷駐錫聊安一衆情太白依然雲外聳到來最喜是天晴過芙蓉莊訪錢牧齋太師柴門流水杏花香絶勝當年緑野堂一代經營真事業片言嬉笑即文章非因避俗居東海且為怡神對夕陽放鶴養魚間不了樂遊原上望晨光贈劉啓明居士性天忽爾識雲收獨露蟾光皎似秋乍見眉痕懸碧落還看鏡影墮清流從教太白拋雙手一任南泉縱兩眸午夜和盤都托出幾人於此悟根由贈髻珠嚴公浮世光陰若水流霜花不覺上人頭還丹好向真金煉優鉢須從烈焰求髻上一珠非易得掌中滴乳豈能酬直須吐出如山嶽亙古凝然事始周寄湛淵耆德道眼精明學有師自甘長隱掩柴扉但教一念空情界須信渾身在寶池定起倚闌觀菊處間來俯檻聽泉時頭頭盡契天真妙不用從人覓指歸贈醫士知公久抱活人心築室多年指杏林入市懸壺因病發還山采藥撥雲尋往來子母無心計配合君臣用意深樹德傳家持此術靈樞注就作規針山居一從孤迹寄虞山贏得遮頭屋數間生死翳空雙眼淨是非機息寸心間懶拈柏子酬僧話獨對梅花破老顏更喜白雲如有意幾回飛去又飛還又放下烏藤懶出山山中無事涉塵寰投巢野鶴穿巖竇借榻間雲擁竹關半卷殘經完月下一聲清磬落松間溪光草色全身露不假黃金鑄面顏除夕一爐松火伴山翁坐到三更候歲終短髮數莖強半白疏牙幾個大多空年華易見更新令人面何能駐昔容不向有無尋活計杖頭花發用無窮遊善卷洞五色相宣迥異常昔賢曾向此中藏看來突兀疑蓬島聽到潺湲似石梁覓路已徵張祐句尋蹤未裹宿春糧早知龍壑深無限著屐探幽抵夕陽善權寺志感有序寺以洞得名後更卷為權相傳自齊梁間開創有雷書偃柏之異至今猶存惜乎法席久虛屋址半為魔民割據因而賦此丹雘樓臺絶比鄰幾多靈異出崚峋山開帝主稱齊武柱記雷神識謝均將謂完全歸法化那知強半屬魔民令人睹此生惆悵偃柏埋頭亦動嗔題古仙庵欲訪仙蹤何處尋一庵隱入白雲深遙看石虎途中踞細聽泥龍木裡吟藥杵有聲迷霧草丹爐無火覆煙林誰知即此人間世卻望遼天朱頂禽贈楊總戎寓形隨迹泊西東總在乾坤化育中秉鉞麾旄能事畢尋山問水世情融卜居避地希高尚轉位行權鎮亂風靜裡豁開空界眼揮金振起梵王宮答南廣和尚遣候次來韻莫春風雨日頻來新塔眉頭難打開契闊未能伸寸楮慚惶秪為乏長才庭空那許棲凡鳥心冷常懷入野梅惟有同門老兄弟殷殷寤寐幾多回壽人六十天氣晴和晷運長花開紅樹映華堂長生煙裊金爐篆不老漿浮玉斝香鄉里爭推鳩作杖兒孫齊列雁成行衲衣林下無何祝願採松枝一寄將壽人七十兩頰硃砂色更鮮誰知杖國是今年松筠自茂冰霜後金玉應成天地先緑水青山移白眼黃芽紫雪出丹田漆園椿樹何堪羡秪説春秋有八千題眼鏡老眼昏花無可商幸逢一物出西洋只知去翳無真法豈料添明有妙方額上帶看分早白面前失視亂青黃拈針不假求穿線運筆何憂寫隔行助我臨軒翻細字好將鈿匣自珍藏
